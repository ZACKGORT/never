<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>neverever.land</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
  body {
    font-family: 'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    background: #68c3c0;
    user-select: none;
    -webkit-user-select: none;
  }
  #world {
    position: fixed;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #e4e0ba 0%, #f7d9aa 100%);
    overflow: hidden;
    cursor: crosshair;
  }
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #score-wrap { position: absolute; top: 24px; right: 30px; text-align: right; }
  #score {
    font-size: clamp(2em, 5vw, 3.5em);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,.18);
    letter-spacing: -1px;
    line-height: 1;
  }
  #score-label { font-size: .65em; color: rgba(255,255,255,.7); letter-spacing: 2px; text-transform: uppercase; }
  #dist-wrap { position: absolute; bottom: 28px; right: 28px; text-align: right; color: rgba(255,255,255,.75); font-size: .9em; letter-spacing: 1px; }
  #level-wrap { position: absolute; top: 16px; left: 16px; width: 90px; height: 90px; }
  #level-wrap svg { position: absolute; top: 0; left: 0; }
  #level-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; }
  #level-num { font-size: 1.9em; font-weight: 900; color: #d1b790; }
  #level-lbl { font-size: .5em; letter-spacing: 2px; color: #d1b790; text-transform: uppercase; }
  #hearts-wrap { position: absolute; bottom: 24px; left: 24px; display: flex; align-items: center; gap: 6px; }
  #hearts-label { font-size: .7em; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.6); margin-right: 4px; }
  .heart { width: 18px; height: 16px; position: relative; transition: transform .3s, opacity .3s; }
  .heart svg { width: 100%; height: 100%; }
  .heart.lost { opacity: .2; transform: scale(.75); }
  #instructions { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%); text-align: center; pointer-events: none; z-index: 12; opacity: 1; transition: opacity 1s; }
  #instructions.fade { opacity: 0; }
  #instructions p { color: #fff; font-size: 1.05em; text-shadow: 0 1px 4px rgba(0,0,0,.2); }
  #instructions span { color: #f25346; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; pointer-events: none; opacity: 0; transition: opacity .5s; }
  .screen.visible { opacity: 1; pointer-events: all; }
  .screen h1 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(3em, 8vw, 5.5em); font-weight: 700; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,.2); margin-bottom: .15em; letter-spacing: -1px; }
  .screen .sub { font-size: clamp(1em, 2.5vw, 1.3em); color: rgba(255,255,255,.8); margin-bottom: 2em; min-height: 1.5em; }
  .btn-play { pointer-events: all; background: #fff; color: #f25346; border: none; border-radius: 50px; padding: 14px 40px; font-size: 1.05em; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 24px rgba(0,0,0,.12); transition: transform .2s, box-shadow .2s; }
  .btn-play:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(0,0,0,.18); }
  .btn-play:active { transform: translateY(0) scale(.98); }
  #hit-flash { position: fixed; inset: 0; background: #f25346; opacity: 0; pointer-events: none; z-index: 30; mix-blend-mode: multiply; }
  #coin-flash { position: fixed; inset: 0; background: #68c3c0; opacity: 0; pointer-events: none; z-index: 30; mix-blend-mode: screen; }
</style>
</head>
<body oncontextmenu="return false;">

<div id="world"></div>
<div id="hit-flash"></div>
<div id="coin-flash"></div>

<div id="ui">
  <div id="level-wrap">
    <svg width="90" height="90" viewBox="0 0 200 200">
      <circle r="82" cx="100" cy="100" fill="none" stroke="#d1b790" stroke-width="20" opacity=".4"/>
      <circle id="lvlRing" r="82" cx="100" cy="100" fill="none" stroke="#68c3c0"
              stroke-width="14" stroke-dasharray="515" stroke-dashoffset="515"
              transform="rotate(-90 100 100)" stroke-linecap="round"/>
    </svg>
    <div id="level-inner">
      <span id="level-num">1</span>
      <span id="level-lbl">lvl</span>
    </div>
  </div>
  <div id="score-wrap">
    <div id="score-label">Score</div>
    <div id="score">0</div>
  </div>
  <div id="dist-wrap"><span id="dist">0</span> m</div>
  <div id="hearts-wrap">
    <span id="hearts-label">Energy</span>
    <div id="hearts"></div>
  </div>
</div>

<div id="instructions" style="display:none">
  <p>Grab the <strong style="color:#68c3c0">blue pills</strong></p>
  <p><span>avoid the red ones</span></p>
  <p style="font-size:0.8em; margin-top:8px; color:#d1b790; letter-spacing: 1px;">L-Click: Spin 180&deg; / R-Click: Front Flip 360&deg;</p>
  <p style="font-size:0.7em; color:#d1b790; letter-spacing: 1px;">Mobile: Tap (180&deg;) / Double Tap (360&deg;)</p>
</div>

<div class="screen visible" id="screen-welcome">
  <h1>neverever.land</h1>
  <p class="sub">a ragdoll adventure in a ragball world</p>
  <button class="btn-play" id="btn-start">Play</button>
</div>

<div class="screen" id="screen-gameover">
  <h1>Game Over</h1>
  <p class="sub" id="go-score"></p>
  <button class="btn-play" id="btn-replay">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<script>
"use strict";

var C = {
  red:       0xf25346,
  white:     0xd8d0d1,
  brown:     0x59332e,
  pink:      0xF5986E,
  brownDark: 0x23190f,
  blue:      0x68c3c0,
  yellow:    0xf4e783,
  cloud:     0xffffff,
  charRed:   0xdd3322,
  charDark:  0xaa2211,
  boardBase: 0x334455,
};

var scene, camera, renderer;
var WIDTH = window.innerWidth, HEIGHT = window.innerHeight;

function createScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xf7d9aa, 100, 950);
  camera = new THREE.PerspectiveCamera(60, WIDTH / HEIGHT, 1, 10000);
  camera.position.set(0, 100, 200);
  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(WIDTH, HEIGHT);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('world').appendChild(renderer.domElement);
  window.addEventListener('resize', function() {
    WIDTH = window.innerWidth; HEIGHT = window.innerHeight;
    camera.aspect = WIDTH / HEIGHT;
    camera.updateProjectionMatrix();
    renderer.setSize(WIDTH, HEIGHT);
  });
}

function createLights() {
  var hemi = new THREE.HemisphereLight(0xaaaaaa, 0x000000, 0.9);
  scene.add(hemi);
  var ambient = new THREE.AmbientLight(0xdc8874, 0.3);
  scene.add(ambient);
  var sun = new THREE.DirectionalLight(0xffffff, 0.9);
  sun.position.set(150, 350, 350);
  sun.castShadow = true;
  sun.shadow.camera.left = -500; sun.shadow.camera.right = 500;
  sun.shadow.camera.top = 500; sun.shadow.camera.bottom = -500;
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 1000;
  sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
  scene.add(sun);
}

function Sea() {
  var geom = new THREE.CylinderGeometry(600, 600, 800, 40, 10);
  geom.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
  var pos = geom.attributes.position;
  this.waveData = [];
  for (var i = 0; i < pos.count; i++) {
    this.waveData.push({
      x: pos.getX(i), y: pos.getY(i), z: pos.getZ(i),
      ang: Math.random() * Math.PI * 2,
      amp: 5 + Math.random() * 15,
      speed: 0.016 + Math.random() * 0.032,
    });
  }
  var mat = new THREE.MeshPhongMaterial({ color: C.blue, transparent: true, opacity: 0.6, flatShading: true });
  this.mesh = new THREE.Mesh(geom, mat);
  this.mesh.receiveShadow = true;
}
Sea.prototype.moveWaves = function() {
  var pos = this.mesh.geometry.attributes.position;
  for (var i = 0, d; i < this.waveData.length; i++) {
    d = this.waveData[i];
    pos.setX(i, d.x + Math.cos(d.ang) * d.amp);
    pos.setY(i, d.y + Math.sin(d.ang) * d.amp);
    d.ang += d.speed;
  }
  pos.needsUpdate = true;
  this.mesh.geometry.computeVertexNormals();
};

function Cloud() {
  this.mesh = new THREE.Object3D();
  var geom = new THREE.BoxGeometry(20, 20, 20);
  var mat = new THREE.MeshPhongMaterial({ color: C.cloud, flatShading: true });
  var n = 3 + Math.floor(Math.random() * 3);
  for (var i = 0; i < n; i++) {
    var m = new THREE.Mesh(geom, mat);
    m.position.set(i * 15, Math.random() * 10, Math.random() * 10);
    m.rotation.set(Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, 0);
    var s = 0.1 + Math.random() * 0.9;
    m.scale.set(s, s, s);
    m.castShadow = m.receiveShadow = true;
    this.mesh.add(m);
  }
}

function Sky() {
  this.mesh = new THREE.Object3D();
  var nClouds = 20;
  var step = (Math.PI * 2) / nClouds;
  for (var i = 0; i < nClouds; i++) {
    var c = new Cloud();
    var a = step * i;
    var h = 750 + Math.random() * 200;
    c.mesh.position.set(Math.cos(a) * h, Math.sin(a) * h, -400 - Math.random() * 400);
    c.mesh.rotation.z = a + Math.PI / 2;
    var s = 1 + Math.random() * 2;
    c.mesh.scale.set(s, s, s);
    this.mesh.add(c.mesh);
  }
}

// ── RAGDOLL HUMANOID WITH HOVERBOARD ──────────────────────────

function makeBox(w, h, d, mat) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
}

function RagdollHuman() {
  this.mesh = new THREE.Object3D();

  var bodyMat = new THREE.MeshPhongMaterial({ color: C.charRed, flatShading: true });
  var darkMat = new THREE.MeshPhongMaterial({ color: C.charDark, flatShading: true });

  // HOVERBOARD
  var boardMat = new THREE.MeshPhongMaterial({ color: C.boardBase, flatShading: true });
  this.board = makeBox(46, 4, 16, boardMat);
  this.board.position.set(0, -41, 0);
  this.board.castShadow = true;
  
  var stripeMat = new THREE.MeshPhongMaterial({ color: C.blue, flatShading: true });
  var stripe = makeBox(46, 4.2, 4, stripeMat);
  this.board.add(stripe);
  this.mesh.add(this.board);

  // PARTICLES SYSTEM FOR HOVERBOARD
  this.particles = [];
  this.particleMat = new THREE.MeshPhongMaterial({ color: C.cloud, flatShading: true, transparent: true });
  this.particleGeo = new THREE.BoxGeometry(1, 1, 1);

  // ROTATION CONTROLS
  this.targetRotY = 0;
  this.currentRotY = 0;
  this.targetRotX = 0; // NEW: X-Axis Flip target
  this.currentRotX = 0; // NEW: X-Axis Flip current

  // HEAD
  var head = makeBox(14, 14, 14, bodyMat);
  head.position.set(0, 32, 0);
  head.castShadow = true;
  this.mesh.add(head);
  this.head = head;

  // NECK
  var neck = makeBox(6, 6, 6, darkMat);
  neck.position.set(0, 24, 0);
  this.mesh.add(neck);

  // TORSO upper
  var torsoU = makeBox(22, 14, 12, bodyMat);
  torsoU.position.set(0, 15, 0);
  torsoU.castShadow = true;
  this.mesh.add(torsoU);

  // TORSO lower
  var torsoL = makeBox(20, 12, 11, darkMat);
  torsoL.position.set(0, 3, 0);
  torsoL.castShadow = true;
  this.mesh.add(torsoL);

  // PELVIS
  var pelvis = makeBox(18, 8, 10, bodyMat);
  pelvis.position.set(0, -5, 0);
  this.mesh.add(pelvis);

  // RIGHT ARM
  this.rShoulderPivot = new THREE.Object3D();
  this.rShoulderPivot.position.set(-14, 16, 0);
  this.rShoulderPivot.userData = { velX: 0, velZ: 0 };
  var rUpperArm = makeBox(7, 18, 7, bodyMat);
  rUpperArm.position.set(0, -9, 0);
  rUpperArm.castShadow = true;
  this.rShoulderPivot.add(rUpperArm);
  this.rElbowPivot = new THREE.Object3D();
  this.rElbowPivot.position.set(0, -18, 0);
  this.rElbowPivot.userData = { velX: 0, velZ: 0 };
  var rForearm = makeBox(6, 14, 6, darkMat);
  rForearm.position.set(0, -7, 0);
  rForearm.castShadow = true;
  this.rElbowPivot.add(rForearm);
  var rHand = makeBox(6, 6, 6, bodyMat);
  rHand.position.set(0, -14, 0);
  this.rElbowPivot.add(rHand);
  this.rShoulderPivot.add(this.rElbowPivot);
  this.mesh.add(this.rShoulderPivot);

  // LEFT ARM
  this.lShoulderPivot = new THREE.Object3D();
  this.lShoulderPivot.position.set(14, 16, 0);
  this.lShoulderPivot.userData = { velX: 0, velZ: 0 };
  var lUpperArm = makeBox(7, 18, 7, bodyMat);
  lUpperArm.position.set(0, -9, 0);
  lUpperArm.castShadow = true;
  this.lShoulderPivot.add(lUpperArm);
  this.lElbowPivot = new THREE.Object3D();
  this.lElbowPivot.position.set(0, -18, 0);
  this.lElbowPivot.userData = { velX: 0, velZ: 0 };
  var lForearm = makeBox(6, 14, 6, darkMat);
  lForearm.position.set(0, -7, 0);
  lForearm.castShadow = true;
  this.lElbowPivot.add(lForearm);
  var lHand = makeBox(6, 6, 6, bodyMat);
  lHand.position.set(0, -14, 0);
  this.lElbowPivot.add(lHand);
  this.lShoulderPivot.add(this.lElbowPivot);
  this.mesh.add(this.lShoulderPivot);

  // RIGHT LEG
  this.rHipPivot = new THREE.Object3D();
  this.rHipPivot.position.set(-7, -9, 0);
  this.rHipPivot.userData = { velX: 0, velZ: 0 };
  var rThigh = makeBox(9, 18, 9, bodyMat);
  rThigh.position.set(0, -9, 0);
  rThigh.castShadow = true;
  this.rHipPivot.add(rThigh);
  this.rKneePivot = new THREE.Object3D();
  this.rKneePivot.position.set(0, -18, 0);
  this.rKneePivot.userData = { velX: 0, velZ: 0 };
  var rShin = makeBox(7, 16, 7, darkMat);
  rShin.position.set(0, -8, 0);
  rShin.castShadow = true;
  this.rKneePivot.add(rShin);
  var rFoot = makeBox(9, 6, 12, bodyMat);
  rFoot.position.set(0, -17, 3);
  this.rKneePivot.add(rFoot);
  this.rHipPivot.add(this.rKneePivot);
  this.mesh.add(this.rHipPivot);

  // LEFT LEG
  this.lHipPivot = new THREE.Object3D();
  this.lHipPivot.position.set(7, -9, 0);
  this.lHipPivot.userData = { velX: 0, velZ: 0 };
  var lThigh = makeBox(9, 18, 9, bodyMat);
  lThigh.position.set(0, -9, 0);
  lThigh.castShadow = true;
  this.lHipPivot.add(lThigh);
  this.lKneePivot = new THREE.Object3D();
  this.lKneePivot.position.set(0, -18, 0);
  this.lKneePivot.userData = { velX: 0, velZ: 0 };
  var lShin = makeBox(7, 16, 7, darkMat);
  lShin.position.set(0, -8, 0);
  lShin.castShadow = true;
  this.lKneePivot.add(lShin);
  var lFoot = makeBox(9, 6, 12, bodyMat);
  lFoot.position.set(0, -17, 3);
  this.lKneePivot.add(lFoot);
  this.lHipPivot.add(this.lKneePivot);
  this.mesh.add(this.lHipPivot);

  this.animTime = 0;

  // Stance adjusted for boarding
  this.joints = [
    { pivot: this.rShoulderPivot, restX: 0.3, restZ: -0.5, stiffX: 0.15, stiffZ: 0.15, dampX: 0.7, dampZ: 0.7, limX: 1.2, limZ: 0.8 },
    { pivot: this.rElbowPivot,    restX: 0.4, restZ: 0,    stiffX: 0.12, stiffZ: 0.1,  dampX: 0.7, dampZ: 0.7, limX: 1.5, limZ: 0.3 },
    { pivot: this.lShoulderPivot, restX: 0.3, restZ:  0.5, stiffX: 0.15, stiffZ: 0.15, dampX: 0.7, dampZ: 0.7, limX: 1.2, limZ: 0.8 },
    { pivot: this.lElbowPivot,    restX: 0.4, restZ: 0,    stiffX: 0.12, stiffZ: 0.1,  dampX: 0.7, dampZ: 0.7, limX: 1.5, limZ: 0.3 },
    { pivot: this.rHipPivot,      restX: 0,   restZ: -0.5, stiffX: 0.12, stiffZ: 0.1,  dampX: 0.75, dampZ: 0.75, limX: 1.0, limZ: 0.4 },
    { pivot: this.rKneePivot,     restX: 0.2, restZ: 0,    stiffX: 0.1,  stiffZ: 0.08, dampX: 0.75, dampZ: 0.75, limX: 1.2, limZ: 0.2 },
    { pivot: this.lHipPivot,      restX: 0,   restZ: 0.5,  stiffX: 0.12, stiffZ: 0.1,  dampX: 0.75, dampZ: 0.75, limX: 1.0, limZ: 0.4 },
    { pivot: this.lKneePivot,     restX: 0.2, restZ: 0,    stiffX: 0.1,  stiffZ: 0.08, dampX: 0.75, dampZ: 0.75, limX: 1.2, limZ: 0.2 },
  ];
}

RagdollHuman.prototype.update = function(accelX, accelY, speed) {
  this.animTime += 0.08;

  // Spin rotation logic (Y axis)
  this.currentRotY += (this.targetRotY - this.currentRotY) * 0.15;
  this.mesh.rotation.y = this.currentRotY;

  // Flip rotation logic (X axis)
  this.currentRotX += (this.targetRotX - this.currentRotX) * 0.10; // Slightly slower lerp for a flip

  // Hoverboard Particles
  if (Math.random() > 0.4 && speed > 0) {
    var p = new THREE.Mesh(this.particleGeo, this.particleMat);
    var size = 2 + Math.random() * 3.5;
    p.scale.setScalar(size);
    p.position.set(
      this.board.position.x + (Math.random() - 0.5) * 44,
      this.board.position.y - 1,
      this.board.position.z + (Math.random() - 0.5) * 14
    );
    p.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    p.userData = {
      life: 1.0,
      vx: -speed - Math.random() * 2,
      vy: -0.5 - Math.random() * 1.5,
      vz: (Math.random() - 0.5) * 2
    };
    this.mesh.add(p);
    this.particles.push(p);
  }

  for (var k = this.particles.length - 1; k >= 0; k--) {
    var pt = this.particles[k];
    pt.userData.life -= 0.05;
    pt.position.x += pt.userData.vx;
    pt.position.y += pt.userData.vy;
    pt.position.z += pt.userData.vz;
    pt.rotation.x += 0.1;
    pt.rotation.y += 0.1;
    pt.scale.setScalar(Math.max(0, pt.userData.life * 4));
    pt.material.opacity = pt.userData.life;
    if (pt.userData.life <= 0) {
      this.mesh.remove(pt);
      this.particles.splice(k, 1);
    }
  }

  var leanZ = -accelX * 0.6;
  var leanX = -accelY * 0.4;
  this.mesh.rotation.z += (leanZ - this.mesh.rotation.z) * 0.12;

  var forwardPitch = -0.1 - speed * 0.004; 

  // Combine Flip (X-axis target) + Mouse Lean (X-axis) + Speed Pitch
  var targetMeshX = this.currentRotX + leanX + forwardPitch;
  this.mesh.rotation.x += (targetMeshX - this.mesh.rotation.x) * 0.15;

  var boardBump = Math.sin(this.animTime * 1.5) * 0.05;
  var armFlutter = Math.sin(this.animTime * 3) * 0.05;

  for (var i = 0; i < this.joints.length; i++) {
    var j = this.joints[i];
    var p = j.pivot;
    var ud = p.userData;

    var forceX = -accelY * 1.8;
    var forceZ = -accelX * (i < 4 ? 1.2 : 0.5);

    var errX = (j.restX + forceX) - p.rotation.x;
    var errZ = (j.restZ + forceZ) - p.rotation.z;

    ud.velX = ud.velX * j.dampX + errX * j.stiffX;
    ud.velZ = ud.velZ * j.dampZ + errZ * j.stiffZ;

    p.rotation.x = Math.max(-j.limX, Math.min(j.limX, p.rotation.x + ud.velX));
    p.rotation.z = Math.max(-j.limZ, Math.min(j.limZ, p.rotation.z + ud.velZ));
  }

  // Boarding stance adjustments
  var rHipBase = -0.1 + boardBump;
  var lHipBase = -0.1 - boardBump;
  this.rHipPivot.rotation.x += (rHipBase - this.rHipPivot.rotation.x) * 0.3;
  this.lHipPivot.rotation.x += (lHipBase - this.lHipPivot.rotation.x) * 0.3;

  var rKneeBase = 0.3;
  var lKneeBase = 0.3;
  this.rKneePivot.rotation.x += (rKneeBase - this.rKneePivot.rotation.x) * 0.25;
  this.lKneePivot.rotation.x += (lKneeBase - this.lKneePivot.rotation.x) * 0.25;

  var rSpread = -0.2;
  var lSpread = 0.2;
  this.rHipPivot.rotation.z += (rSpread - this.rHipPivot.rotation.z) * 0.1;
  this.lHipPivot.rotation.z += (lSpread - this.lHipPivot.rotation.z) * 0.1;

  var rArmSpread = -0.2 + armFlutter + accelX * 0.4;
  var lArmSpread = -0.2 - armFlutter - accelX * 0.4;
  this.rShoulderPivot.rotation.z += ((-0.5 + rArmSpread) - this.rShoulderPivot.rotation.z) * 0.1;
  this.lShoulderPivot.rotation.z += ((0.5 + lArmSpread) - this.lShoulderPivot.rotation.z) * 0.1;

  var headLean = -leanZ * 0.4 + Math.sin(this.animTime) * 0.04;
  this.head.rotation.z += (headLean - this.head.rotation.z) * 0.1;
};

RagdollHuman.prototype.hitReaction = function() {
  for (var i = 0; i < this.joints.length; i++) {
    var j = this.joints[i];
    j.pivot.userData.velX += (Math.random() - 0.5) * 1.5;
    j.pivot.userData.velZ += (Math.random() - 0.5) * 1.5;
  }
  this.mesh.rotation.z += (Math.random() - 0.5) * 0.6;
  this.mesh.rotation.x += (Math.random() - 0.5) * 0.4;
};

// ─────────────────────────────────────────
// ENEMY, COIN, HOLDERS
// ─────────────────────────────────────────
function Enemy() {
  var geom = new THREE.IcosahedronGeometry(8, 1);
  var mat = new THREE.MeshPhongMaterial({ color: C.red, shininess: 0, flatShading: true });
  this.mesh = new THREE.Mesh(geom, mat);
  this.mesh.castShadow = true;
}
function Coin() {
  var geom = new THREE.CylinderGeometry(5, 5, 1, 12);
  var mat = new THREE.MeshPhongMaterial({ color: C.blue, shininess: 0, flatShading: true });
  this.mesh = new THREE.Mesh(geom, mat);
  this.mesh.castShadow = true;
}
function EnemiesHolder() {
  this.mesh = new THREE.Object3D();
  this.inUse = []; this.pool = [];
  this.speed = 2.0;
}
EnemiesHolder.prototype.spawn = function() {
  var e = this.pool.length ? this.pool.pop() : new Enemy();
  e.mesh.position.set(380 + Math.random() * 100, 25 + Math.random() * 150, 0);
  e.mesh.scale.setScalar(1 + Math.random() * 0.5);
  this.mesh.add(e.mesh);
  this.inUse.push(e);
};
EnemiesHolder.prototype.update = function() {
  for (var i = this.inUse.length - 1; i >= 0; i--) {
    var e = this.inUse[i];
    e.mesh.position.x -= this.speed;
    e.mesh.rotation.x += 0.07; e.mesh.rotation.z += 0.05;
    if (e.mesh.position.x < -300) {
      this.pool.push(e); this.mesh.remove(e.mesh); this.inUse.splice(i, 1);
    }
  }
};
function CoinsHolder() {
  this.mesh = new THREE.Object3D();
  this.inUse = []; this.pool = [];
  this.speed = 2.0;
}
CoinsHolder.prototype.spawn = function() {
  var c = this.pool.length ? this.pool.pop() : new Coin();
  c.mesh.position.set(380 + Math.random() * 100, 30 + Math.random() * 140, 0);
  this.mesh.add(c.mesh); this.inUse.push(c);
};
CoinsHolder.prototype.update = function() {
  for (var i = this.inUse.length - 1; i >= 0; i--) {
    var c = this.inUse[i];
    c.mesh.position.x -= this.speed;
    c.mesh.rotation.x += 0.08; c.mesh.rotation.y += 0.12;
    if (c.mesh.position.x < -300) {
      this.pool.push(c); this.mesh.remove(c.mesh); this.inUse.splice(i, 1);
    }
  }
};

function Burst(color, n) {
  this.mesh = new THREE.Object3D();
  this.parts = [];
  var g = new THREE.TetrahedronGeometry(3, 0);
  var m = new THREE.MeshPhongMaterial({ color: color, flatShading: true });
  for (var i = 0; i < (n || 8); i++) {
    var p = new THREE.Mesh(g, m);
    var angle = (Math.PI * 2 * i) / n;
    p.userData = {
      vx: Math.cos(angle) * (1.5 + Math.random()),
      vy: Math.sin(angle) * (1.5 + Math.random()),
      vr: Math.random() * 0.3
    };
    this.mesh.add(p); this.parts.push(p);
  }
  scene.add(this.mesh);
  this.life = 30;
  activeBursts.push(this);
}
var activeBursts = [];
function updateBursts() {
  for (var i = activeBursts.length - 1; i >= 0; i--) {
    var b = activeBursts[i];
    b.life--;
    for (var j = 0; j < b.parts.length; j++) {
      b.parts[j].position.x += b.parts[j].userData.vx;
      b.parts[j].position.y += b.parts[j].userData.vy;
      b.parts[j].rotation.x += b.parts[j].userData.vr;
    }
    b.mesh.scale.setScalar(b.life / 30);
    b.mesh.children.forEach(function(c) {
      c.material.opacity = b.life / 30; c.material.transparent = true;
    });
    if (b.life <= 0) { scene.remove(b.mesh); activeBursts.splice(i, 1); }
  }
}

// ─────────────────────────────────────────
// GAME STATE & INPUT
// ─────────────────────────────────────────
var STATUS = 'waiting';
var score = 0, level = 1, energy = 10, MAX_E = 10;
var distance = 0, coinsGot = 0, frame = 0;
var spawnInt = 55, BASE_SPD = 2.0, COINS_PER_LEVEL = 20;
var mouse = { x: 0, y: 0 };
var prevMouse = { x: 0, y: 0 };
var mouseVel = { x: 0, y: 0 };

var sea, sky, humanoid, eHolder, cHolder;

function buildWorld() {
  sea = new Sea(); sea.mesh.position.y = -600; scene.add(sea.mesh);
  sky = new Sky(); sky.mesh.position.y = -600; scene.add(sky.mesh);

  humanoid = new RagdollHuman();
  humanoid.mesh.scale.setScalar(0.25);
  humanoid.mesh.position.set(0, 100, 0);
  scene.add(humanoid.mesh);

  eHolder = new EnemiesHolder(); scene.add(eHolder.mesh);
  cHolder = new CoinsHolder(); scene.add(cHolder.mesh);
  for (var i = 0; i < 8; i++) {
    eHolder.pool.push(new Enemy());
    cHolder.pool.push(new Coin());
  }
}

function buildHearts() {
  var el = document.getElementById('hearts');
  el.innerHTML = '';
  for (var i = 0; i < MAX_E; i++) {
    var div = document.createElement('div');
    div.className = 'heart'; div.id = 'heart-' + i;
    div.innerHTML = '<svg viewBox="0 0 32 29.6"><path fill="#f25346" d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.9,16,21.2,16,21.2s16-11.3,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg>';
    el.appendChild(div);
  }
}
function refreshUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('dist').textContent = Math.round(distance);
  for (var i = 0; i < MAX_E; i++) {
    var h = document.getElementById('heart-' + i);
    if (h) h.classList.toggle('lost', i >= energy);
  }
}
function setLevelRing(pct) {
  var circ = 2 * Math.PI * 82;
  document.getElementById('lvlRing').setAttribute('stroke-dashoffset', circ * (1 - pct));
}

function norm(v, vmin, vmax, tmin, tmax) {
  var nv = Math.max(Math.min(v, vmax), vmin);
  return tmin + ((nv - vmin) / (vmax - vmin)) * (tmax - tmin);
}

document.addEventListener('mousemove', function(e) {
  mouse.x = -1 + (e.clientX / WIDTH) * 2;
  mouse.y = 1 - (e.clientY / HEIGHT) * 2;
});
document.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  mouse.x = -1 + (t.clientX / WIDTH) * 2;
  mouse.y = 1 - (t.clientY / HEIGHT) * 2;
}, { passive: false });

// ROTATION EVENT LISTENERS
document.addEventListener('mousedown', function(e) {
  if (e.target.tagName === 'BUTTON') return;
  if (e.button === 0) humanoid.targetRotY += Math.PI; // Left Click (Spin)
  else if (e.button === 2) humanoid.targetRotX += Math.PI * 2; // Right Click (Front Flip)
});

var lastTapTime = 0;
document.addEventListener('touchstart', function(e) {
  if (e.target.tagName === 'BUTTON') return;
  var now = Date.now();
  if (now - lastTapTime < 300) {
    humanoid.targetRotY += Math.PI * 2; // Double tap
    lastTapTime = 0;
  } else {
    humanoid.targetRotY += Math.PI; // Single tap
    lastTapTime = now;
  }
}, { passive: false });


function startGame() {
  STATUS = 'playing';
  score = 0; energy = MAX_E; distance = 0;
  coinsGot = 0; level = 1; frame = 0;
  spawnInt = 55;
  eHolder.speed = cHolder.speed = BASE_SPD;
  eHolder.inUse.forEach(function(e) { eHolder.mesh.remove(e.mesh); });
  cHolder.inUse.forEach(function(c) { cHolder.mesh.remove(c.mesh); });
  eHolder.inUse = []; cHolder.inUse = [];
  setLevelRing(0);
  document.getElementById('level-num').textContent = 1;
  refreshUI();
  document.getElementById('screen-welcome').classList.remove('visible');
  document.getElementById('screen-gameover').classList.remove('visible');
  var instr = document.getElementById('instructions');
  instr.style.display = 'block';
  instr.classList.remove('fade');
  setTimeout(function() { instr.classList.add('fade'); }, 4000);
  setTimeout(function() { instr.style.display = 'none'; }, 5200);
}

function doGameOver() {
  STATUS = 'gameover';
  document.getElementById('go-score').textContent = 'You scored ' + score + ' points';
  document.getElementById('screen-gameover').classList.add('visible');
}

function levelUp() {
  level++;
  document.getElementById('level-num').textContent = level;
  setLevelRing(0);
  var spd = BASE_SPD * (1 + level * 0.22);
  eHolder.speed = cHolder.speed = spd;
  spawnInt = Math.max(18, 55 - level * 4);
}

var _pWorld = new THREE.Vector3();
var _eWorld = new THREE.Vector3();

function checkCollisions() {
  humanoid.mesh.getWorldPosition(_pWorld);
  for (var i = eHolder.inUse.length - 1; i >= 0; i--) {
    var en = eHolder.inUse[i];
    en.mesh.getWorldPosition(_eWorld);
    // Adjusted hit radius slightly to accommodate hoverboard shape
    if (_pWorld.distanceTo(_eWorld) < 12) {
      new Burst(C.red, 10).mesh.position.copy(_eWorld);
      eHolder.pool.push(en);
      eHolder.mesh.remove(en.mesh);
      eHolder.inUse.splice(i, 1);
      energy--;
      refreshUI();
      gsap.fromTo('#hit-flash', { opacity: 0.55 }, { opacity: 0, duration: 0.35 });
      humanoid.hitReaction();
      if (energy <= 0) { doGameOver(); return; }
    }
  }
  for (var j = cHolder.inUse.length - 1; j >= 0; j--) {
    var cn = cHolder.inUse[j];
    cn.mesh.getWorldPosition(_eWorld);
    if (_pWorld.distanceTo(_eWorld) < 12) {
      new Burst(C.blue, 8).mesh.position.copy(_eWorld);
      cHolder.pool.push(cn);
      cHolder.mesh.remove(cn.mesh);
      cHolder.inUse.splice(j, 1);
      score++;
      coinsGot++;
      gsap.fromTo('#coin-flash', { opacity: 0.3 }, { opacity: 0, duration: 0.25 });
      var lvlPct = (coinsGot % COINS_PER_LEVEL) / COINS_PER_LEVEL;
      setLevelRing(lvlPct);
      if (coinsGot > 0 && coinsGot % COINS_PER_LEVEL === 0) levelUp();
      refreshUI();
    }
  }
}

function loop() {
  requestAnimationFrame(loop);
  frame++;

  sea.mesh.rotation.z += 0.005;
  sky.mesh.rotation.z += 0.01;
  sea.moveWaves();

  mouseVel.x = mouse.x - prevMouse.x;
  mouseVel.y = mouse.y - prevMouse.y;
  prevMouse.x = mouse.x;
  prevMouse.y = mouse.y;

  if (STATUS === 'playing') {
    distance += 0.2;

    var tx = norm(mouse.x, -1, 1, -100, 100);
    var ty = norm(mouse.y, -1, 1, 25, 175);
    var dx = tx - humanoid.mesh.position.x;
    var dy = ty - humanoid.mesh.position.y;
    humanoid.mesh.position.x += dx * 0.1;
    humanoid.mesh.position.y += dy * 0.1;

    var accelX = dx * 0.003;
    var accelY = dy * 0.003;
    var spd = eHolder.speed;
    humanoid.update(accelX, accelY, spd);

    if (frame % Math.round(spawnInt) === 0) {
      if (Math.random() < 0.45) eHolder.spawn(); else cHolder.spawn();
      if (Math.random() < 0.6) cHolder.spawn();
    }

    eHolder.update();
    cHolder.update();
    updateBursts();
    checkCollisions();

    if (frame % 8 === 0) refreshUI();
  } else {
    humanoid.mesh.position.y = 100 + Math.sin(Date.now() * 0.001) * 6;
    humanoid.update(0, 0, 0);
  }

  // PULL FOCUS: Center camera dynamically on the hoverboard
  var boardWorldPos = new THREE.Vector3();
  humanoid.board.getWorldPosition(boardWorldPos);
  if (!camera.userData.lookTarget) camera.userData.lookTarget = new THREE.Vector3(0, 100, 0);
  camera.userData.lookTarget.lerp(boardWorldPos, 0.1);
  camera.lookAt(camera.userData.lookTarget);

  renderer.render(scene, camera);
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-replay').addEventListener('click', startGame);

window.addEventListener('load', function() {
  createScene();
  createLights();
  buildWorld();
  buildHearts();
  refreshUI();
  loop();
});
</script>
