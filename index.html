<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>neverever.land</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
  body {
    font-family: 'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    background: #020111;
    user-select: none;
    -webkit-user-select: none;
    cursor: none;
  }
  #world {
    position: fixed;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #020111 0%, #1a1025 100%);
    overflow: hidden;
  }
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #score-wrap { position: absolute; top: 24px; right: 30px; text-align: right; }
  #score {
    font-size: clamp(2em, 5vw, 3.5em);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,.18);
    letter-spacing: -1px;
    line-height: 1;
  }
  #score-label { font-size: .65em; color: rgba(255,255,255,.7); letter-spacing: 2px; text-transform: uppercase; }
  #dist-wrap { position: absolute; bottom: 28px; right: 28px; text-align: right; color: rgba(255,255,255,.75); font-size: .9em; letter-spacing: 1px; }
  #level-wrap { position: absolute; top: 16px; left: 16px; width: 90px; height: 90px; }
  #level-wrap svg { position: absolute; top: 0; left: 0; }
  #level-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; }
  #level-num { font-size: 1.9em; font-weight: 900; color: #d1b790; }
  #level-lbl { font-size: .5em; letter-spacing: 2px; color: #d1b790; text-transform: uppercase; }
  #hearts-wrap { position: absolute; bottom: 24px; left: 24px; display: flex; align-items: center; gap: 6px; }
  #hearts-label { font-size: .7em; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.6); margin-right: 4px; }
  .heart { width: 18px; height: 16px; position: relative; transition: transform .3s, opacity .3s; }
  .heart svg { width: 100%; height: 100%; }
  .heart.lost { opacity: .2; transform: scale(.75); }
  #instructions { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%); text-align: center; pointer-events: none; z-index: 12; opacity: 1; transition: opacity 1s; }
  #instructions.fade { opacity: 0; }
  #instructions p { color: #fff; font-size: 1.05em; text-shadow: 0 1px 4px rgba(0,0,0,.2); }
  #instructions span { color: #f25346; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; pointer-events: none; opacity: 0; transition: opacity .5s; }
  .screen.visible { opacity: 1; pointer-events: all; }
  .screen h1 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(3em, 8vw, 5.5em); font-weight: 700; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,.2); margin-bottom: .15em; letter-spacing: -1px; }
  .screen .sub { font-size: clamp(1em, 2.5vw, 1.3em); color: rgba(255,255,255,.8); margin-bottom: 2em; min-height: 1.5em; }
  .btn-play { pointer-events: all; background: #fff; color: #f25346; border: none; border-radius: 50px; padding: 14px 40px; font-size: 1.05em; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 24px rgba(0,0,0,.12); transition: transform .2s, box-shadow .2s; }
  .btn-play:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(0,0,0,.18); }
  .btn-play:active { transform: translateY(0) scale(.98); }
  #hit-flash { position: fixed; inset: 0; background: #f25346; opacity: 0; pointer-events: none; z-index: 30; mix-blend-mode: multiply; }
  #coin-flash { position: fixed; inset: 0; background: #68c3c0; opacity: 0; pointer-events: none; z-index: 30; mix-blend-mode: screen; }

  #cursor {
    position: fixed;
    width: 40px;
    height: 24px;
    border: 2px solid rgba(104, 195, 192, 0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, border-color 0.2s;
  }
  #cursor.active {
    width: 50px;
    height: 30px;
    border-color: rgba(242, 83, 70, 0.8); 
  }
</style>
</head>
<body>

<div id="cursor"></div>

<div id="world"></div>
<div id="hit-flash"></div>
<div id="coin-flash"></div>

<div id="ui">
  <div id="level-wrap">
    <svg width="0" height="90" viewBox="0 0 0 0">
      <circle r="82" cx="100" cy="100" fill="none" stroke="#d1b790" stroke-width="20" opacity=".4"/>
      <circle id="lvlRing" r="82" cx="100" cy="100" fill="none" stroke="#68c3c0"
              stroke-width="14" stroke-dasharray="515" stroke-dashoffset="515"
              transform="rotate(-90 100 100)" stroke-linecap="round"/>
    </svg>
    <div id="level-inner">
      <span id="level-num"></span>
      <span id="level-lbl"></span>
    </div>
  </div>
  <div id="score-wrap">
    <div id="score-label"></div>
    <div id="score"></div>
  </div>
  <div id="dist-wrap"><span id="dist"></span></div>
  <div id="hearts-wrap">
    <span id="hearts-label"></span>
    <div id="hearts"></div>
  </div>
</div>

<div class="screen" id="screen-welcome">
  <h1>neverever.land</h1>
  <p class="sub">a ragdoll adventure in a ragball world</p>
  <button class="btn-play" id="btn-start">Play</button>
</div>

<div class="screen" id="screen-gameover">
  <h1>Game Over</h1>
  <p class="sub" id="go-score"></p>
  <button class="btn-play" id="btn-replay">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<script>
  "use strict";
  
  var C = {
    red:       0xf25346,
    white:     0xd8d0d1,
    brown:     0x59332e,
    pink:      0xF5986E,
    brownDark: 0x23190f,
    blue:      0x68c3c0,
    yellow:    0xf4e783,
    cloud:     0xffffff,
    charRed:   0xdd3322,
    charDark:  0xaa2211,
  };
  
  var planetColors = [0x68c3c0, 0x4a3b69, 0x2b596b, 0x5c3a41];
  
  var scene, camera, renderer;
  var WIDTH = window.innerWidth, HEIGHT = window.innerHeight;
  
  // Variables to hold scroll-based world speed
  var targetRotSpeed = 1.0;
  var currentRotSpeed = 1.0;
  
  function createScene() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x1a1025, 100, 950);
    camera = new THREE.PerspectiveCamera(60, WIDTH / HEIGHT, 1, 10000);
    camera.position.set(0, 100, 200);
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(WIDTH, HEIGHT);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('world').appendChild(renderer.domElement);
    window.addEventListener('resize', function() {
      WIDTH = window.innerWidth; HEIGHT = window.innerHeight;
      camera.aspect = WIDTH / HEIGHT;
      camera.updateProjectionMatrix();
      renderer.setSize(WIDTH, HEIGHT);
    });
  }
  
  function createLights() {
    var hemi = new THREE.HemisphereLight(0xffffff, 0x000000, 0.5);
    scene.add(hemi);
    var ambient = new THREE.AmbientLight(0x404040, 0.7);
    scene.add(ambient);
    var sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(150, 350, 350);
    sun.castShadow = true;
    sun.shadow.camera.left = -500; sun.shadow.camera.right = 500;
    sun.shadow.camera.top = 500; sun.shadow.camera.bottom = -500;
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 1000;
    sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
    scene.add(sun);
  }
  
  function Sea() {
    var geom = new THREE.CylinderGeometry(600, 600, 800, 40, 10);
    geom.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
    var pos = geom.attributes.position;
    this.waveData = [];
    for (var i = 0; i < pos.count; i++) {
      this.waveData.push({
        x: pos.getX(i), y: pos.getY(i), z: pos.getZ(i),
        ang: Math.random() * Math.PI * 2,
        amp: 5 + Math.random() * 15,
        speed: 0.016 + Math.random() * 0.032,
      });
    }
    var mat = new THREE.MeshPhongMaterial({ color: planetColors[0], transparent: true, opacity: 0.8, flatShading: true });
    this.mesh = new THREE.Mesh(geom, mat);
    this.mesh.receiveShadow = true;
  }
  Sea.prototype.moveWaves = function() {
    var pos = this.mesh.geometry.attributes.position;
    for (var i = 0, d; i < this.waveData.length; i++) {
      d = this.waveData[i];
      pos.setX(i, d.x + Math.cos(d.ang) * d.amp);
      pos.setY(i, d.y + Math.sin(d.ang) * d.amp);
      d.ang += d.speed;
    }
    pos.needsUpdate = true;
    this.mesh.geometry.computeVertexNormals();
  };
  
  function Star() {
    this.mesh = new THREE.Object3D();
    var geom = new THREE.BoxGeometry(2, 2, 2);
    var mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    var m = new THREE.Mesh(geom, mat);
    this.mesh.add(m);
  }
  
  function Sky() {
    this.mesh = new THREE.Object3D();
    var nStars = 150;
    for (var i = 0; i < nStars; i++) {
      var s = new Star();
      var a = Math.random() * Math.PI * 2;
      var h = 650 + Math.random() * 300;
      s.mesh.position.set(Math.cos(a) * h, Math.sin(a) * h, -200 - Math.random() * 600);
      this.mesh.add(s.mesh);
    }
  }
  
  function makeBox(w, h, d, mat) {
    return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  }
  
  function RagdollHuman() {
    this.mesh = new THREE.Object3D();
    this.mesh.rotation.y = Math.PI / 5; 
  
    this.baseRotX = 0;
    this.baseRotZ = 0;
    this.flipX = 0;
    this.flipZ = 0;
  
    var suitMat = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true });
    var jointMat = new THREE.MeshPhongMaterial({ color: 0x666666, flatShading: true });
    var visorMat = new THREE.MeshPhongMaterial({ color: 0x111115, flatShading: true, shininess: 100, specular: 0xffffff });
    var packMat = new THREE.MeshPhongMaterial({ color: 0xdddddd, flatShading: true });
    var thrusterMat = new THREE.MeshPhongMaterial({ color: 0x444444, flatShading: true });
    var flameMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
  
    var head = makeBox(18, 18, 18, suitMat);
    head.position.set(0, 34, 0);
    head.castShadow = true;
    this.mesh.add(head);
    this.head = head;
  
    var visor = makeBox(14, 10, 4, visorMat);
    visor.position.set(0, 2, 8);
    head.add(visor);
  
    var neck = makeBox(12, 4, 12, jointMat);
    neck.position.set(0, 24, 0);
    this.mesh.add(neck);
  
    var torsoU = makeBox(24, 16, 16, suitMat);
    torsoU.position.set(0, 15, 0);
    torsoU.castShadow = true;
    this.mesh.add(torsoU);
  
    var pack = makeBox(18, 22, 10, packMat);
    pack.position.set(0, 0, -12);
    pack.castShadow = true;
    torsoU.add(pack);
  
    var lThruster = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3.5, 8, 8), thrusterMat);
    lThruster.position.set(-6, -11, 0);
    pack.add(lThruster);
  
    var rThruster = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3.5, 8, 8), thrusterMat);
    rThruster.position.set(6, -11, 0);
    pack.add(rThruster);
  
    this.lFlame = new THREE.Mesh(new THREE.ConeGeometry(2.5, 12, 8), flameMat);
    this.lFlame.position.set(0, -9, 0);
    this.lFlame.rotation.x = Math.PI;
    lThruster.add(this.lFlame);
  
    this.rFlame = new THREE.Mesh(new THREE.ConeGeometry(2.5, 12, 8), flameMat);
    this.rFlame.position.set(0, -9, 0);
    this.rFlame.rotation.x = Math.PI;
    rThruster.add(this.rFlame);
  
    var torsoL = makeBox(22, 12, 14, suitMat);
    torsoL.position.set(0, 3, 0);
    torsoL.castShadow = true;
    this.mesh.add(torsoL);
  
    var pelvis = makeBox(20, 8, 12, jointMat);
    pelvis.position.set(0, -5, 0);
    this.mesh.add(pelvis);
  
    // ARMS & LEGS
    this.rShoulderPivot = new THREE.Object3D();
    this.rShoulderPivot.position.set(-15, 16, 0);
    this.rShoulderPivot.userData = { velX: 0, velZ: 0 };
    var rUpperArm = makeBox(8, 18, 8, suitMat);
    rUpperArm.position.set(0, -9, 0);
    this.rShoulderPivot.add(rUpperArm);
    
    this.rElbowPivot = new THREE.Object3D();
    this.rElbowPivot.position.set(0, -18, 0);
    this.rElbowPivot.userData = { velX: 0, velZ: 0 };
    var rForearm = makeBox(7, 14, 7, suitMat);
    rForearm.position.set(0, -7, 0);
    this.rElbowPivot.add(rForearm);
    this.rShoulderPivot.add(this.rElbowPivot);
    this.mesh.add(this.rShoulderPivot);
  
    this.lShoulderPivot = new THREE.Object3D();
    this.lShoulderPivot.position.set(15, 16, 0);
    this.lShoulderPivot.userData = { velX: 0, velZ: 0 };
    var lUpperArm = makeBox(8, 18, 8, suitMat);
    lUpperArm.position.set(0, -9, 0);
    this.lShoulderPivot.add(lUpperArm);
    
    this.lElbowPivot = new THREE.Object3D();
    this.lElbowPivot.position.set(0, -18, 0);
    this.lElbowPivot.userData = { velX: 0, velZ: 0 };
    var lForearm = makeBox(7, 14, 7, suitMat);
    lForearm.position.set(0, -7, 0);
    this.lElbowPivot.add(lForearm);
    this.lShoulderPivot.add(this.lElbowPivot);
    this.mesh.add(this.lShoulderPivot);
  
    this.rHipPivot = new THREE.Object3D();
    this.rHipPivot.position.set(-8, -9, 0);
    this.rHipPivot.userData = { velX: 0, velZ: 0 };
    var rThigh = makeBox(10, 18, 10, suitMat);
    rThigh.position.set(0, -9, 0);
    this.rHipPivot.add(rThigh);
    
    this.rKneePivot = new THREE.Object3D();
    this.rKneePivot.position.set(0, -18, 0);
    this.rKneePivot.userData = { velX: 0, velZ: 0 };
    var rShin = makeBox(9, 16, 9, suitMat);
    rShin.position.set(0, -8, 0);
    this.rKneePivot.add(rShin);
    this.rHipPivot.add(this.rKneePivot);
    this.mesh.add(this.rHipPivot);
  
    this.lHipPivot = new THREE.Object3D();
    this.lHipPivot.position.set(8, -9, 0);
    this.lHipPivot.userData = { velX: 0, velZ: 0 };
    var lThigh = makeBox(10, 18, 10, suitMat);
    lThigh.position.set(0, -9, 0);
    this.lHipPivot.add(lThigh);
    
    this.lKneePivot = new THREE.Object3D();
    this.lKneePivot.position.set(0, -18, 0);
    this.lKneePivot.userData = { velX: 0, velZ: 0 };
    var lShin = makeBox(9, 16, 9, suitMat);
    lShin.position.set(0, -8, 0);
    this.lKneePivot.add(lShin);
    this.lHipPivot.add(this.lKneePivot);
    this.mesh.add(this.lHipPivot);
  
    this.animTime = 0;
  
// Super responsive ragdoll physics - cartoonishly realistic, over-exaggerated
this.joints = [
  // SHOULDERS: Full range of motion including forward reach (negative Z = forward)
  { pivot: this.rShoulderPivot, restX: 0.2, restZ: -0.1, stiffX: 0.25, stiffZ: 0.25, dampX: 0.7, dampZ: 0.7, limX: 3.2, limZ: 2.5 },
  { pivot: this.lShoulderPivot, restX: 0.2, restZ:  0.1, stiffX: 0.25, stiffZ: 0.25, dampX: 0.7, dampZ: 0.7, limX: 3.2, limZ: 2.5 },
  
  // ELBOWS: Follow through on cursor reach with more range
  { pivot: this.rElbowPivot,    restX: 0.05, restZ: 0,    stiffX: 0.3,  stiffZ: 0.25,  dampX: 0.72, dampZ: 0.72, limX: 1.2, limZ: 0.6 },
  { pivot: this.lElbowPivot,    restX: 0.05, restZ: 0,    stiffX: 0.3,  stiffZ: 0.25,  dampX: 0.72, dampZ: 0.72, limX: 1.2, limZ: 0.6 },
  
  // LEGS: Opposing swing for balance
  { pivot: this.rHipPivot,      restX: 0,    restZ: 0,    stiffX: 0.18, stiffZ: 0.15,  dampX: 0.65, dampZ: 0.65, limX: 1.4, limZ: 0.6 },
  { pivot: this.rKneePivot,     restX: 0.1,  restZ: 0,    stiffX: 0.15,  stiffZ: 0.12,  dampX: 0.65, dampZ: 0.65, limX: 1.5, limZ: 0.3 },
  { pivot: this.lHipPivot,      restX: 0,    restZ: 0,    stiffX: 0.18, stiffZ: 0.15,  dampX: 0.65, dampZ: 0.65, limX: 1.4, limZ: 0.6 },
  { pivot: this.lKneePivot,     restX: 0.1,  restZ: 0,    stiffX: 0.15,  stiffZ: 0.12,  dampX: 0.65, dampZ: 0.65, limX: 1.5, limZ: 0.3 },
];
// Inertia tracking for butterfly-catching feel
this.cursorVelX = 0;
this.cursorVelY = 0;
this.prevCursorX = 0;
this.prevCursorY = 0;
  }
  
  RagdollHuman.prototype.update = function(accelX, accelY, speed, dx, dy) {
    dx = dx || 0; dy = dy || 0;
    this.animTime += 0.08;
  
    // Track cursor velocity for inertia-based movement (butterfly-catching feel)
    var cursorDX = dx - this.prevCursorX;
    var cursorDY = dy - this.prevCursorY;
    this.prevCursorX = dx;
    this.prevCursorY = dy;
    
    // Smooth velocity with inertia - creates the "chasing" feel
    this.cursorVelX = this.cursorVelX * 0.85 + cursorDX * 0.15;
    this.cursorVelY = this.cursorVelY * 0.85 + cursorDY * 0.15;
  
    // Smooth lean with inertia - butterfly-catching feel
    var leanZ = -accelX * 0.8;  
    var leanX = -accelY * 0.6;  
    var forwardPitch = -0.5 - speed * 0.004;

    // Add cursor vertical offset into body pitch — body tilts up/down with the arm reach
    // dy is positive when cursor is above the character
    var BODY_PITCH_STRENGTH = 0.0028;
    var BODY_PITCH_MAX = 0.55;
    var cursorPitch = Math.max(-BODY_PITCH_MAX, Math.min(BODY_PITCH_MAX, dy * BODY_PITCH_STRENGTH));

    // Slower interpolation for inertia feel
    this.baseRotZ += (leanZ - this.baseRotZ) * 0.12;
    this.baseRotX += (leanX + forwardPitch + cursorPitch - this.baseRotX) * 0.1;
  
    this.mesh.rotation.z = this.baseRotZ + this.flipZ;
    this.mesh.rotation.x = this.baseRotX + this.flipX;
    
    // Body turns to face the cursor in tandem with the arms
    // dx: world-units offset from char to cursor (positive = cursor right of char)
    // Map horizontal offset to Y-axis yaw: cursor right → rotate right
    // Base forward angle is PI/5; cursor pulls it left/right from there
    var BODY_TURN_STRENGTH = 0.0045;
    var BODY_TURN_MAX = 1.1;
    var cursorYaw = Math.max(-BODY_TURN_MAX, Math.min(BODY_TURN_MAX, -dx * BODY_TURN_STRENGTH));
    var targetRotY = Math.PI / 5 + cursorYaw;
    this.mesh.rotation.y += (targetRotY - this.mesh.rotation.y) * 0.09;
  
    var baseScale = 0.6 + Math.random() * 0.4;
    var thrustBoost = Math.max(0, accelY * 2.5); 
    this.lFlame.scale.set(1, baseScale + thrustBoost, .5);
    this.rFlame.scale.set(1, baseScale + thrustBoost, .5);
  
    var legCycle = Math.sin(this.animTime * 2.5) * 0.4;
    var legDrag = accelY * 0.5;
    
    // --- CURSOR-AIMED ARMS ---
    // Map mouse world-space position relative to character to get a reach vector
    // mouse.x / mouse.y are in [-1,1] normalized screen space
    // We project that into a shoulder-relative angle for strong cursor pointing
    
    // Character screen position approximation (center of viewport = 0,0 for mouse)
    // dx/dy is the pixel offset from char to target — use that for strong aiming
    var charToMouseX = dx;  // world units: positive = cursor is to the right
    var charToMouseY = dy;  // world units: positive = cursor is above
    
    // Convert to angles: atan2 gives us the angle from character to cursor
    // Scale into joint rotation ranges with strong magnetic pull
    var HAND_BIAS = 0.82;  // how strongly hands reach (0=none, 1=full lock-on)
    
    // Horizontal reach: left arm reaches left, right arm reaches right, both reach toward cursor
    // Z-axis rotation = side reach, X-axis rotation = forward/back pitch
    var cursorDistNorm = Math.sqrt(charToMouseX * charToMouseX + charToMouseY * charToMouseY);
    var normX = cursorDistNorm > 0.01 ? charToMouseX / Math.max(cursorDistNorm, 80) : 0;
    var normY = cursorDistNorm > 0.01 ? charToMouseY / Math.max(cursorDistNorm, 80) : 0;
    
    // Clamp to comfortable reach angles
    var reachPitchX = Math.max(-1.8, Math.min(1.8, normY * 2.2));   // pitch up/down toward cursor
    var reachSideZ  = Math.max(-1.6, Math.min(1.6, normX * 1.8));   // side reach toward cursor
    
    // Strong cursor pull blended with velocity response
    var velContribX = this.cursorVelY * 0.08;
    var velContribZ = this.cursorVelX * 0.06;
    
    // Right shoulder: shoulder is at -15x, cursor to the left means reach left (negative Z)
    var rArmTargetX = reachPitchX * HAND_BIAS + velContribX * (1 - HAND_BIAS);
    var rArmTargetZ = -reachSideZ * HAND_BIAS + velContribZ * (1 - HAND_BIAS) - 0.15;
    
    // Left shoulder: shoulder is at +15x, mirror of right
    var lArmTargetX = reachPitchX * HAND_BIAS + velContribX * (1 - HAND_BIAS);
    var lArmTargetZ =  reachSideZ * HAND_BIAS - velContribZ * (1 - HAND_BIAS) + 0.15;
    
    // Arms react OPPOSITE to body movement direction
    // Right arm
    this.joints[0].restX = rArmTargetX;
    this.joints[0].restZ = rArmTargetZ;
    // Left arm  
    this.joints[2].restX = lArmTargetX;
    this.joints[2].restZ = lArmTargetZ;
  
    // Calculate simulated gravity based on vertical position 
    // Y mapped between roughly 25 (bottom) to 175 (top).
    // gravityBias applies a heavier pull when close to 25.
    var gravityBias = norm(this.mesh.position.y, 25, 175, 1.5, 0);

    for (var i = 0; i < this.joints.length; i++) {
      var j = this.joints[i], p = j.pivot, ud = p.userData;
      
      // OPPOSING FORCES for butterfly-catching physics
      // Arms (indices 0-3) reach forward when body moves back, and vice versa
      // Legs (indices 4-7) swing opposite to direction of travel for balance
      
      var isArm = (i < 4);
      var isShoulder = (i === 0 || i === 2);
      var isLeg = (i >= 4);
      
      // Arms get opposing force - reach forward when pulled back
      // Legs get drag force - swing back when moving forward
      var forceX, forceZ;
      
      if (isShoulder) {
        // Shoulders: strong cursor aim (already set via restX/restZ above)
        forceX = 0;
        forceZ = 0;
      } else if (isArm) {
        // Elbows: follow through toward cursor direction — extend the arm reach
        forceX = reachPitchX * 0.55;
        forceZ = (i === 1 ? -reachSideZ : reachSideZ) * 0.45;
      } else {
        // Legs: natural swing opposite to movement direction
        forceX = -accelY * 1.5 + legDrag + gravityBias;
        forceZ = -accelX * 1.0;
      }
      
      var errX = (j.restX + forceX) - p.rotation.x;
      var errZ = (j.restZ + forceZ) - p.rotation.z;
      
      ud.velX = ud.velX * j.dampX + errX * j.stiffX;
      ud.velZ = ud.velZ * j.dampZ + errZ * j.stiffZ;
      
      p.rotation.x = Math.max(-j.limX, Math.min(j.limX, p.rotation.x + ud.velX));
      p.rotation.z = Math.max(-j.limZ, Math.min(j.limZ, p.rotation.z + ud.velZ));
    }
  
    this.rHipPivot.rotation.x += ((-0.2 + legCycle) - this.rHipPivot.rotation.x) * 0.35;
    this.lHipPivot.rotation.x += ((-0.2 - legCycle) - this.lHipPivot.rotation.x) * 0.35;
    this.rKneePivot.rotation.x += ((0.3 + Math.max(0, -legCycle) * 0.8) - this.rKneePivot.rotation.x) * 0.3;
    this.lKneePivot.rotation.x += ((0.3 + Math.max(0, legCycle) * 0.8) - this.lKneePivot.rotation.x) * 0.3;
    // More responsive head movement for cartoonish effect
    this.head.rotation.z += ((-leanZ * 0.6 + Math.sin(this.animTime) * 0.06) - this.head.rotation.z) * 0.15;
  };
  
  RagdollHuman.prototype.hitReaction = function() {
    // Random rotation and spin on collision - dramatic cartoon hit
    for (var i = 0; i < this.joints.length; i++) {
      this.joints[i].pivot.userData.velX += (Math.random() - 0.5) * 3.5;
      this.joints[i].pivot.userData.velZ += (Math.random() - 0.5) * 3.5;
    }
    
    // Random full-body rotation and spin
    var randomSpinX = (Math.random() - 0.5) * Math.PI * 2;  // Random X flip
    var randomSpinY = (Math.random() - 0.5) * Math.PI * 3;  // Random Y spin
    var randomSpinZ = (Math.random() - 0.5) * Math.PI * 2;  // Random Z roll
    
    // Apply spin using GSAP for smooth animation
    gsap.to(this, { 
      flipX: this.flipX + randomSpinX, 
      duration: 0.8, 
      ease: "power2.out" 
    });
    gsap.to(this.mesh.rotation, { 
      y: this.mesh.rotation.y + randomSpinY, 
      duration: 0.8, 
      ease: "power2.out" 
    });
    gsap.to(this, { 
      flipZ: this.flipZ + randomSpinZ, 
      duration: 0.8, 
      ease: "power2.out" 
    });
    
    this.baseRotZ += (Math.random() - 0.5) * 0.8;
    this.baseRotX += (Math.random() - 0.5) * 0.6;
  };

  
  
  function Enemy() {
    var geom = new THREE.IcosahedronGeometry(8, 1);
    var mat = new THREE.MeshPhongMaterial({ color: C.red, shininess: 0, flatShading: true });
    this.mesh = new THREE.Mesh(geom, mat);
    this.mesh.castShadow = true;
  }
  function Coin() {
    var geom = new THREE.CylinderGeometry(5, 5, 1, 12);
    var mat = new THREE.MeshPhongMaterial({ color: C.blue, shininess: 0, flatShading: true });
    this.mesh = new THREE.Mesh(geom, mat);
    this.mesh.castShadow = true;
  }
  function EnemiesHolder() {
    this.mesh = new THREE.Object3D();
    this.inUse = []; this.pool = [];
    this.speed = 2.0;
  }
  EnemiesHolder.prototype.spawn = function() {
    var e = this.pool.length ? this.pool.pop() : new Enemy();
    e.mesh.position.set(380 + Math.random() * 100, 25 + Math.random() * 150, 0);
    e.mesh.scale.setScalar(1 + Math.random() * 0.5);
    this.mesh.add(e.mesh);
    this.inUse.push(e);
  };
  EnemiesHolder.prototype.update = function() {
    for (var i = this.inUse.length - 1; i >= 0; i--) {
      var e = this.inUse[i];
      e.mesh.position.x -= this.speed;
      e.mesh.rotation.x += 0.07; e.mesh.rotation.z += 0.05;
      if (e.mesh.position.x < -300) {
        this.pool.push(e); this.mesh.remove(e.mesh); this.inUse.splice(i, 1);
      }
    }
  };
  function CoinsHolder() {
    this.mesh = new THREE.Object3D();
    this.inUse = []; this.pool = [];
    this.speed = 2.0;
  }
  CoinsHolder.prototype.spawn = function() {
    var c = this.pool.length ? this.pool.pop() : new Coin();
    c.mesh.position.set(380 + Math.random() * 100, 30 + Math.random() * 140, 0);
    this.mesh.add(c.mesh); this.inUse.push(c);
  };
  CoinsHolder.prototype.update = function() {
    for (var i = this.inUse.length - 1; i >= 0; i--) {
      var c = this.inUse[i];
      c.mesh.position.x -= this.speed;
      c.mesh.rotation.x += 0.08; c.mesh.rotation.y += 0.12;
      if (c.mesh.position.x < -300) {
        this.pool.push(c); this.mesh.remove(c.mesh); this.inUse.splice(i, 1);
      }
    }
  };
  
  function Burst(color, n) {
    this.mesh = new THREE.Object3D();
    this.parts = [];
    var g = new THREE.TetrahedronGeometry(3, 0);
    var m = new THREE.MeshPhongMaterial({ color: color, flatShading: true });
    for (var i = 0; i < (n || 8); i++) {
      var p = new THREE.Mesh(g, m);
      var angle = (Math.PI * 2 * i) / n;
      p.userData = {
        vx: Math.cos(angle) * (1.5 + Math.random()),
        vy: Math.sin(angle) * (1.5 + Math.random()),
        vr: Math.random() * 0.3
      };
      this.mesh.add(p); this.parts.push(p);
    }
    scene.add(this.mesh);
    this.life = 30;
    activeBursts.push(this);
  }
  var activeBursts = [];
  function updateBursts() {
    for (var i = activeBursts.length - 1; i >= 0; i--) {
      var b = activeBursts[i]; b.life--;
      for (var j = 0; j < b.parts.length; j++) {
        b.parts[j].position.x += b.parts[j].userData.vx;
        b.parts[j].position.y += b.parts[j].userData.vy;
        b.parts[j].rotation.x += b.parts[j].userData.vr;
      }
      b.mesh.scale.setScalar(b.life / 30);
      if (b.life <= 0) { scene.remove(b.mesh); activeBursts.splice(i, 1); }
    }
  }
  
  var STATUS = 'waiting';
  var score = 0, level = 1, energy = 10, MAX_E = 10;
  var distance = 0, coinsGot = 0, frame = 0;
  var spawnInt = 55, BASE_SPD = 2.0, COINS_PER_LEVEL = 20;
  var mouse = { x: 0, y: 0 };
  var sea, sky, humanoid, eHolder, cHolder;
  
  function buildWorld() {
    sea = new Sea(); sea.mesh.position.y = -600; scene.add(sea.mesh);
    sky = new Sky(); sky.mesh.position.y = -600; scene.add(sky.mesh);
    humanoid = new RagdollHuman();
    humanoid.mesh.scale.setScalar(0.25);
    humanoid.mesh.position.set(0, 100, 0);
    scene.add(humanoid.mesh);
    eHolder = new EnemiesHolder(); scene.add(eHolder.mesh);
    cHolder = new CoinsHolder(); scene.add(cHolder.mesh);
    for (var i = 0; i < 8; i++) {
      eHolder.pool.push(new Enemy());
      cHolder.pool.push(new Coin());
    }
  }
  
  function buildHearts() {
    var el = document.getElementById('hearts');
    el.innerHTML = '';
    for (var i = 0; i < MAX_E; i++) {
      var div = document.createElement('div');
      div.className = 'heart'; div.id = 'heart-' + i;
      div.innerHTML = '<svg viewBox="0 0 32 29.6"><path fill="#f25346" d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.9,16,21.2,16,21.2s16-11.3,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg>';
      el.appendChild(div);
    }
  }
  function refreshUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('dist').textContent = Math.round(distance);
    for (var i = 0; i < MAX_E; i++) {
      var h = document.getElementById('heart-' + i);
      if (h) h.classList.toggle('lost', i >= energy);
    }
  }
  function setLevelRing(pct) {
    var circ = 2 * Math.PI * 82;
    document.getElementById('lvlRing').setAttribute('stroke-dashoffset', circ * (1 - pct));
  }
  
  function norm(v, vmin, vmax, tmin, tmax) {
    var nv = Math.max(Math.min(v, vmax), vmin);
    return tmin + ((nv - vmin) / (vmax - vmin)) * (tmax - tmin);
  }
  
  document.addEventListener('mousemove', function(e) {
    mouse.x = -1 + (e.clientX / WIDTH) * 2;
    mouse.y = 1 - (e.clientY / HEIGHT) * 2;
    
    var cursorEl = document.getElementById('cursor');
    if (cursorEl) {
      cursorEl.style.left = e.clientX + 'px';
      cursorEl.style.top = e.clientY + 'px';
    }
  });

  // Scroll listener: user can push into reverse, but magnetic bias always pulls forward
  // reverseLerp tracks the "player intent" offset from the magnetic center
  var reverseLerp = 0.0;         // user-controlled deviation: negative = reverse push
  var MAGNETIC_FORWARD = 1.0;    // natural resting forward speed
  var MAGNETIC_STRENGTH = 0.018; // how hard the magnet pulls back to forward per frame
  var REVERSE_LIMIT = -2.2;      // how far back the user can push

  window.addEventListener('wheel', function(e) {
    // Scrolling down adds negative offset (pulls toward reverse), up adds positive
    reverseLerp -= e.deltaY * 0.0012;
    reverseLerp = Math.max(REVERSE_LIMIT, Math.min(1.2, reverseLerp));
  }, { passive: true });
  
  window.addEventListener('pointerdown', function(e) {
    if (STATUS !== 'playing') return;
    if (e.pointerType === 'touch') return; 
  
    if (e.button === 0) { 
      // Left click: randomize all three rotation axes with dramatic spins
      var randX = (Math.random() - 0.5) * Math.PI * 4;
      var randY = (Math.random() - 0.5) * Math.PI * 4;
      var randZ = (Math.random() - 0.5) * Math.PI * 4;
      gsap.to(humanoid, {
        flipX: humanoid.flipX + randX,
        flipZ: humanoid.flipZ + randZ,
        duration: 0.6,
        ease: "power2.inOut"
      });
      gsap.to(humanoid.mesh.rotation, {
        y: humanoid.mesh.rotation.y + randY,
        duration: 0.6,
        ease: "power2.inOut"
      });
    } else if (e.button === 2) { 
      // Right click: reset character orientation back to neutral
      gsap.to(humanoid, { flipX: 0, flipZ: 0, duration: 0.5, ease: "power3.out" });
      gsap.to(humanoid.mesh.rotation, { y: Math.PI / 5, duration: 0.5, ease: "power3.out" });
      humanoid.baseRotX = 0;
      humanoid.baseRotZ = 0;
    }
  });
  
  window.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  
  window.addEventListener('keydown', function(e) {
    if (STATUS !== 'playing') return;
    if (e.code === 'Space') {
      e.preventDefault();
      gsap.to(humanoid, { flipZ: "-=" + (Math.PI * 2), duration: 0.65, ease: "power2.inOut" });
    }
  });
  
  function startGame() {
    STATUS = 'playing';
    score = 0; energy = MAX_E; distance = 0;
    coinsGot = 0; level = 1; frame = 0;
    spawnInt = 55;
    eHolder.speed = cHolder.speed = BASE_SPD;
    eHolder.inUse.forEach(function(e) { eHolder.mesh.remove(e.mesh); });
    cHolder.inUse.forEach(function(c) { cHolder.mesh.remove(c.mesh); });
    eHolder.inUse = []; cHolder.inUse = [];
    
    humanoid.flipX = 0; humanoid.flipZ = 0;
    humanoid.baseRotX = 0; humanoid.baseRotZ = 0;
  
    setLevelRing(0);
    document.getElementById('level-num').textContent = 1;
    refreshUI();
    document.getElementById('screen-welcome').classList.remove('visible');
    document.getElementById('screen-gameover').classList.remove('visible');
  }
  
  function doGameOver() {
    STATUS = 'gameover';
    document.getElementById('go-score').textContent = 'You scored ' + score + ' points';
    document.getElementById('screen-gameover').classList.add('visible');
  }
  
  function levelUp() {
    level++;
    document.getElementById('level-num').textContent = level;
    setLevelRing(0);
    var spd = BASE_SPD * (1 + level * 0.22);
    eHolder.speed = cHolder.speed = spd;
    spawnInt = Math.max(18, 55 - level * 4);
  }
  
  var _pWorld = new THREE.Vector3(), _eWorld = new THREE.Vector3();
  
  function checkCollisions() {
    humanoid.mesh.getWorldPosition(_pWorld);
    for (var i = eHolder.inUse.length - 1; i >= 0; i--) {
      var en = eHolder.inUse[i];
      en.mesh.getWorldPosition(_eWorld);
      if (_pWorld.distanceTo(_eWorld) < 8) {
        new Burst(C.red, 10).mesh.position.copy(_eWorld);
        eHolder.pool.push(en); eHolder.mesh.remove(en.mesh); eHolder.inUse.splice(i, 1);
        energy--; refreshUI();
        gsap.fromTo('#hit-flash', { opacity: 0.55 }, { opacity: 0, duration: 0.35 });
        humanoid.hitReaction();
        if (energy <= 0) { doGameOver(); return; }
      }
    }
    for (var j = cHolder.inUse.length - 1; j >= 0; j--) {
      var cn = cHolder.inUse[j];
      cn.mesh.getWorldPosition(_eWorld);
      if (_pWorld.distanceTo(_eWorld) < 8) {
        new Burst(C.blue, 8).mesh.position.copy(_eWorld);
        cHolder.pool.push(cn); cHolder.mesh.remove(cn.mesh); cHolder.inUse.splice(j, 1);
        score++; coinsGot++;
        gsap.fromTo('#coin-flash', { opacity: 0.3 }, { opacity: 0, duration: 0.25 });
        var lvlPct = (coinsGot % COINS_PER_LEVEL) / COINS_PER_LEVEL;
        setLevelRing(lvlPct);
        if (coinsGot > 0 && coinsGot % COINS_PER_LEVEL === 0) levelUp();
        refreshUI();
      }
    }
  }
  
  function loop() {
    requestAnimationFrame(loop);
    frame++;

    // Magnetic forward bias: reverseLerp drifts back toward 0 each frame (magnet to forward)
    // The further into reverse the user pushed, the harder it pulls back
    reverseLerp += (0 - reverseLerp) * MAGNETIC_STRENGTH;

    // targetRotSpeed = magnetic forward speed + user's reverse offset
    targetRotSpeed = MAGNETIC_FORWARD + reverseLerp;

    // Interpolate visual rotation toward the combined target
    currentRotSpeed += (targetRotSpeed - currentRotSpeed) * 0.05;

    // Apply the speed multiplier to the sky and planet
    sea.mesh.rotation.z += 0.005 * currentRotSpeed;
    sky.mesh.rotation.z += 0.002 * currentRotSpeed;
    sea.moveWaves();
  
    var cycle = (sea.mesh.rotation.z / Math.PI) % planetColors.length; 
    var idx1 = Math.floor(Math.abs(cycle)), idx2 = (idx1 + 1) % planetColors.length;
    var c1 = new THREE.Color(planetColors[idx1]), c2 = new THREE.Color(planetColors[idx2]);
    sea.mesh.material.color.copy(c1).lerp(c2, Math.abs(cycle) - idx1);
  
    if (STATUS === 'playing') {
      // Tie distance tracking to our dynamic scroll speed as well
      distance += 0.2 * Math.max(0.1, currentRotSpeed);

      var tx = norm(mouse.x, -1, 1, -100, 100), ty = norm(mouse.y, -1, 1, 25, 175);
      var dx = tx - humanoid.mesh.position.x, dy = ty - humanoid.mesh.position.y;
      humanoid.mesh.position.x += dx * 0.1; humanoid.mesh.position.y += dy * 0.1;

      humanoid.update(dx * 0.003, dy * 0.003, eHolder.speed, dx, dy);
  
      if (frame % Math.round(spawnInt) === 0) {
        if (Math.random() < 0.45) eHolder.spawn(); else cHolder.spawn();
      }
      eHolder.update(); cHolder.update();
      updateBursts(); checkCollisions();
    } else {
      humanoid.mesh.position.y = 100 + Math.sin(Date.now() * 0.001) * 6;
      humanoid.update(0, 0, 0, 0, 0);
    }
    renderer.render(scene, camera);
  }
  
  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-replay').addEventListener('click', startGame);
  
  window.addEventListener('load', function() {
    createScene(); createLights(); buildWorld(); buildHearts();
    refreshUI(); loop();
    startGame(); 
  });
</script>
