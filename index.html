<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>neverever.land</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23020111' rx='6'/%3E%3Ccircle cx='16' cy='10' r='7' fill='%23e8e8e8' stroke='%23aaa' stroke-width='0.5'/%3E%3Cellipse cx='16' cy='10' rx='4.5' ry='3.5' fill='%231a2a4a'/%3E%3Cellipse cx='14' cy='8.5' rx='1.5' ry='1' fill='%234466aa' opacity='0.7'/%3E%3Crect x='9' y='16' width='14' height='10' rx='3' fill='%23e8e8e8' stroke='%23aaa' stroke-width='0.5'/%3E%3Crect x='9.5' y='17' width='4' height='6' rx='1' fill='%23ccc' stroke='%23aaa' stroke-width='0.3'/%3E%3Crect x='4' y='17' width='5.5' height='3' rx='1.5' fill='%23e8e8e8' stroke='%23aaa' stroke-width='0.4'/%3E%3Crect x='22.5' y='17' width='5.5' height='3' rx='1.5' fill='%23e8e8e8' stroke='%23aaa' stroke-width='0.4'/%3E%3Ccircle cx='4.5' cy='18.5' r='1.8' fill='%23ccc'/%3E%3Ccircle cx='27.5' cy='18.5' r='1.8' fill='%23ccc'/%3E%3Crect x='10' y='25' width='4' height='5' rx='1.5' fill='%23e8e8e8' stroke='%23aaa' stroke-width='0.4'/%3E%3Crect x='18' y='25' width='4' height='5' rx='1.5' fill='%23e8e8e8' stroke='%23aaa' stroke-width='0.4'/%3E%3Crect x='9.5' y='29' width='5' height='2.5' rx='1' fill='%23bbb'/%3E%3Crect x='17.5' y='29' width='5' height='2.5' rx='1' fill='%23bbb'/%3E%3Ccircle cx='4' cy='4' r='0.6' fill='%23fff' opacity='0.8'/%3E%3Ccircle cx='28' cy='6' r='0.8' fill='%23fff' opacity='0.9'/%3E%3Ccircle cx='26' cy='28' r='0.5' fill='%23fff' opacity='0.7'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; tap-highlight-color: transparent; }
  html, body { overscroll-behavior: none; touch-action: none; }
  body {
    font-family: 'Avenir Next', Avenir, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    background: #020111;
    user-select: none;
    -webkit-user-select: none;
    cursor: none;
  }
  #world {
    position: fixed;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #020111 0%, #0d0820 100%);
    overflow: hidden;
    touch-action: none;
    transition: background 1.2s ease;
  }
  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  /* Oxygen rail — thin bar, color shifts with depletion */
  #oxy-rail-bg {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.06);
  }
  #oxy-rail {
    height: 100%;
    background: #00e5ff;
    width: 100%;
    transform-origin: left center;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), background 1.5s ease;
  }

  /* Survival timer — top right, whisper quiet */
  #timer {
    position: absolute;
    top: 20px; right: 22px;
    font-size: clamp(0.7em, 2vw, 0.95em);
    font-weight: 400;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }

  #lift-hint {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none; z-index: 15;
    opacity: 0; transition: opacity 0.4s;
  }
  #lift-hint.visible { opacity: 1; }
  #lift-hint p { color: rgba(255,255,255,0.7); font-size: 1em; font-weight: 400; letter-spacing: 2px; text-transform: lowercase; }

  /* Void overlay — invisible tap-catcher, darkness comes from the scene itself */
  #void-overlay {
    position: fixed; inset: 0;
    background: transparent;
    opacity: 0; pointer-events: none;
    z-index: 25;
  }
  #void-overlay.active { opacity: 1; pointer-events: all; }

  /* Heartbeat prompt */
  #heartbeat-prompt {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none; z-index: 35;
    opacity: 0; transition: opacity 0.6s;
  }
  #heartbeat-prompt.visible { opacity: 1; }
  #heartbeat-prompt .hb-text {
    color: rgba(255,255,255,0.5);
    font-size: clamp(0.85em, 2.5vw, 1em);
    letter-spacing: 3px;
    text-transform: lowercase;
    font-weight: 300;
  }
  #hb-bar-bg {
    width: 160px; height: 2px;
    background: rgba(255,255,255,0.1);
    margin: 16px auto 0;
    border-radius: 1px;
  }
  #hb-bar {
    height: 100%; width: 0%;
    background: #cc1133;
    border-radius: 1px;
    transition: width 0.1s, background 0.8s;
  }

  /* Comet tail flash */
  #comet-flash {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,220,80,0.15), transparent 70%);
    opacity: 0; pointer-events: none; z-index: 30;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 40; pointer-events: none;
    opacity: 0; transition: opacity .5s;
    background: rgba(0,0,0,0.4);
  }
  .screen.visible { opacity: 1; pointer-events: all; }
  .screen h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(3em, 8vw, 5.5em);
    font-weight: 700; color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,.2);
    margin-bottom: .15em; letter-spacing: -1px;
  }
  .screen .sub {
    font-size: clamp(0.9em, 2.5vw, 1.1em);
    color: rgba(255,255,255,.55);
    margin-bottom: 2em; min-height: 1.5em;
    letter-spacing: 1px; font-weight: 300;
    text-align: center; padding: 0 20px;
  }
  .btn-play {
    pointer-events: all;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px; padding: 12px 36px;
    font-size: 0.85em; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, border-color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-play:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .btn-play:active { background: rgba(255,255,255,0.08); }
  .btn-link {
    display: block; margin-top: 18px;
    color: rgba(255,255,255,0.28);
    font-size: 0.75em; letter-spacing: 2px;
    text-decoration: none; text-transform: lowercase;
    transition: color 0.2s;
    pointer-events: all;
  }
  .btn-link:hover { color: rgba(255,255,255,0.65); }

  #hit-flash { position: fixed; inset: 0; background: #f25346; opacity: 0; pointer-events: none; z-index: 30; mix-blend-mode: multiply; }

  #cursor {
    position: fixed;
    width: 32px; height: 20px;
    border: 1.5px solid rgba(0, 229, 255, 0.35);
    border-radius: 50%;
    pointer-events: none; z-index: 100;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, border-color 0.2s;
  }
  #cursor.active {
    width: 44px; height: 28px;
    border-color: rgba(242, 83, 70, 0.7);
  }

  /* Shooting star DOM element (pure CSS streak) */
  #shooting-star {
    position: fixed;
    width: 120px; height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.9), rgba(255,255,255,0));
    border-radius: 1px;
    pointer-events: none; z-index: 8;
    opacity: 0;
    transform-origin: left center;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="world"></div>
<div id="hit-flash"></div>
<div id="comet-flash"></div>
<div id="shooting-star"></div>

<div id="ui">
  <div id="timer">0:00</div>
  <div id="oxy-rail-bg"><div id="oxy-rail"></div></div>
</div>

<div id="void-overlay"></div>
<div id="heartbeat-prompt">
  <p class="hb-text">tap to restore heartbeat</p>
  <div id="hb-bar-bg"><div id="hb-bar"></div></div>
</div>

<div id="lift-hint">
  <p>tap anywhere to get up</p>
</div>

<div class="screen" id="screen-welcome">
  <h1>neverever.land</h1>
  <p class="sub">a floating astronaut tamagotchi<br>that you need to feed</p>
  <button class="btn-play" id="btn-start">begin</button>
</div>

<div class="screen" id="screen-gameover">
  <h1>still here</h1>
  <p class="sub" id="go-score"></p>
  <button class="btn-play" id="btn-replay">again</button>
  <a href="https://zack.cx" target="_blank" class="btn-link">zack.cx</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<script>
"use strict";

document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
history.pushState(null, '', location.href);
window.addEventListener('popstate', function() { history.pushState(null, '', location.href); });

var C = {
  red: 0xf25346, white: 0xd8d0d1,
  blue: 0x68c3c0, yellow: 0xf4e783,
  orbBlue: 0x4499ff, orbRed: 0xf23030, orbBlack: 0x111118,
  oxygenCanister: 0x00e5ff,
  mysteryBox: 0xffcc00
};

var planetColors = [0x68c3c0, 0x4a3b69, 0x2b596b, 0x5c3a41];
var scene, camera, renderer;
var WIDTH = window.innerWidth, HEIGHT = window.innerHeight;
var targetRotSpeed = 1.0, currentRotSpeed = 1.0;

// ─── Scene ─────────────────────────────────────────────────────────────────
function createScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x1a1025, 100, 950);
  camera = new THREE.PerspectiveCamera(60, WIDTH / HEIGHT, 1, 10000);
  camera.position.set(0, 100, 200);
  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(WIDTH, HEIGHT);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('world').appendChild(renderer.domElement);
  window.addEventListener('resize', function() {
    WIDTH = window.innerWidth; HEIGHT = window.innerHeight;
    camera.aspect = WIDTH / HEIGHT;
    camera.updateProjectionMatrix();
    renderer.setSize(WIDTH, HEIGHT);
  });
}

function createLights() {
  scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, 0.5));
  scene.add(new THREE.AmbientLight(0x404040, 0.7));
  var sun = new THREE.DirectionalLight(0xffffff, 0.9);
  sun.position.set(150, 350, 350);
  sun.castShadow = true;
  sun.shadow.camera.left = -500; sun.shadow.camera.right = 500;
  sun.shadow.camera.top = 500; sun.shadow.camera.bottom = -500;
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 1000;
  sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
  scene.add(sun);
}

// ─── Sea ───────────────────────────────────────────────────────────────────
function Sea() {
  var geom = new THREE.CylinderGeometry(600, 600, 800, 40, 10);
  geom.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
  var pos = geom.attributes.position;
  this.waveData = [];
  for (var i = 0; i < pos.count; i++) {
    this.waveData.push({
      x: pos.getX(i), y: pos.getY(i), z: pos.getZ(i),
      ang: Math.random() * Math.PI * 2,
      amp: 5 + Math.random() * 15,
      speed: 0.016 + Math.random() * 0.032,
    });
  }
  var mat = new THREE.MeshPhongMaterial({ color: planetColors[0], transparent: true, opacity: 0.8, flatShading: true });
  this.mesh = new THREE.Mesh(geom, mat);
  this.mesh.receiveShadow = true;
}
Sea.prototype.moveWaves = function() {
  var pos = this.mesh.geometry.attributes.position;
  for (var i = 0, d; i < this.waveData.length; i++) {
    d = this.waveData[i];
    pos.setX(i, d.x + Math.cos(d.ang) * d.amp);
    pos.setY(i, d.y + Math.sin(d.ang) * d.amp);
    d.ang += d.speed;
  }
  pos.needsUpdate = true;
  this.mesh.geometry.computeVertexNormals();
};

function Star() {
  var m = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshBasicMaterial({ color: 0xffffff }));
  this.mesh = new THREE.Object3D();
  this.mesh.add(m);
}
function Sky() {
  this.mesh = new THREE.Object3D();
  for (var i = 0; i < 150; i++) {
    var s = new Star();
    var a = Math.random() * Math.PI * 2;
    var h = 650 + Math.random() * 300;
    s.mesh.position.set(Math.cos(a) * h, Math.sin(a) * h, -200 - Math.random() * 600);
    this.mesh.add(s.mesh);
  }
}

function makeBox(w, h, d, mat) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
}

// ─── RAGDOLL ───────────────────────────────────────────────────────────────
function RagdollHuman() {
  this.mesh = new THREE.Object3D();
  this.mesh.rotation.y = Math.PI * 0.75;
  this.baseRotX = -0.55;
  this.baseRotZ = 0;
  this.flipX = 0;
  this.flipZ = 0;
  this.mesh.rotation.x = -0.55;
  this.singularity = false;
  this.slingVx = 0; this.slingVy = 0; this.slingFrames = 0;

  this.suitMat  = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true });
  var jointMat  = new THREE.MeshPhongMaterial({ color: 0x666666, flatShading: true });
  var visorMat  = new THREE.MeshPhongMaterial({ color: 0x111115, flatShading: true, shininess: 100, specular: 0xffffff });
  var packMat   = new THREE.MeshPhongMaterial({ color: 0xdddddd, flatShading: true });
  var thrusterMat = new THREE.MeshPhongMaterial({ color: 0x444444, flatShading: true });
  this.flameMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

  var head = makeBox(18, 18, 18, this.suitMat);
  head.position.set(0, 34, 0); head.castShadow = true;
  this.mesh.add(head); this.head = head;

  var visor = makeBox(14, 10, 4, visorMat);
  visor.position.set(0, 2, 8);
  head.add(visor);

  var neck = makeBox(12, 4, 12, jointMat);
  neck.position.set(0, 24, 0);
  this.mesh.add(neck);

  var torsoU = makeBox(24, 16, 16, this.suitMat);
  torsoU.position.set(0, 15, 0); torsoU.castShadow = true;
  this.mesh.add(torsoU);

  var pack = makeBox(18, 22, 10, packMat);
  pack.position.set(0, 0, -12); pack.castShadow = true;
  torsoU.add(pack);

  var lThruster = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3.5, 8, 8), thrusterMat);
  lThruster.position.set(-6, -11, 0); pack.add(lThruster);
  var rThruster = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3.5, 8, 8), thrusterMat);
  rThruster.position.set(6, -11, 0); pack.add(rThruster);

  this.lFlame = new THREE.Mesh(new THREE.ConeGeometry(2.5, 12, 8), this.flameMat);
  this.lFlame.position.set(0, -9, 0); this.lFlame.rotation.x = Math.PI;
  lThruster.add(this.lFlame);
  this.rFlame = new THREE.Mesh(new THREE.ConeGeometry(2.5, 12, 8), this.flameMat);
  this.rFlame.position.set(0, -9, 0); this.rFlame.rotation.x = Math.PI;
  rThruster.add(this.rFlame);

  var torsoL = makeBox(22, 12, 14, this.suitMat);
  torsoL.position.set(0, 3, 0); torsoL.castShadow = true;
  this.mesh.add(torsoL);

  var pelvis = makeBox(20, 8, 12, jointMat);
  pelvis.position.set(0, -5, 0);
  this.mesh.add(pelvis);

  // Arms
  this.rShoulderPivot = new THREE.Object3D();
  this.rShoulderPivot.position.set(-15, 16, 0);
  this.rShoulderPivot.rotation.x =  0.65;
  this.rShoulderPivot.rotation.z = -0.55;
  this.rShoulderPivot.userData = { velX: 0, velZ: 0 };
  var rUpperArm = makeBox(8, 18, 8, this.suitMat);
  rUpperArm.position.set(0, -9, 0);
  this.rShoulderPivot.add(rUpperArm);
  this.rElbowPivot = new THREE.Object3D();
  this.rElbowPivot.position.set(0, -18, 0);
  this.rElbowPivot.rotation.x =  0.10;
  this.rElbowPivot.rotation.z = -0.20;
  this.rElbowPivot.userData = { velX: 0, velZ: 0 };
  var rForearm = makeBox(7, 14, 7, this.suitMat);
  rForearm.position.set(0, -7, 0);
  this.rElbowPivot.add(rForearm);
  this.rShoulderPivot.add(this.rElbowPivot);
  this.mesh.add(this.rShoulderPivot);

  this.lShoulderPivot = new THREE.Object3D();
  this.lShoulderPivot.position.set(15, 16, 0);
  this.lShoulderPivot.rotation.x =  0.65;
  this.lShoulderPivot.rotation.z =  0.55;
  this.lShoulderPivot.userData = { velX: 0, velZ: 0 };
  var lUpperArm = makeBox(8, 18, 8, this.suitMat);
  lUpperArm.position.set(0, -9, 0);
  this.lShoulderPivot.add(lUpperArm);
  this.lElbowPivot = new THREE.Object3D();
  this.lElbowPivot.position.set(0, -18, 0);
  this.lElbowPivot.rotation.x =  0.10;
  this.lElbowPivot.rotation.z =  0.20;
  this.lElbowPivot.userData = { velX: 0, velZ: 0 };
  var lForearm = makeBox(7, 14, 7, this.suitMat);
  lForearm.position.set(0, -7, 0);
  this.lElbowPivot.add(lForearm);
  this.lShoulderPivot.add(this.lElbowPivot);
  this.mesh.add(this.lShoulderPivot);

  // Legs
  this.rHipPivot = new THREE.Object3D();
  this.rHipPivot.position.set(-8, -9, 0);
  this.rHipPivot.userData = { velX: 0, velZ: 0 };
  var rThigh = makeBox(10, 18, 10, this.suitMat);
  rThigh.position.set(0, -9, 0);
  this.rHipPivot.add(rThigh);
  this.rKneePivot = new THREE.Object3D();
  this.rKneePivot.position.set(0, -18, 0);
  this.rKneePivot.userData = { velX: 0, velZ: 0 };
  var rShin = makeBox(9, 16, 9, this.suitMat);
  rShin.position.set(0, -8, 0);
  this.rKneePivot.add(rShin);
  this.rHipPivot.add(this.rKneePivot);
  this.mesh.add(this.rHipPivot);

  this.lHipPivot = new THREE.Object3D();
  this.lHipPivot.position.set(8, -9, 0);
  this.lHipPivot.userData = { velX: 0, velZ: 0 };
  var lThigh = makeBox(10, 18, 10, this.suitMat);
  lThigh.position.set(0, -9, 0);
  this.lHipPivot.add(lThigh);
  this.lKneePivot = new THREE.Object3D();
  this.lKneePivot.position.set(0, -18, 0);
  this.lKneePivot.userData = { velX: 0, velZ: 0 };
  var lShin = makeBox(9, 16, 9, this.suitMat);
  lShin.position.set(0, -8, 0);
  this.lKneePivot.add(lShin);
  this.lHipPivot.add(this.lKneePivot);
  this.mesh.add(this.lHipPivot);

  this.joints = [
    { pivot: this.rShoulderPivot, stiffX: 0.06, stiffZ: 0.06, dampX: 0.90, dampZ: 0.90, limX: 3.2, limZ: 2.8 },
    { pivot: this.lShoulderPivot, stiffX: 0.06, stiffZ: 0.06, dampX: 0.90, dampZ: 0.90, limX: 3.2, limZ: 2.8 },
    { pivot: this.rElbowPivot,    stiffX: 0.05, stiffZ: 0.04, dampX: 0.93, dampZ: 0.93, limX: 1.6, limZ: 1.0 },
    { pivot: this.lElbowPivot,    stiffX: 0.05, stiffZ: 0.04, dampX: 0.93, dampZ: 0.93, limX: 1.6, limZ: 1.0 },
    { pivot: this.rHipPivot,      stiffX: 0.18, stiffZ: 0.14, dampX: 0.68, dampZ: 0.68, limX: 1.4, limZ: 0.6 },
    { pivot: this.rKneePivot,     stiffX: 0.15, stiffZ: 0.11, dampX: 0.68, dampZ: 0.68, limX: 1.5, limZ: 0.3 },
    { pivot: this.lHipPivot,      stiffX: 0.18, stiffZ: 0.14, dampX: 0.68, dampZ: 0.68, limX: 1.4, limZ: 0.6 },
    { pivot: this.lKneePivot,     stiffX: 0.15, stiffZ: 0.11, dampX: 0.68, dampZ: 0.68, limX: 1.5, limZ: 0.3 },
  ];

  this.armDrift = [
    { phaseX: Math.random()*Math.PI*2, phaseZ: Math.random()*Math.PI*2, speedX: 0.009+Math.random()*0.006, speedZ: 0.007+Math.random()*0.005, ampX: 0.16, ampZ: 0.20 },
    { phaseX: Math.random()*Math.PI*2, phaseZ: Math.random()*Math.PI*2, speedX: 0.009+Math.random()*0.006, speedZ: 0.007+Math.random()*0.005, ampX: 0.16, ampZ: 0.20 },
    { phaseX: Math.random()*Math.PI*2, phaseZ: Math.random()*Math.PI*2, speedX: 0.011+Math.random()*0.007, speedZ: 0.009+Math.random()*0.006, ampX: 0.10, ampZ: 0.12 },
    { phaseX: Math.random()*Math.PI*2, phaseZ: Math.random()*Math.PI*2, speedX: 0.011+Math.random()*0.007, speedZ: 0.009+Math.random()*0.006, ampX: 0.10, ampZ: 0.12 },
  ];
  this.animTime = 0;
}

RagdollHuman.prototype.update = function(accelX, accelY, speed, dx, dy) {
  dx = dx || 0; dy = dy || 0;
  this.animTime += 0.08;

  // ── Scroll forces — read directly from reverseLerp ───────────────────────
  var reverseForce = Math.max(0, -reverseLerp) / 2.2;
  var forwardForce = Math.max(0,  reverseLerp) / 1.2;

  // forward: nose pitches DOWN, arms trail BACK, limbs stream LEFT
  // reverse: nose arches UP,   arms fly FORWARD, limbs stream RIGHT
  var inertiaPitch = forwardForce * 0.40 - reverseForce * 0.35;
  var armTrail     = forwardForce * 0.75 - reverseForce * 0.65;
  var sideDrift    = forwardForce * 0.50 - reverseForce * 0.50;

  // ── 1. Body ───────────────────────────────────────────────────────────────
  var altFactor   = Math.max(0, Math.min(1, (this.mesh.position.y - 25) / 150));
  var targetBodyX = (-0.85 + altFactor * 0.60) + inertiaPitch;
  var leanZ       = -accelX * 0.8;

  this.baseRotZ += (leanZ       - this.baseRotZ) * 0.10;
  this.baseRotX += (targetBodyX - this.baseRotX) * 0.06;

  this.mesh.rotation.z = this.baseRotZ + this.flipZ;
  this.mesh.rotation.x = this.baseRotX + this.flipX;

  var BIAS_Y = Math.PI * 0.75;
  var cursorNudge = Math.max(-0.3, Math.min(0.3, -dx * 0.003));
  this.mesh.rotation.y += (BIAS_Y + cursorNudge - this.mesh.rotation.y) * 0.07;

  // ── 2. Thruster flames ──────────────────────────────────────────────────
  var baseScale   = 0.6 + Math.random() * 0.4;
  var thrustBoost = Math.max(0, accelY * 2.5);
  this.lFlame.scale.set(1, baseScale + thrustBoost, 0.5);
  this.rFlame.scale.set(1, baseScale + thrustBoost, 0.5);

  // ── 3. Advance drift phases ─────────────────────────────────────────────
  for (var ad = 0; ad < this.armDrift.length; ad++) {
    this.armDrift[ad].phaseX += this.armDrift[ad].speedX;
    this.armDrift[ad].phaseZ += this.armDrift[ad].speedZ;
  }
  var dRS = this.armDrift[0], dLS = this.armDrift[1],
      dRE = this.armDrift[2], dLE = this.armDrift[3];

  // ── 4. Limbs ─────────────────────────────────────────────────────────────
  var distFromCenter = Math.sqrt(mouse.x * mouse.x + mouse.y * mouse.y);
  var centerProximity = Math.max(0, 1 - distFromCenter / Math.SQRT2);
  var armReach = 0.65 - centerProximity * 2.2;

  this.joints[0].restX =  armReach + Math.sin(dRS.phaseX) * dRS.ampX + armTrail;
  this.joints[0].restZ = -0.55 + Math.sin(dRS.phaseZ) * dRS.ampZ + sideDrift;
  this.joints[1].restX =  armReach + Math.sin(dLS.phaseX) * dLS.ampX + armTrail;
  this.joints[1].restZ =  0.55 + Math.sin(dLS.phaseZ) * dLS.ampZ + sideDrift;
  this.joints[2].restX =  0.10 + centerProximity * -0.8 + Math.sin(dRE.phaseX) * dRE.ampX + armTrail * 0.6;
  this.joints[2].restZ = -0.20 + Math.sin(dRE.phaseZ) * dRE.ampZ + sideDrift * 0.75;
  this.joints[3].restX =  0.10 + centerProximity * -0.8 + Math.sin(dLE.phaseX) * dLE.ampX + armTrail * 0.6;
  this.joints[3].restZ =  0.20 + Math.sin(dLE.phaseZ) * dLE.ampZ + sideDrift * 0.75;

  // ── 5. Solve all joints ─────────────────────────────────────────────────
  for (var i = 0; i < this.joints.length; i++) {
    var j = this.joints[i], p = j.pivot, ud = p.userData;

    if (i >= 4) {
      var legTrail = forwardForce * 0.55 - reverseForce * 0.55;
      j.restX =  0.08 + Math.sin(this.animTime * 0.9 + i) * 0.12 + legTrail;
      j.restZ =  (i === 4 || i === 5 ? 0.06 : -0.06) + Math.sin(this.animTime * 0.7 + i) * 0.08 + sideDrift * 0.50;
    }

    var errX = j.restX - p.rotation.x;
    var errZ = j.restZ - p.rotation.z;

    ud.velX = ud.velX * j.dampX + errX * j.stiffX;
    ud.velZ = ud.velZ * j.dampZ + errZ * j.stiffZ;

    p.rotation.x = Math.max(-j.limX, Math.min(j.limX, p.rotation.x + ud.velX));
    p.rotation.z = Math.max(-j.limZ, Math.min(j.limZ, p.rotation.z + ud.velZ));
  }

  // ── 6. Head ─────────────────────────────────────────────────────────────
  this.head.rotation.z += ((-leanZ * 0.5 + Math.sin(this.animTime * 0.8) * 0.05) - this.head.rotation.z) * 0.12;
  this.head.rotation.x += ((-forwardForce * 0.30 + reverseForce * 0.35) - this.head.rotation.x) * 0.10;
};

RagdollHuman.prototype.hitReaction = function() {
  for (var i = 0; i < this.joints.length; i++) {
    this.joints[i].pivot.userData.velX += (Math.random() - 0.5) * 3.5;
    this.joints[i].pivot.userData.velZ += (Math.random() - 0.5) * 3.5;
  }
  gsap.to(this, { flipX: this.flipX + (Math.random()-0.5)*Math.PI*2, duration: 0.8, ease: "power2.out" });
  gsap.to(this.mesh.rotation, { y: this.mesh.rotation.y + (Math.random()-0.5)*Math.PI*3, duration: 0.8, ease: "power2.out" });
  gsap.to(this, { flipZ: this.flipZ + (Math.random()-0.5)*Math.PI*2, duration: 0.8, ease: "power2.out" });
  this.baseRotZ += (Math.random() - 0.5) * 0.8;
  this.baseRotX += (Math.random() - 0.5) * 0.6;
};

// ─── Orbs (tiered enemy system) ────────────────────────────────────────────
var ORB_DEFS = {
  blue:  { color: 0x4499ff, emissive: 0x001133, oxygenCost: 1.0,  size: 8,  hitStr: 'light'       },
  red:   { color: 0xf23030, emissive: 0x220000, oxygenCost: 2.5,  size: 9,  hitStr: 'heavy'       },
  black: { color: 0x111118, emissive: 0x000000, oxygenCost: 99,   size: 10, hitStr: 'singularity' }
};

function Orb(type) {
  var def = ORB_DEFS[type] || ORB_DEFS.blue;
  this.orbType = type;
  this.mat = new THREE.MeshPhongMaterial({
    color: def.color, emissive: def.emissive,
    shininess: type === 'black' ? 0 : 20, flatShading: true
  });
  this.mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(def.size, 1), this.mat);
  this.mesh.castShadow = true;
}

function OrbsHolder() {
  this.mesh = new THREE.Object3D();
  this.inUse = [];
  this.pools = { blue: [], red: [], black: [] };
  this.speed = 2.0;
}
OrbsHolder.prototype.spawn = function(type) {
  var pool = this.pools[type];
  var e = pool.length ? pool.pop() : new Orb(type);
  e.mesh.position.set(380 + Math.random()*100, 25 + Math.random()*150, 0);
  e.mesh.scale.setScalar(1 + Math.random()*0.5);
  this.mesh.add(e.mesh); this.inUse.push(e);
};
OrbsHolder.prototype.update = function() {
  for (var i = this.inUse.length-1; i >= 0; i--) {
    var e = this.inUse[i];
    e.mesh.position.x -= this.speed;
    e.mesh.rotation.x += 0.07; e.mesh.rotation.z += 0.05;
    if (e.mesh.position.x < -300) {
      this.pools[e.orbType].push(e);
      this.mesh.remove(e.mesh);
      this.inUse.splice(i, 1);
    }
  }
};

function MysteryBox() {

function MysteryBoxHolder() {

}
MysteryBoxHolder.prototype.spawn = function() {

    b.update(this.speed);

// ─── Bursts ────────────────────────────────────────────────────────────────
var activeBursts = [];
function Burst(color, n) {
  this.mesh = new THREE.Object3D(); this.parts = [];
  var g = new THREE.TetrahedronGeometry(3, 0);
  var m = new THREE.MeshPhongMaterial({ color: color, flatShading: true });
  for (var i = 0; i < (n||8); i++) {
    var p = new THREE.Mesh(g, m);
    var angle = (Math.PI*2*i)/n;
    p.userData = {
      vx: Math.cos(angle)*(1.5+Math.random()),
      vy: Math.sin(angle)*(1.5+Math.random()),
      vr: Math.random()*0.3
    };
    this.mesh.add(p); this.parts.push(p);
  }
  scene.add(this.mesh); this.life = 30; activeBursts.push(this);
}
function updateBursts() {
  for (var i = activeBursts.length-1; i >= 0; i--) {
    var b = activeBursts[i]; b.life--;
    for (var j = 0; j < b.parts.length; j++) {
      b.parts[j].position.x += b.parts[j].userData.vx;
      b.parts[j].position.y += b.parts[j].userData.vy;
      b.parts[j].rotation.x += b.parts[j].userData.vr;
    }
    b.mesh.scale.setScalar(b.life/30);
    if (b.life <= 0) { scene.remove(b.mesh); activeBursts.splice(i,1); }
  }
}

// ─── Moondust Trail ────────────────────────────────────────────────────────
var smokeParticles = [];
var smokePool = [];
var DUST_COLORS = [0x68c3c0, 0x4a3b69, 0x2b596b, 0x444455, 0x556677];

function SmokeParticle() {
  var g = new THREE.IcosahedronGeometry(1, 0);
  g.applyMatrix4(new THREE.Matrix4().makeScale(1, 0.55 + Math.random()*0.3, 0.4 + Math.random()*0.3));
  var col = DUST_COLORS[Math.floor(Math.random()*DUST_COLORS.length)];
  var m = new THREE.MeshPhongMaterial({ color: col, flatShading: true, transparent: true, opacity: 0.0 });
  this.mesh = new THREE.Mesh(g, m);
  this.mesh.castShadow = false;
  scene.add(this.mesh);
}

function spawnSmoke(x, y, z, velX, velY) {
  var p = smokePool.length ? smokePool.pop() : new SmokeParticle();
  var spread = 4;
  p.mesh.position.set(
    x + (Math.random()-0.5)*spread,
    y + (Math.random()-0.5)*spread,
    z + (Math.random()-0.5)*4
  );
  var baseSize = 0.8 + Math.random()*1.5;
  p.mesh.scale.setScalar(baseSize);
  p.mesh.rotation.set(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);
  p.mesh.material.opacity = 0.15 + Math.random()*0.15;
  p.mesh.material.color.setHex(DUST_COLORS[Math.floor(Math.random()*DUST_COLORS.length)]);
  p.mesh.visible = true;
  p.vx = velX * 0.18 + (Math.random()-0.5)*0.8;
  p.vy = velY * 0.10 + (Math.random()-0.5)*0.6 + 0.15;
  p.vz = (Math.random()-0.5)*0.6;
  p.vr = (Math.random()-0.5)*0.08;
  p.life = 1.0;
  p.decay = 0.03 + Math.random()*0.02;
  p.growRate = 0.02 + Math.random()*0.03;
  p.baseSize = baseSize;
  smokeParticles.push(p);
}

function updateSmoke() {
  for (var i = smokeParticles.length-1; i >= 0; i--) {
    var p = smokeParticles[i];
    p.life -= p.decay;
    if (p.life <= 0) {
      p.mesh.visible = false;
      smokePool.push(p);
      smokeParticles.splice(i, 1);
      continue;
    }
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vx *= 0.95; p.vy *= 0.95;
    p.mesh.rotation.x += p.vr;
    p.mesh.rotation.z += p.vr * 0.7;
    var s = p.baseSize * (1 + (1 - p.life) * p.growRate * 20);
    p.mesh.scale.setScalar(s);
    p.mesh.material.opacity = p.life * 0.25;
  }
}

var cometSparkles = [];
var cometSparklePool = [];

function CometSparkle() {

  p.mesh.visible = true;
  p.vx = (Math.random()-0.5)*1.5;
  p.vy = (Math.random()-0.5)*1.5;
  p.life = 1.0;

  cometSparkles.push(p);
}

function updateCometSparkles() {

// ─── UI refresh ────────────────────────────────────────────────────────────
function refreshUI() {
  var pct = Math.max(0, oxygen / MAX_O);
  document.getElementById('oxy-rail').style.transform = 'scaleX(' + pct + ')';

  // Oxygen bar color: cyan (full) → purple (mid) → crimson (low)
  var barColor, bgFrom, bgTo;
  if (pct > 0.5) {
    var t = (1 - pct) * 2; // 0→1 as oxygen goes 100%→50%
    var r = Math.floor(t * 150);
    var g = Math.floor(229 - t * 229);
    var b = Math.floor(255 - t * 55);
    barColor = 'rgb(' + r + ',' + g + ',' + b + ')';
    bgFrom = 'rgb(2,1,17)';
    bgTo = 'rgb(' + Math.floor(13 + t*20) + ',' + Math.floor(8 + t*5) + ',' + Math.floor(32 + t*20) + ')';
  } else if (pct > 0.15) {
    var t2 = (pct - 0.15) / 0.35; // 1→0 as oxygen goes 50%→15%
    barColor = 'rgb(' + Math.floor(150 + (1-t2)*100) + ',0,' + Math.floor(200 - (1-t2)*170) + ')';
    bgFrom = 'rgb(' + Math.floor(t2*2 + (1-t2)*15) + ',0,' + Math.floor(t2*17 + (1-t2)*5) + ')';
    bgTo = 'rgb(' + Math.floor(t2*32 + (1-t2)*30) + ',' + Math.floor(t2*13) + ',' + Math.floor(t2*52 + (1-t2)*10) + ')';
  } else {
    barColor = '#cc1133';
    bgFrom = 'rgb(10,0,2)';
    bgTo = 'rgb(20,0,5)';
  }
  document.getElementById('oxy-rail').style.background = barColor;
  if (STATUS !== 'void') {
    document.getElementById('world').style.background = 'linear-gradient(180deg,' + bgFrom + ' 0%,' + bgTo + ' 100%)';
  }

  // Survival timer
  var secs = Math.floor(survivalFrames / 60);
  var mins = Math.floor(secs / 60);
  secs = secs % 60;
  document.getElementById('timer').textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
}

function norm(v, vmin, vmax, tmin, tmax) {
  var nv = Math.max(Math.min(v, vmax), vmin);
  return tmin + ((nv-vmin)/(vmax-vmin))*(tmax-tmin);
}

// ─── Input ─────────────────────────────────────────────────────────────────
document.addEventListener('mousemove', function(e) {
  mouse.x = -1 + (e.clientX / WIDTH) * 2;
  mouse.y =  1 - (e.clientY / HEIGHT) * 2;
  var cursorEl = document.getElementById('cursor');
  if (cursorEl) { cursorEl.style.left = e.clientX+'px'; cursorEl.style.top = e.clientY+'px'; }
});

var touchState = {
  active: false, id: null,
  startX: 0, startY: 0, lastX: 0, lastY: 0,
  hasMoved: false, twoFinger: false, twoStartY: 0
};

function handleHeartbeatTap() {
  if (STATUS !== 'void') return;
  heartbeatTaps++;
  voidIdleFrames = 0;
  var pct = heartbeatTaps / HEARTBEAT_REQUIRED;
  document.getElementById('hb-bar').style.width = Math.min(100, pct * 100) + '%';
  // Color lerps from crimson to blue
  var r = Math.floor(204 * (1 - pct));
  var b = Math.floor(255 * pct);
  document.getElementById('hb-bar').style.background = 'rgb(' + r + ',0,' + b + ')';
  // Suit pulses
  humanoid.suitMat.color.setRGB(0.8 + r/255*0.2, 0.8 - (1-pct)*0.4, 0.8 + b/255*0.2);
  if (heartbeatTaps >= HEARTBEAT_REQUIRED) {
    exitVoid();
  }
}

document.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (STATUS === 'void') { handleHeartbeatTap(); return; }
  if (STATUS === 'tumbling') {
    if (tumble.bounces >= 1) {
      tumble.liftProgress = 1.0;
      gsap.fromTo('#comet-flash', { opacity: 0.2 }, { opacity: 0, duration: 0.4 });
    }
    return;
  }
  if (e.touches.length === 2) {
    touchState.twoFinger = true;
    touchState.twoStartY = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
    return;
  }
  var t = e.touches[0];
  touchState.active = true; touchState.id = t.identifier;
  touchState.startX = t.clientX; touchState.startY = t.clientY;
  touchState.lastX = t.clientX; touchState.lastY = t.clientY;
  touchState.hasMoved = false; touchState.twoFinger = false;
  mouse.x = -1 + (t.clientX / WIDTH) * 2;
  mouse.y =  1 - (t.clientY / HEIGHT) * 2;
}, { passive: false });

document.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 2 && touchState.twoFinger) {
    var midY = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
    var delta = touchState.twoStartY - midY;
    touchState.twoStartY = midY;
    reverseLerp -= delta * 0.004;
    reverseLerp = Math.max(REVERSE_LIMIT, Math.min(1.2, reverseLerp));
    return;
  }
  if (!touchState.active) return;
  var t = null;
  for (var i = 0; i < e.touches.length; i++) {
    if (e.touches[i].identifier === touchState.id) { t = e.touches[i]; break; }
  }
  if (!t) return;
  var dx = t.clientX - touchState.startX, dy = t.clientY - touchState.startY;
  if (Math.sqrt(dx*dx + dy*dy) > 6) touchState.hasMoved = true;
  touchState.lastX = t.clientX; touchState.lastY = t.clientY;
  mouse.x = -1 + (t.clientX / WIDTH) * 2;
  mouse.y =  1 - (t.clientY / HEIGHT) * 2;
}, { passive: false });

document.addEventListener('touchend', function(e) {
  e.preventDefault();
  touchState.twoFinger = false;
  if (!touchState.active) return;
  if (!touchState.hasMoved && STATUS === 'playing') {
    gsap.to(humanoid, {
      flipX: humanoid.flipX + (Math.random() - 0.5) * Math.PI * 3.5,
      flipZ: humanoid.flipZ + (Math.random() - 0.5) * Math.PI * 3.5,
      duration: 0.65, ease: "power2.inOut"
    });
    for (var si = 0; si < humanoid.joints.length; si++) {
      humanoid.joints[si].pivot.userData.velX += (Math.random() - 0.5) * 4;
      humanoid.joints[si].pivot.userData.velZ += (Math.random() - 0.5) * 4;
    }
  }
  touchState.active = false; touchState.id = null;
}, { passive: false });

var reverseLerp = 0.0;
var MAGNETIC_FORWARD = 1.0, MAGNETIC_STRENGTH = 0.018, REVERSE_LIMIT = -2.2;
var manualScrollMode = false;

window.addEventListener('wheel', function(e) {
  reverseLerp -= e.deltaY * 0.0012;
  reverseLerp = Math.max(REVERSE_LIMIT, Math.min(1.2, reverseLerp));
}, { passive: true });

window.addEventListener('pointerdown', function(e) {
  if (STATUS === 'void') { handleHeartbeatTap(); return; }
  if (STATUS === 'tumbling') {
    if (tumble.bounces >= 1) {
      tumble.liftProgress = 1.0;
      gsap.fromTo('#comet-flash', { opacity: 0.2 }, { opacity: 0, duration: 0.4 });
    }
    return;
  }
  if (STATUS !== 'playing') return;
  if (e.pointerType === 'touch') return;

  if (e.button === 0) {
    if (manualScrollMode) {
      // manualScrollMode: clean Y spin
      gsap.killTweensOf(humanoid.mesh.rotation);
      var targetRotY = humanoid.mesh.rotation.y + Math.PI * 2;
      gsap.to(humanoid.mesh.rotation, { y: targetRotY, duration: 0.6, ease: "power2.inOut" });
    } else {
      // Normal: random spin
      gsap.to(humanoid, {
        flipX: humanoid.flipX + (Math.random() - 0.5) * Math.PI * 3.5,
        flipZ: humanoid.flipZ + (Math.random() - 0.5) * Math.PI * 3.5,
        duration: 0.65, ease: "power2.inOut"
      });
      for (var si = 0; si < humanoid.joints.length; si++) {
        humanoid.joints[si].pivot.userData.velX += (Math.random() - 0.5) * 4;
        humanoid.joints[si].pivot.userData.velZ += (Math.random() - 0.5) * 4;
      }
    }
  } else if (e.button === 2) {
    // Right click: reset to default soaring pose
    gsap.to(humanoid, { flipX: 0, flipZ: 0, duration: 0.5, ease: "power3.out" });
    gsap.to(humanoid.mesh.rotation, { y: Math.PI * 0.75, duration: 0.5, ease: "power3.out" });
    humanoid.baseRotX = -0.55; humanoid.baseRotZ = 0;
  }
});
window.addEventListener('contextmenu', function(e) { e.preventDefault(); });

window.addEventListener('keydown', function(e) {
  if (STATUS === 'void') { handleHeartbeatTap(); return; }
  if (STATUS !== 'playing') return;
  if (e.code === 'Space') {
    e.preventDefault();
    manualScrollMode = !manualScrollMode;
    MAGNETIC_FORWARD = manualScrollMode ? 0.0 : 1.0;
  }
});

// ─── Game Events ───────────────────────────────────────────────────────────
function startGame() {
  STATUS = 'playing';
  oxygen = MAX_O; survivalFrames = 0;
  distance = 0; frame = 0;
  spawnInt = 55;
  speedTick = SPEED_TICK_INTERVAL;
  orbHolder.speed = canHolder.speed = boxHolder.speed = BASE_SPD;
  orbHolder.inUse.forEach(function(e) { orbHolder.mesh.remove(e.mesh); }); orbHolder.inUse = [];
  canHolder.inUse.forEach(function(c) { canHolder.mesh.remove(c.mesh); }); canHolder.inUse = [];
  boxHolder.inUse.forEach(function(b) { boxHolder.mesh.remove(b.mesh); }); boxHolder.inUse = [];
  humanoid.flipX = 0; humanoid.flipZ = 0;
  humanoid.baseRotX = -0.55; humanoid.baseRotZ = 0;
  humanoid.singularity = false;
  humanoid.slingVx = 0; humanoid.slingVy = 0; humanoid.slingFrames = 0;
  humanoid.suitMat.color.setHex(0xffffff);
  humanoid.mesh.scale.setScalar(0.25);
  manualScrollMode = false; MAGNETIC_FORWARD = 1.0;
  invincibleFrames = 120; // brief grace period on start
  cometActive = false; cometTimer = 0;
  heartbeatTaps = 0; voidIdleFrames = 0;
  starActive = false;
  nextStarFrame = frame + 900 + Math.floor(Math.random() * 1800);
  document.getElementById('void-overlay').classList.remove('active');
  document.getElementById('heartbeat-prompt').classList.remove('visible');
  document.getElementById('hb-bar').style.width = '0%';
  document.getElementById('lift-hint').classList.remove('visible');
  document.getElementById('world').style.background = 'linear-gradient(180deg,#020111 0%,#0d0820 100%)';
  // Always restore scene visibility
  if (sea) { sea.mesh.visible = true; sky.mesh.visible = true; }
  if (orbHolder) { orbHolder.mesh.visible = true; canHolder.mesh.visible = true; boxHolder.mesh.visible = true; }
  if (voidLight) voidLight.intensity = 0;
  refreshUI();
  document.getElementById('screen-welcome').classList.remove('visible');
  document.getElementById('screen-gameover').classList.remove('visible');
}

var tumble = { surfaceY: 22, velX: 0, velY: 0, bounces: 0, spinX: 0, spinY: 0, spinZ: 0, liftProgress: 0 };

function doTumble() {
  if (STATUS === 'void' || humanoid.singularity) return;
  STATUS = 'tumbling';
  tumble.velX = -(orbHolder.speed*0.6 + Math.random()*3);
  tumble.velY = 4 + Math.random()*3;
  tumble.bounces = 0; tumble.liftProgress = 0;
  tumble.spinX = (Math.random()-0.5)*0.28;
  tumble.spinY = (Math.random()-0.5)*0.22;
  tumble.spinZ = (Math.random()<0.5 ? 1 : -1) * (0.12 + Math.random()*0.2);
  for (var i = 0; i < humanoid.joints.length; i++) {
    humanoid.joints[i].pivot.userData.velX += (Math.random()-0.5)*6;
    humanoid.joints[i].pivot.userData.velZ += (Math.random()-0.5)*6;
  }
  gsap.fromTo('#hit-flash', { opacity: 0.8 }, { opacity: 0, duration: 0.6 });
}

function doSingularity() {
  // Black orb: compress to nothing, fling from offscreen
  invincibleFrames = 300;
  humanoid.singularity = true;
  gsap.to(humanoid.mesh.scale, {
    x: 0.001, y: 0.001, z: 0.001, duration: 0.35, ease: "power3.in",
    onComplete: function() {
      // Fling from random offscreen edge
      var edge = Math.floor(Math.random() * 4);
      var px, py;
      if (edge === 0)      { px = -280; py = 60 + Math.random()*80; humanoid.slingVx = 6; humanoid.slingVy = 0; }
      else if (edge === 1) { px =  280; py = 60 + Math.random()*80; humanoid.slingVx = -6; humanoid.slingVy = 0; }
      else if (edge === 2) { px = (Math.random()-0.5)*160; py = 280; humanoid.slingVx = 0; humanoid.slingVy = -4; }
      else                 { px = (Math.random()-0.5)*160; py = -60; humanoid.slingVx = 0; humanoid.slingVy = 4; }
      humanoid.mesh.position.set(px, py, 0);
      humanoid.slingFrames = 35;
      humanoid.flipX = 0; humanoid.flipZ = 0;
      gsap.to(humanoid.mesh.scale, {
        x: 0.25, y: 0.25, z: 0.25, duration: 0.5, ease: "power2.out",
        onComplete: function() { humanoid.singularity = false; }
      });
    }
  });
  new Burst(0x111118, 14).mesh.position.copy(new THREE.Vector3().copy(humanoid.mesh.position));
}

function doOrbitalSling() {
  // Mystery box: flung sideways out of frame, return from opposite side
  var dir = Math.random() < 0.5 ? 1 : -1;
  invincibleFrames = 180;
  gsap.to(humanoid.mesh.position, {
    x: dir * 450,
    duration: 0.55, ease: "power2.in",
    onComplete: function() {
      humanoid.mesh.position.x = -dir * 320;
      humanoid.mesh.position.y = 50 + Math.random() * 100;
      humanoid.flipX = 0; humanoid.flipZ = 0;
      gsap.to(humanoid.mesh.position, { x: 0, duration: 0.5, ease: "power2.out" });
    }
  });
  gsap.fromTo('#hit-flash', { opacity: 0.5 }, { opacity: 0, duration: 0.4 });
}

function doVoid() {
  STATUS = 'void';
  heartbeatTaps = 0; voidIdleFrames = 0;
  // Hide everything except the astronaut — darkness is the scene itself
  sea.mesh.visible = false;
  sky.mesh.visible = false;
  orbHolder.mesh.visible = false;
  canHolder.mesh.visible = false;
  boxHolder.mesh.visible = false;
  document.getElementById('world').style.background = '#000';
  document.getElementById('world').style.transition = 'background 0.8s ease';
  // Bright front fill so the astronaut reads like a portrait against void
  voidLight.intensity = 2.2;
  document.getElementById('void-overlay').classList.add('active');
  setTimeout(function() {
    document.getElementById('heartbeat-prompt').classList.add('visible');
  }, 700);
  document.getElementById('hb-bar').style.width = '0%';
  document.getElementById('hb-bar').style.background = '#cc1133';
  humanoid.suitMat.color.setHex(0xcc1133);
  humanoid.mesh.position.set(0, 100, 0);
}

function exitVoid() {
  STATUS = 'playing';
  oxygen = Math.floor(MAX_O * 0.4);
  invincibleFrames = 120;
  heartbeatTaps = 0;
  // Restore scene
  sea.mesh.visible = true;
  sky.mesh.visible = true;
  orbHolder.mesh.visible = true;
  canHolder.mesh.visible = true;
  boxHolder.mesh.visible = true;
  voidLight.intensity = 0;
  document.getElementById('void-overlay').classList.remove('active');
  document.getElementById('heartbeat-prompt').classList.remove('visible');
  humanoid.suitMat.color.setHex(0xffffff);
  refreshUI();
  gsap.fromTo('#comet-flash', { opacity: 0.4 }, { opacity: 0, duration: 1.0 });
}

function doGameOver() {
  STATUS = 'gameover';
  var secs = Math.floor(survivalFrames / 60);
  var mins = Math.floor(secs / 60);
  secs = secs % 60;
  document.getElementById('go-score').textContent =
    mins > 0
      ? mins + 'm ' + secs + 's'
      : secs + ' seconds';
  document.getElementById('screen-gameover').classList.add('visible');
  document.getElementById('void-overlay').classList.remove('active');
  document.getElementById('heartbeat-prompt').classList.remove('visible');
}

// ─── Shooting Star ─────────────────────────────────────────────────────────
function launchShootingStar() {
  if (starActive) return;
  starActive = true;
  // Angle: mostly downward-right or downward-left
  var goLeft = Math.random() < 0.5;
  var startX = goLeft ? WIDTH * 0.9 : WIDTH * 0.1;
  var startY = Math.random() * HEIGHT * 0.4;
  starAngle = goLeft ? (200 + Math.random()*40) : (330 + Math.random()*40);
  starProgress = 0;
  starEl.style.transform = 'translate(' + startX + 'px,' + startY + 'px) rotate(' + starAngle + 'deg)';
  starEl.style.opacity = '0';
  gsap.timeline()
    .to(starEl, { opacity: 1, duration: 0.1 })
    .to(starEl, {
      opacity: 0, duration: 0.6, ease: "power1.in",
      onUpdate: function() {
        var progress = this.progress();
        var dist = progress * (WIDTH * 0.7);
        var rad = (starAngle - 90) * Math.PI / 180;
        var nx = parseFloat(startX) + Math.cos(rad) * dist;
        var ny = parseFloat(startY) + Math.sin(rad) * dist;
        starEl.style.transform = 'translate(' + nx + 'px,' + ny + 'px) rotate(' + starAngle + 'deg)';
        // Check proximity to astronaut in world coords
        var worldX = norm(nx / WIDTH * 2 - 1, -1, 1, -100, 100);
        var worldY = norm(1 - ny / HEIGHT * 2, -1, 1, 25, 175);
        var hx = humanoid.mesh.position.x, hy = humanoid.mesh.position.y;
        var dist2 = Math.sqrt((worldX-hx)*(worldX-hx)+(worldY-hy)*(worldY-hy));
        if (dist2 < 25 && STATUS === 'playing' && invincibleFrames <= 0) {
          invincibleFrames = 60;
          doTumble();
          gsap.fromTo('#hit-flash', { opacity: 0.9 }, { opacity: 0, duration: 0.8 });
        }
      },
      onComplete: function() { starActive = false; }
    });
}

// ─── Collisions ────────────────────────────────────────────────────────────
var _pWorld = new THREE.Vector3(), _eWorld = new THREE.Vector3();

function checkCollisions() {
  if (STATUS !== 'playing') return;
  humanoid.mesh.getWorldPosition(_pWorld);

  // Orbs
  for (var i = orbHolder.inUse.length-1; i >= 0; i--) {
    var en = orbHolder.inUse[i];
    en.mesh.getWorldPosition(_eWorld);
    if (_pWorld.distanceTo(_eWorld) < 8) {
      var def = ORB_DEFS[en.orbType];
      new Burst(def.color, 10).mesh.position.copy(_eWorld);
      orbHolder.pools[en.orbType].push(en);
      orbHolder.mesh.remove(en.mesh);
      orbHolder.inUse.splice(i, 1);

      if (invincibleFrames > 0) continue;

      if (en.orbType === 'black') {
        doSingularity();
        return;
      }

      oxygen -= def.oxygenCost;
      if (def.hitStr === 'heavy') {
        gsap.fromTo('#hit-flash', { opacity: 0.7 }, { opacity: 0, duration: 0.5 });
        humanoid.hitReaction();
        humanoid.hitReaction(); // double for heavy
      } else {
        gsap.fromTo('#hit-flash', { opacity: 0.35 }, { opacity: 0, duration: 0.3 });
        humanoid.hitReaction();
      }

      if (oxygen <= 0) {
        oxygen = 0;
        doVoid();
        refreshUI();
        return;
      }
      refreshUI();
    }
  }

  // Oxygen canisters
  for (var j = canHolder.inUse.length-1; j >= 0; j--) {
    var cn = canHolder.inUse[j];
    cn.mesh.getWorldPosition(_eWorld);
    if (_pWorld.distanceTo(_eWorld) < 12) {
      new Burst(0x00e5ff, 8).mesh.position.copy(_eWorld);
      canHolder.pool.push(cn); canHolder.mesh.remove(cn.mesh); canHolder.inUse.splice(j,1);

      var restore = cometActive ? 2.0 : 1.5;
      oxygen = Math.min(MAX_O, oxygen + restore);
      gsap.fromTo('#comet-flash', { opacity: cometActive ? 0.4 : 0.2 }, { opacity: 0, duration: 0.3 });
      refreshUI();
    }
  }

  // Mystery boxes
  for (var k = boxHolder.inUse.length-1; k >= 0; k--) {
    var bx = boxHolder.inUse[k];
    bx.mesh.getWorldPosition(_eWorld);
    if (_pWorld.distanceTo(_eWorld) < 14) {
      boxHolder.pool.push(bx); boxHolder.mesh.remove(bx.mesh); boxHolder.inUse.splice(k,1);

      // Roll the dice: 60% bad tumble, 25% orbital sling, 15% comet tail
      var roll = Math.random();
      if (roll < 0.60) {
        doTumble();
      } else if (roll < 0.85) {
        doOrbitalSling();
      } else {
        // Comet tail — the lucky 15%
        cometActive = true;
        cometTimer = COMET_DURATION;
        humanoid.flameMat.color.setHex(0xffdd00);
        gsap.fromTo('#comet-flash', { opacity: 0.6 }, { opacity: 0, duration: 0.8 });
      }
      return;
    }
  }
}

// ─── Main Loop ─────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frame++;

  reverseLerp += (0 - reverseLerp) * MAGNETIC_STRENGTH;
  targetRotSpeed = MAGNETIC_FORWARD + reverseLerp;
  currentRotSpeed += (targetRotSpeed - currentRotSpeed) * 0.05;

  sea.mesh.rotation.z += 0.005 * currentRotSpeed;
  sky.mesh.rotation.z += 0.002 * currentRotSpeed;
  sea.moveWaves();

  var cycle = (sea.mesh.rotation.z / Math.PI) % planetColors.length;
  var idx1 = Math.floor(Math.abs(cycle)), idx2 = (idx1+1) % planetColors.length;
  var c1 = new THREE.Color(planetColors[idx1]), c2 = new THREE.Color(planetColors[idx2]);
  sea.mesh.material.color.copy(c1).lerp(c2, Math.abs(cycle) - idx1);

  if (STATUS === 'playing') {
    survivalFrames++;
    if (invincibleFrames > 0) invincibleFrames--;

    // Sling recovery — move toward center
    if (humanoid.slingFrames > 0) {
      humanoid.mesh.position.x += humanoid.slingVx;
      humanoid.mesh.position.y += humanoid.slingVy;
      humanoid.slingVx *= 0.88;
      humanoid.slingVy *= 0.88;
      humanoid.slingFrames--;
    }

    // Passive oxygen drain — very slow tamagotchi hunger
    if (frame % 2400 === 0 && oxygen > 0 && !cometActive) {
      oxygen -= 0.5;
      if (oxygen <= 0) { oxygen = 0; doVoid(); } else { refreshUI(); }
    }

    // Speed ramp — invisible, gradual
    speedTick--;
    if (speedTick <= 0) {
      speedTick = SPEED_TICK_INTERVAL;
      var newSpd = orbHolder.speed + 0.3;
      orbHolder.speed = canHolder.speed = boxHolder.speed = newSpd;
      spawnInt = Math.max(22, spawnInt - 3);
    }

    // Comet tail
    if (cometActive) {
      cometTimer--;
      if (frame % 3 === 0) spawnCometSparkle(humanoid.mesh.position.x, humanoid.mesh.position.y);
      if (cometTimer <= 0) {
        cometActive = false;
        humanoid.flameMat.color.setHex(0x00ffff);
      }
    }
    if (cometSparkles.length) updateCometSparkles();

    // Shooting star
    if (frame >= nextStarFrame && !starActive) {
      launchShootingStar();
      nextStarFrame = frame + 1200 + Math.floor(Math.random() * 1800);
    }

    // Mouse tracking (only when not in sling)
    if (!humanoid.singularity) {
      var tx = norm(mouse.x, -1, 1, -100, 100), ty = norm(mouse.y, -1, 1, 25, 175);
      var dx = tx - humanoid.mesh.position.x, dy = ty - humanoid.mesh.position.y;
      humanoid.mesh.position.x += dx * 0.1;
      humanoid.mesh.position.y += dy * 0.1;
      humanoid.update(dx*0.003, dy*0.003, orbHolder.speed, dx, dy);
    } else {
      humanoid.update(0, 0, orbHolder.speed, 0, 0);
    }

    // Spawn objects
    if (frame % Math.round(spawnInt) === 0) {
      var r = Math.random();
      if      (r < 0.33) orbHolder.spawn('blue');
      else if (r < 0.50) orbHolder.spawn('red');
      else if (r < 0.54) orbHolder.spawn('black');   // 4% — rare
      else if (r < 0.84) canHolder.spawn();           // 30% canisters
      else               boxHolder.spawn();            // 16% mystery box
    }

    orbHolder.update(); canHolder.update(); boxHolder.update();
    updateBursts(); checkCollisions();
    if (smokeParticles.length) updateSmoke();

    if (frame % 10 === 0) refreshUI();

  } else if (STATUS === 'void') {
    // Void — astronaut locked to center, suit pulses
    humanoid.mesh.position.set(0, 100, 0);
    humanoid.update(0, 0, 0, 0, 0);

    // Idle timer — if they stop tapping, game over
    voidIdleFrames++;
    if (voidIdleFrames >= VOID_IDLE_MAX) {
      doGameOver();
      return;
    }

    // Pulse suit red as they approach timeout
    var urgency = voidIdleFrames / VOID_IDLE_MAX;
    var pulseSpeed = 2 + urgency * 6;
    var pulse = 0.5 + Math.sin(Date.now() * 0.001 * pulseSpeed) * 0.5;
    var tapPct = heartbeatTaps / HEARTBEAT_REQUIRED;
    var rr = 0.8 + (1 - tapPct) * 0.2;
    var bb = tapPct * 0.8;
    humanoid.suitMat.color.setRGB(rr * (0.5 + pulse * 0.5), 0, bb * (0.5 + pulse * 0.5));

    updateBursts();

  } else if (STATUS === 'tumbling') {
    var GRAVITY = -0.45, FRICTION = 0.91, BOUNCE_DAMP = 0.48, SURFACE_Y = tumble.surfaceY;
    tumble.velY += GRAVITY;
    humanoid.mesh.position.y += tumble.velY;
    humanoid.mesh.position.x += tumble.velX;
    if (humanoid.mesh.position.x < -130) { humanoid.mesh.position.x = -130; tumble.velX *= -0.4; }
    if (humanoid.mesh.position.x >  130) { humanoid.mesh.position.x =  130; tumble.velX *= -0.4; }
    if (humanoid.mesh.position.y <= SURFACE_Y) {
      humanoid.mesh.position.y = SURFACE_Y;
      var impactSpeed = Math.abs(tumble.velY);
      tumble.velY = impactSpeed * BOUNCE_DAMP;
      tumble.velX *= FRICTION;
      tumble.bounces++;
      var spinScale = Math.max(0.5, 1.2 - tumble.bounces*0.08);
      tumble.spinX = (Math.random()-0.5)*0.32*spinScale;
      tumble.spinY = (Math.random()-0.5)*0.25*spinScale;
      tumble.spinZ = (Math.random()<0.5?1:-1)*(0.15+Math.random()*0.22)*spinScale;
      var splatStr = Math.min(6, impactSpeed*0.5);
      for (var bi = 0; bi < humanoid.joints.length; bi++) {
        humanoid.joints[bi].pivot.userData.velX += (Math.random()-0.5)*splatStr;
        humanoid.joints[bi].pivot.userData.velZ += (Math.random()-0.5)*splatStr;
      }
      if (tumble.velY < 1.2) tumble.velY = 1.2 + Math.random()*1.5;
    }
    humanoid.flipX += tumble.spinX;
    humanoid.flipZ += tumble.spinZ;
    humanoid.mesh.rotation.y += tumble.spinY;
    humanoid.update(tumble.velX*0.004, tumble.velY*0.003, 0, 0, 0);
    var sx = humanoid.mesh.position.x, sy = humanoid.mesh.position.y;
    var numSmoke = 2 + (frame % 3 === 0 ? 1 : 0);
    for (var si = 0; si < numSmoke; si++) spawnSmoke(sx, sy, 0, tumble.velX, tumble.velY);
    updateSmoke();
    var liftHint = document.getElementById('lift-hint');
    if (liftHint) liftHint.classList.toggle('visible', tumble.bounces >= 1);
    if (tumble.liftProgress >= 1.0) {
      STATUS = 'playing';
      oxygen = Math.max(1, oxygen); // survive tumble with whatever oxygen remains
      invincibleFrames = 90;
      refreshUI();
      tumble.liftProgress = 0; tumble.velX = 0; tumble.velY = 0;
      humanoid.flipX = 0; humanoid.flipZ = 0;
      humanoid.baseRotX = -0.55; humanoid.baseRotZ = 0;
      gsap.to(humanoid.mesh.rotation, { y: Math.PI * 0.75, duration: 0.6, ease: "power3.out" });
      if (liftHint) liftHint.classList.remove('visible');
    }
    updateBursts();
    if (smokeParticles.length) updateSmoke();
    if (cometSparkles.length) updateCometSparkles();

  } else {
    // waiting / gameover — idle float
    humanoid.mesh.position.y = 100 + Math.sin(Date.now()*0.001)*6;
    humanoid.update(0, 0, 0, 0, 0);
  }

  renderer.render(scene, camera);
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-replay').addEventListener('click', startGame);

window.addEventListener('load', function() {
  createScene(); createLights(); buildWorld();
  refreshUI(); loop();
  // Show welcome screen briefly after load
  document.getElementById('screen-welcome').classList.add('visible');
  STATUS = 'waiting';
});
</script>
</body>
</html>
