<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; tap-highlight-color: transparent; }
  html, body { overscroll-behavior: none; touch-action: none; }

  /* ── Top HUD ── */
  #top-hud {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    z-index: 55;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 7px 22px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    pointer-events: all;
    opacity: 1;
    transition: opacity 0.4s;
    touch-action: manipulation;
    overflow: visible;
  }
  #top-hud.visible { opacity: 1; pointer-events: all; }
  #hud-world-pills { pointer-events: all; }
  #hud-wordmark {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.72em;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    padding: 2px 4px 2px 0;
    user-select: none;
    display: inline-block;
  }
  #hud-wordmark .hud-main {
    background: linear-gradient(100deg, #ffffff 0%, #b8d8ea 40%, #68c3c0 90%, #68c3c0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    padding-right: 2px;
  }
  #hud-wordmark .hud-tld {
    background: linear-gradient(100deg, #68c3c0 0%, #4a9ea0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0.7;
  }
  #hud-wordmark .hud-dot {
    -webkit-text-fill-color: rgba(104,195,192,0.55);
    color: rgba(104,195,192,0.55);
  }

  /* ── Toast banner area ── */
  #toast-banner-area {
    position: fixed;
    top: 62px; left: 50%;
    transform: translateX(-50%);
    z-index: 56;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    min-width: 0;
  }
  .toast-banner {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 6px 16px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

  .toast-banner.out { opacity: 0; transform: translateY(-6px); }

  /* ── Bottom HUD ── */
  #bottom-hud {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);

    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 5px 8px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);

  }

  .hud-btn {

    color: rgba(255,255,255,0.35);

    padding: 5px 13px;

  .hud-btn.active { color: rgba(104,195,192,0.9); background: rgba(104,195,192,0.08); }
  .hud-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

  body {

  .screen {

  /* Foreground canvas */

  /* Pause overlay close button */

  #cursor {
    position: fixed;
    width: 32px; height: 20px;
    border: 1.5px solid rgba(0, 229, 255, 0.35);

  /* ── World atmosphere overlays ── */
  #world-sun {
    position: fixed;

    box-shadow: 0 0 40px 18px rgba(255,240,80,0.55), 0 0 80px 40px rgba(255,220,0,0.22);

  body.world-tundra #world-sun {
    opacity: 1; z-index: 1;

  #shooting-star {
    position: fixed;
    width: 120px; height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.9), rgba(255,255,255,0));
    border-radius: 1px;
    pointer-events: none; z-index: 8;
    opacity: 0;
    transform-origin: left center;

  /* ── World buttons in top HUD ── */
  #hud-world-pills {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .hud-world-btn {
    background: none;
    border: none;
    font-size: 0.85em;
    line-height: 1;
    padding: 3px 5px;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;

    filter: grayscale(0.6);

  .hud-world-btn:hover { opacity: 0.75; filter: grayscale(0); }

  :root { --world-accent: rgba(104,195,192,0.95); }

  /* ── Ink effect overlay ── */
  #ink-overlay {
    position: fixed; inset: 0;

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<script>
"use strict";

document.addEventListener('touchmove', function(e) {
  if (STATUS === 'waiting') return;
  e.preventDefault();
}, { passive: false });
history.pushState(null, '', location.href);
window.addEventListener('popstate', function() { history.pushState(null, '', location.href); });

// ─── World Definitions ─────────────────────────────────────────────────────
var WORLDS = {
  cosmos: {
    name: 'studio black',
    accent: 'rgba(104,195,192,0.95)',
    bgFrom: '#020111', bgTo: '#0d0820',
    fogColor: 0x1a1025, fogNear: 100, fogFar: 950,
    starColor: 0xffffff,
    flameColor: 0x00ffff,
    dustColors: [0x68c3c0, 0x4a3b69, 0x2b596b, 0x444455, 0x556677],
    puffColor: 0x88ddff,
    windForward: 'rgba(160,220,255,',
    windReverse: 'rgba(255,160,80,',
    hudAccent: '#68c3c0',
    hat: 'helmet',
    toastLabel: 'orbit',
    particleLabel: 'stars',
  },
  tundra: {
    name: 'studio white',
    accent: 'rgba(180,230,255,0.98)',
    bgFrom: '#c8e8f8', bgTo: '#e8f5ff',
    fogColor: 0xd8eef8, fogNear: 120, fogFar: 700,
    starColor: 0xffffff,
    flameColor: 0xccf4ff,
    dustColors: [0xffffff, 0xe0f4ff, 0xc8e8ff, 0xd0eeff, 0xf0faff],
    puffColor: 0xffffff,
    windForward: 'rgba(200,235,255,',
    windReverse: 'rgba(160,200,240,',
    hudAccent: '#88d8f8',
    hat: 'helmet',
    toastLabel: 'powder',
    particleLabel: 'snow spray',
  }
};

var currentWorld = 'cosmos';
var _worldLights = [];

function applyWorld(worldKey) {
  currentWorld = worldKey;
  var W = WORLDS[worldKey];
  if (!W) return;

  // Background
  document.getElementById('world').style.background = 'linear-gradient(180deg,' + W.bgFrom + ' 0%,' + W.bgTo + ' 100%)';
  document.getElementById('world').style.transition = 'background 1.2s ease';

  // Body class for CSS world theming
  document.body.className = document.body.className.replace(/\bworld-\S+/g, '').trim();
  document.body.classList.add('world-' + worldKey);

  // CSS accent variable
  document.documentElement.style.setProperty('--world-accent', W.accent);

  // Fog
  if (scene && scene.fog) {
    scene.fog.color.setHex(W.fogColor);
    scene.fog.near = W.fogNear;
    scene.fog.far  = W.fogFar;
  }

  // Stars
  if (sky) {
    sky.mesh.traverse(function(obj) {
      if (obj.isMesh && obj.material) {
        obj.material.color.setHex(W.starColor);
        obj.scale.setScalar(1.0);
      }
    });
  }

  // Remove old world-specific lights
  _worldLights.forEach(function(l) { scene.remove(l); });
  _worldLights = [];

  // Per-world lighting
  if (worldKey === 'tundra') {
    scene.children.forEach(function(c) {
      if (c.isHemisphereLight) c.intensity = 0.25;
      if (c.isAmbientLight) { c.color.setHex(0xc8eeff); c.intensity = 0.7; }
      if (c.isDirectionalLight) { c.color.setHex(0xfff8f0); c.intensity = 2.0; c.position.set(200, 600, 150); }
    });
    var snowBounce = new THREE.HemisphereLight(0xe8f8ff, 0xaaddff, 0.9);
    scene.add(snowBounce); _worldLights.push(snowBounce);
    var rimIce = new THREE.DirectionalLight(0x88ccff, 0.55);
    rimIce.position.set(-300, 200, -100);
    scene.add(rimIce); _worldLights.push(rimIce);
  } else {
    scene.children.forEach(function(c) { if (c.isHemisphereLight) { c.color.setHex(0xffffff); c.groundColor.setHex(0x000000); c.intensity = 0.5; } if (c.isAmbientLight) { c.color.setHex(0x404040); c.intensity = 0.7; } if (c.isDirectionalLight) { c.color.setHex(0xffffff); c.intensity = 0.9; c.position.set(150, 350, 350); } });
  }

  // Flame color
  if (humanoid) {
    humanoid.flameMat.color.setHex(W.flameColor);
    swapHat(W.hat);
  }

  // Dust & puff colors
  DUST_COLORS.length = 0;
  W.dustColors.forEach(function(c) { DUST_COLORS.push(c); });

  // Pill UI accent
  var hudMain = document.querySelector('.hud-main');
  var hudTld  = document.querySelector('.hud-tld');
  if (hudMain) hudMain.style.cssText = '';
  if (hudTld)  hudTld.style.cssText  = '';

  // World pills active state
  document.querySelectorAll('.hud-world-btn').forEach(function(p) {
    p.classList.toggle('active', p.dataset.world === worldKey);
  });
}

function buildHatMesh(hatType) {
  if (_hatMeshes[hatType]) return _hatMeshes[hatType];
  var group = new THREE.Object3D();
  _hatMeshes[hatType] = group;

function swapHat(hatType) {
  if (!humanoid || !humanoid.head) return;
  var prev = humanoid.head.getObjectByName('_worldHat');

  if (hatType === 'helmet') return;

  humanoid.head.add(hat);
}

RagdollHuman.prototype.update = function(accelX, accelY, dx, dy) {
  dx = dx || 0; dy = dy || 0;
  this.animTime += 0.08;

  var reverseForce = Math.max(0, -reverseLerp) / 2.2;
  var forwardForce = Math.max(0,  reverseLerp) / 1.2;
  var inertiaPitch = forwardForce * 0.40 - reverseForce * 0.35;
  var armTrail     = forwardForce * 0.75 - reverseForce * 0.65;
  var sideDrift    = forwardForce * 0.50 - reverseForce * 0.50;
  var scrollIntensity = Math.min(1, Math.max(forwardForce, reverseForce) * 1.6);

  var altFactor = Math.max(0, Math.min(1, (this.mesh.position.y - 25) / 150));
  var poseLow  = Math.max(0, 1 - altFactor / 0.38);
  var poseHigh = Math.max(0, (altFactor - 0.62) / 0.38);

  var targetBodyX = (-1.05 + altFactor * 0.80) + inertiaPitch;
  var leanZ = -accelX * 0.8;

  this.baseRotZ += (leanZ       - this.baseRotZ) * 0.10;
  this.baseRotX += (targetBodyX - this.baseRotX) * 0.06;

  this.mesh.rotation.z = this.baseRotZ + this.flipZ;
  this.mesh.rotation.x = this.baseRotX + this.flipX;

  var bfAngle;
  if (typeof dx !== 'undefined' && dx !== null) {
    var facingBias = Math.max(-1, Math.min(1, dx / 120));
    bfAngle = Math.PI * 0.75 - facingBias * Math.PI * 0.55;
  } else {
    bfAngle = Math.PI * 0.75;
  }
  this.mesh.rotation.y += (bfAngle - this.mesh.rotation.y) * 0.06;

  var baseScale   = 0.6 + Math.random() * 0.4;
  var thrustBoost = Math.max(0, accelY * 2.5);
  this.lFlame.scale.set(1, baseScale + thrustBoost, 0.5);
  this.rFlame.scale.set(1, baseScale + thrustBoost, 0.5);

  for (var ad = 0; ad < this.armDrift.length; ad++) {
    this.armDrift[ad].phaseX += this.armDrift[ad].speedX;
    this.armDrift[ad].phaseZ += this.armDrift[ad].speedZ;
  }
  var dRS = this.armDrift[0], dLS = this.armDrift[1],
      dRE = this.armDrift[2], dLE = this.armDrift[3];

  var distFromCenter  = Math.sqrt(mouse.x * mouse.x + mouse.y * mouse.y);
  var centerProximity = Math.max(0, 1 - distFromCenter / Math.SQRT2);

  var bfDist  = (this.butterflyDist !== undefined) ? this.butterflyDist : 0;
  var bfDx    = (this.butterflyDx   !== undefined) ? this.butterflyDx   : 0;
  var bfDy    = (this.butterflyDy   !== undefined) ? this.butterflyDy   : 0;
  var bfLen   = Math.max(1, bfDist);
  var bfNx    = bfDx / bfLen;
  var bfNy    = bfDy / bfLen;
  var reachUrgency = Math.min(1, bfDist / 80);

  var bodySpeed = Math.sqrt((typeof accelX === 'number' ? accelX : 0) * (typeof accelX === 'number' ? accelX : 0) +
                            (typeof accelY === 'number' ? accelY : 0) * (typeof accelY === 'number' ? accelY : 0));
  var momentumLimiter = Math.max(0.25, 1.0 - bodySpeed * 18);

  var reach = 1.0;

  var armReach = 0.65 - centerProximity * 2.2;
  var supermanPull = poseLow * 0.75;

  var butterflyReachX = -bfNy * reachUrgency * 1.2 * momentumLimiter * reach;
  var butterflyReachZ = -bfNx * reachUrgency * 0.6 * momentumLimiter * reach;

  var shoulderZ = 0.55 + poseLow * (-0.43) + poseHigh * 0.30;
  var elbowZ    = 0.20 + poseLow * (-0.10) + poseHigh * 0.50;

  this.joints[0].restX = armReach - supermanPull + butterflyReachX + Math.sin(dRS.phaseX) * dRS.ampX + armTrail;
  this.joints[0].restZ = (-shoulderZ + butterflyReachZ) + Math.sin(dRS.phaseZ) * dRS.ampZ - sideDrift;
  this.joints[1].restX = armReach - supermanPull + butterflyReachX + Math.sin(dLS.phaseX) * dLS.ampX + armTrail;
  this.joints[1].restZ = ( shoulderZ - butterflyReachZ) + Math.sin(dLS.phaseZ) * dLS.ampZ + sideDrift;
  this.joints[2].restX = 0.10 + centerProximity * -0.8 + butterflyReachX * 0.65 + Math.sin(dRE.phaseX) * dRE.ampX + armTrail * 0.6;
  this.joints[2].restZ = (-elbowZ + butterflyReachZ * 0.5) + Math.sin(dRE.phaseZ) * dRE.ampZ - sideDrift * 0.75;
  this.joints[3].restX = 0.10 + centerProximity * -0.8 + butterflyReachX * 0.65 + Math.sin(dLE.phaseX) * dLE.ampX + armTrail * 0.6;
  this.joints[3].restZ = ( elbowZ - butterflyReachZ * 0.5) + Math.sin(dLE.phaseZ) * dLE.ampZ + sideDrift * 0.75;

  if (scrollIntensity > 0) {
    this.joints[2].restX = 0.10;
    this.joints[3].restX = 0.10;
  }

  var legZ    = 0.10 + poseLow * (-0.04) + poseHigh * 0.16;
  var legBack = poseLow * 0.28;

  for (var i = 0; i < this.joints.length; i++) {
    var j = this.joints[i], p = j.pivot, ud = p.userData;

    if (i >= 4) {
      var legTrail = forwardForce * 0.55 - reverseForce * 0.55;
      var isHip    = (i === 4 || i === 6);
      var hipFold  = reverseForce * 1.05;
      var kneeLock = Math.min(1, reverseForce * 1.2);
      var idleAnim = Math.sin(this.animTime * 0.9 + i) * 0.12 * (1 - kneeLock);

      if (isHip) {
        j.restX = (0.08 - legBack - hipFold) + idleAnim + legTrail;
      } else {
        j.restX = (0.08 - legBack + idleAnim + legTrail) * (1 - kneeLock);
      }
      j.restZ = (i === 4 ? -legZ : i === 6 ? legZ : i === 5 ? -legZ : legZ)
        + Math.sin(this.animTime * 0.7 + i) * 0.08 * (1 - kneeLock * 0.6)
        + (i === 4 || i === 5 ? -sideDrift : sideDrift) * 0.25;
    }

    var errX = j.restX - p.rotation.x;
    var errZ = j.restZ - p.rotation.z;
    ud.velX = ud.velX * j.dampX + errX * j.stiffX;
    ud.velZ = ud.velZ * j.dampZ + errZ * j.stiffZ;
    var minX = (i === 2 || i === 3) ? 0 : -j.limX;
    p.rotation.x = Math.max(minX, Math.min(j.limX, p.rotation.x + ud.velX));
    var minZ = -j.limZ, maxZ = j.limZ;
    if (i === 0) maxZ =  0.15;
    if (i === 1) minZ = -0.15;
    p.rotation.z = Math.max(minZ, Math.min(maxZ, p.rotation.z + ud.velZ));
  }

  var headLookZ = -leanZ * 0.5 + Math.sin(this.animTime * 0.8) * 0.05
    - bfNx * reachUrgency * 0.3 * momentumLimiter * reach;
  var headLookX = (-forwardForce * 0.30 + reverseForce * 0.35)
    - bfNy * reachUrgency * 0.25 * momentumLimiter * reach;
  this.head.rotation.z += (headLookZ - this.head.rotation.z) * 0.12;
  this.head.rotation.x += (headLookX - this.head.rotation.x) * 0.10;
};

  var fur  = new THREE.MeshPhongMaterial({ color: 0xf4f0e8, flatShading: true });

  var helmetGeom = new THREE.SphereGeometry(15.5, 16, 12);
  var helmetMat = new THREE.MeshPhongMaterial({
    color: 0xaaddff,

  var helmetSphere = new THREE.Mesh(helmetGeom, helmetMat);

  var helmetInnerMat = new THREE.MeshPhongMaterial({

  });
  var helmetInner = new THREE.Mesh(new THREE.SphereGeometry(14.5, 16, 12), helmetInnerMat);
  helmetInner.position.set(0, -1, 2);

  var glintMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55, depthWrite: false });
  var glint = new THREE.Mesh(new THREE.SphereGeometry(2.2, 8, 8), glintMat);
  glint.position.set(5, 9, 9);
  this.headNode.add(glint);

  var _t = this;
  function makeLeg(bx, bz, front, splayZ) {
    var upPivot = new THREE.Object3D();
    upPivot.position.set(bx, -5, bz);

    _t.body.add(upPivot);

    var upMesh = new THREE.Mesh(new THREE.BoxGeometry(5, 9, 5), fur);

    upPivot.add(knPivot);

    loMesh.position.y = -4;
    knPivot.add(loMesh);

    var pawMesh = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 7), fur);
    pawMesh.position.set(0, -8, front ? 1.5 : -1.5);
    knPivot.add(pawMesh);

    return { up: upPivot, kn: knPivot };
  }

  this.legFL = makeLeg(-7,  11, true,  -0.38);
  this.legFR = makeLeg( 7,  11, true,   0.38);
  this.legBL = makeLeg(-7, -11, false, -0.38);
  this.legBR = makeLeg( 7, -11, false,  0.38);

  this.mesh.traverse(function(o) {
    if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; }
  });

  this.behaviorTimer = Math.floor(Math.random() * 120) + 60;
}

CompanionPoodle.prototype.update = function(hx, hy) {
  this.animT += 0.08;
  var t = this.animT;

  this.behaviorTimer--;
  if (this.behaviorTimer <= 0) {
    var roll = Math.random();
    if (roll < 0.45)      { this.behavior = 'orbit';  this.orbitDir = Math.random() < 0.5 ? 1 : -1; this.behaviorTimer = 180 + Math.floor(Math.random() * 240); }
    else if (roll < 0.65) { this.behavior = 'zoom';   this.behaviorTimer = 60  + Math.floor(Math.random() * 80);
                             this.zoomTargetX = hx + (Math.random() - 0.5) * 80;
                             this.zoomTargetY = hy + (Math.random() - 0.5) * 60; }
    else if (roll < 0.82) { this.behavior = 'stare';  this.behaviorTimer = 90  + Math.floor(Math.random() * 120); }
    else                  { this.behavior = 'circle'; this.orbitDir = Math.random() < 0.5 ? 1 : -1; this.behaviorTimer = 100 + Math.floor(Math.random() * 140); }
  }

  var targetX, targetY, pull;

  if (this.behavior === 'orbit') {
    this.orbitAngle += 0.018 * this.orbitDir;
    targetX = hx + Math.cos(this.orbitAngle) * this.orbitRadius;
    targetY = hy + Math.sin(this.orbitAngle) * this.orbitRadius * 0.55;
    pull = 0.055;
  } else if (this.behavior === 'zoom') {
    targetX = this.zoomTargetX;
    targetY = this.zoomTargetY;
    pull = 0.12;
  } else if (this.behavior === 'stare') {
    targetX = hx + 32 + Math.sin(t * 0.3) * 8;
    targetY = hy - 10 + Math.cos(t * 0.25) * 6;
    pull = 0.03;
  } else {
    this.orbitAngle += 0.038 * this.orbitDir;
    targetX = hx + Math.cos(this.orbitAngle) * 22;
    targetY = hy + Math.sin(this.orbitAngle) * 14;
    pull = 0.09;
  }

  this.vx += (targetX - this.px) * pull * 0.15;
  this.vy += (targetY - this.py) * pull * 0.15;
  this.vx *= 0.86;
  this.vy *= 0.86;

  var spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
  var maxSpd = (this.behavior === 'zoom') ? 12 : (this.behavior === 'circle') ? 8 : 5;
  if (spd > maxSpd) { this.vx *= maxSpd / spd; this.vy *= maxSpd / spd; }

  this.px += this.vx;
  this.py += this.vy;

  if (this.px < -115) this.vx += (-115 - this.px) * 0.08;
  if (this.px >  115) this.vx += ( 115 - this.px) * 0.08;
  if (this.py <  18)  this.vy += (  18 - this.py) * 0.10;
  if (this.py >  175) this.vy += ( 175 - this.py) * 0.10;

  this.mesh.position.set(this.px, this.py, 16);

  var toAstX = hx - this.px;
  var toAstY = hy - this.py;
  var desiredYaw = Math.atan2(toAstX, 1) + Math.PI * 0.5;
  if (spd > 0.5) desiredYaw = Math.atan2(this.vx, 0.5) + Math.PI * 0.55;

  this.bodyYaw += (desiredYaw - this.bodyYaw) * 0.10;
  this.mesh.rotation.y = this.bodyYaw;
  this.mesh.rotation.x = this.vy * -0.018;
  this.mesh.rotation.z = this.vx * -0.022;

  var runSpd = Math.min(1, spd / 8);
  var runT   = t * (1.5 + runSpd * 2.5);

  this.body.position.y = Math.sin(runT * 2) * 2 * runSpd;

  var blink = (Math.sin(t * 0.11) > 0.96) ? 0.05 : 1;
  this.eyeL.scale.y = blink;
  this.eyeR.scale.y = blink;

  var accelX = this.vx - (this._pvx || 0);
  var accelY = this.vy - (this._pvy || 0);
  this._pvx = this.vx; this._pvy = this.vy;

  var jv = this._jv;
  var D = 0.75, S = 0.12;

  jv.neck.vx = (jv.neck.vx + accelY * 1.8) * D - (this.neckPivot.rotation.x - 0.5) * S;
  jv.neck.vz = (jv.neck.vz - accelX * 1.2) * D - (this.neckPivot.rotation.z)       * (S * 0.7);
  var stareTilt = (this.behavior === 'stare') ? Math.sin(t * 0.4) * 0.35 : 0;
  jv.neck.vz += stareTilt * 0.04;
  this.neckPivot.rotation.x = Math.max(-0.2, Math.min(1.3, this.neckPivot.rotation.x + jv.neck.vx));
  this.neckPivot.rotation.z = Math.max(-0.6, Math.min(0.6, this.neckPivot.rotation.z + jv.neck.vz));

  var earDriveZ = accelX * 2.2;
  var earDriveX = -runSpd * 0.8 + accelY * 0.6;
  jv.earL.vz = (jv.earL.vz + earDriveZ) * 0.68 - this.earLPivot.rotation.z * 0.20;
  jv.earR.vz = (jv.earR.vz - earDriveZ) * 0.68 - this.earRPivot.rotation.z * 0.20;
  jv.earL.vx = (jv.earL.vx + earDriveX) * 0.70 - this.earLPivot.rotation.x * 0.18;
  jv.earR.vx = (jv.earR.vx + earDriveX) * 0.70 - this.earRPivot.rotation.x * 0.18;
  this.earLPivot.rotation.z = Math.max(-0.8, Math.min(0.8, this.earLPivot.rotation.z + jv.earL.vz));
  this.earRPivot.rotation.z = Math.max(-0.8, Math.min(0.8, this.earRPivot.rotation.z + jv.earR.vz));
  this.earLPivot.rotation.x = Math.max(-0.7, Math.min(0.5, this.earLPivot.rotation.x + jv.earL.vx));
  this.earRPivot.rotation.x = Math.max(-0.7, Math.min(0.5, this.earRPivot.rotation.x + jv.earR.vx));

  var wagFreq  = this.behavior === 'stare' ? 6.0 : this.behavior === 'circle' ? 11 : 8.5;
  var wagAmp   = this.behavior === 'stare' ? 2.0 : 1.6;
  var wagPhase = Math.sin(t * wagFreq) * wagAmp;

  jv.tail1.vx = (jv.tail1.vx + accelX * 2.5) * 0.78 - (this.tail1Pivot.rotation.x - (-0.8)) * 0.08;
  jv.tail1.vz = (jv.tail1.vz + wagPhase * 0.10 + accelY * 1.5) * 0.75 - this.tail1Pivot.rotation.z * 0.09;
  this.tail1Pivot.rotation.x = Math.max(-1.6, Math.min(0.3, this.tail1Pivot.rotation.x + jv.tail1.vx));
  this.tail1Pivot.rotation.z = Math.max(-1.8, Math.min(1.8, this.tail1Pivot.rotation.z + jv.tail1.vz));

  jv.tail2.vx = (jv.tail2.vx + accelX * 1.8) * 0.70 - (this.tail2Pivot.rotation.x) * 0.07;
  jv.tail2.vz = (jv.tail2.vz + wagPhase * 0.16) * 0.68 - this.tail2Pivot.rotation.z * 0.08;
  this.tail2Pivot.rotation.x = Math.max(-0.8, Math.min(0.8, this.tail2Pivot.rotation.x + jv.tail2.vx));
  this.tail2Pivot.rotation.z = Math.max(-1.6, Math.min(1.6, this.tail2Pivot.rotation.z + jv.tail2.vz));

  jv.tail3.vz = (jv.tail3.vz + wagPhase * 0.22) * 0.63 - this.tail3Pivot.rotation.z * 0.07;
  jv.tail3.vx = (jv.tail3.vx + accelX * 1.2) * 0.65 - this.tail3Pivot.rotation.x * 0.07;
  this.tail3Pivot.rotation.z = Math.max(-1.4, Math.min(1.4, this.tail3Pivot.rotation.z + jv.tail3.vz));
  this.tail3Pivot.rotation.x = Math.max(-0.8, Math.min(0.8, this.tail3Pivot.rotation.x + jv.tail3.vx));

  var stride = runSpd * 0.9;
  var _rl = (typeof reverseLerp !== 'undefined' ? reverseLerp : 0);
  var scrollFwd = Math.max(0,  _rl);
  var scrollRev = Math.max(0, -_rl);
  var scrollDrive = scrollRev * 0.9 - scrollFwd * 0.7;
  var strideSign = (_rl < -0.05) ? -1 : 1;

  var strF =  Math.sin(runT) * stride * strideSign;
  var strB = -Math.sin(runT) * stride * strideSign;

  jv.flUp.vx = (jv.flUp.vx + strF * 0.05 - accelY * 0.8 - scrollDrive * 0.55) * D - this.legFL.up.rotation.x * S;
  jv.frUp.vx = (jv.frUp.vx - strF * 0.05 - accelY * 0.8 - scrollDrive * 0.55) * D - this.legFR.up.rotation.x * S;
  jv.blUp.vx = (jv.blUp.vx + strB * 0.05 - accelY * 0.7 - scrollDrive * 0.45) * D - this.legBL.up.rotation.x * S;
  jv.brUp.vx = (jv.brUp.vx - strB * 0.05 - accelY * 0.7 - scrollDrive * 0.45) * D - this.legBR.up.rotation.x * S;

  var latKick = accelX * 0.6 * strideSign;
  jv.flUp.vz = (jv.flUp.vz + latKick) * D - this.legFL.up.rotation.z * S;
  jv.frUp.vz = (jv.frUp.vz + latKick) * D - this.legFR.up.rotation.z * S;
  jv.blUp.vz = (jv.blUp.vz + latKick * 0.8) * D - this.legBL.up.rotation.z * S;
  jv.brUp.vz = (jv.brUp.vz + latKick * 0.8) * D - this.legBR.up.rotation.z * S;

  this.legFL.up.rotation.x = Math.max(-0.9, Math.min(1.0, this.legFL.up.rotation.x + jv.flUp.vx));
  this.legFR.up.rotation.x = Math.max(-0.9, Math.min(1.0, this.legFR.up.rotation.x + jv.frUp.vx));
  this.legBL.up.rotation.x = Math.max(-1.0, Math.min(0.9, this.legBL.up.rotation.x + jv.blUp.vx));
  this.legBR.up.rotation.x = Math.max(-1.0, Math.min(0.9, this.legBR.up.rotation.x + jv.brUp.vx));

  this.legFL.up.rotation.z = Math.max(-0.85, Math.min(0.20, this.legFL.up.rotation.z + jv.flUp.vz));
  this.legFR.up.rotation.z = Math.max(-0.20, Math.min(0.85, this.legFR.up.rotation.z + jv.frUp.vz));
  this.legBL.up.rotation.z = Math.max(-0.85, Math.min(0.20, this.legBL.up.rotation.z + jv.blUp.vz));
  this.legBR.up.rotation.z = Math.max(-0.20, Math.min(0.85, this.legBR.up.rotation.z + jv.brUp.vz));

  var knFrontRest =  0.40 + scrollDrive * 0.35 * strideSign;
  var knBackRest  = -0.45 - scrollDrive * 0.30 * strideSign;

  jv.flKn.vx = (jv.flKn.vx + jv.flUp.vx * 0.55) * 0.72 - (this.legFL.kn.rotation.x - knFrontRest) * 0.14;
  jv.frKn.vx = (jv.frKn.vx + jv.frUp.vx * 0.55) * 0.72 - (this.legFR.kn.rotation.x - knFrontRest) * 0.14;
  jv.blKn.vx = (jv.blKn.vx + jv.blUp.vx * 0.55) * 0.72 - (this.legBL.kn.rotation.x - knBackRest)  * 0.14;
  jv.brKn.vx = (jv.brKn.vx + jv.brUp.vx * 0.55) * 0.72 - (this.legBR.kn.rotation.x - knBackRest)  * 0.14;

  this.legFL.kn.rotation.x = Math.max(0.10, Math.min(1.1,  this.legFL.kn.rotation.x + jv.flKn.vx));
  this.legFR.kn.rotation.x = Math.max(0.10, Math.min(1.1,  this.legFR.kn.rotation.x + jv.frKn.vx));
  this.legBL.kn.rotation.x = Math.max(-1.1, Math.min(-0.10, this.legBL.kn.rotation.x + jv.blKn.vx));
  this.legBR.kn.rotation.x = Math.max(-1.1, Math.min(-0.10, this.legBR.kn.rotation.x + jv.brKn.vx));
};

// ─── Moondust Trail ────────────────────────────────────────────────────────
var smokeParticles = [];
var smokePool = [];
var DUST_COLORS = [0x68c3c0, 0x4a3b69, 0x2b596b, 0x444455, 0x556677];

function SmokeParticle() {
  var g = new THREE.IcosahedronGeometry(1, 0);
  g.applyMatrix4(new THREE.Matrix4().makeScale(1, 0.55 + Math.random()*0.3, 0.4 + Math.random()*0.3));
  var col = DUST_COLORS[Math.floor(Math.random()*DUST_COLORS.length)];
  var m = new THREE.MeshPhongMaterial({ color: col, flatShading: true, transparent: true, opacity: 0.0 });
  this.mesh = new THREE.Mesh(g, m);
  this.mesh.castShadow = false;
  scene.add(this.mesh);
}

function updateSmoke() {
  for (var i = smokeParticles.length-1; i >= 0; i--) {
    var p = smokeParticles[i];
    p.life -= p.decay;
    if (p.life <= 0) {
      p.mesh.visible = false;
      smokePool.push(p);
      smokeParticles.splice(i, 1);
      continue;
    }
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vx *= 0.95; p.vy *= 0.95;
    p.mesh.rotation.x += p.vr;
    p.mesh.rotation.z += p.vr * 0.7;
    var s = p.baseSize * (1 + (1 - p.life) * p.growRate * 20);
    p.mesh.scale.setScalar(s);
    p.mesh.material.opacity = p.life * 0.25;
  }
}

// ─── Jetpack Air Puffs ─────────────────────────────────────────────────────
var airPuffs = [];
var airPuffPool = [];

function AirPuff() {
  var g = new THREE.TorusGeometry(5, 1.2, 5, 12);
  var m = new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0, depthWrite: false });
  this.mesh = new THREE.Mesh(g, m);
  this.mesh.visible = false;
  scene.add(this.mesh);
}

function spawnAirPuffs(vx, vy, bfDx, bfDy) {
  if (!humanoid) return;
  var cursorPull = Math.sqrt(bfDx * bfDx + bfDy * bfDy);
  var chance = 0.15 + Math.min(0.35, cursorPull * 0.003);
  if (Math.random() > chance) return;

  var wp = new THREE.Vector3();
  (Math.random() < 0.5 ? humanoid.lThruster : humanoid.rThruster).getWorldPosition(wp);

  var bfLen = Math.max(1, cursorPull);
  var ejVx = -(bfDx / bfLen) * (0.4 + Math.random() * 0.5);
  var ejVy = -(bfDy / bfLen) * (0.4 + Math.random() * 0.5) - 0.6;
  var ejVz = (Math.random() - 0.5) * 0.5;

  var p = airPuffPool.length ? airPuffPool.pop() : new AirPuff();
  p.mesh.position.set(
    wp.x + (Math.random() - 0.5) * 4,
    wp.y - 5 + (Math.random() - 0.5) * 4,
    wp.z + (Math.random() - 0.5) * 4
  );
  p.mesh.rotation.set(
    Math.PI * 0.5 + (Math.random() - 0.5) * 0.6,
    (Math.random() - 0.5) * 0.5,
    (Math.random() - 0.5) * 0.5
  );
  p.mesh.scale.setScalar(0.25 + Math.random() * 0.15);
  p.mesh.material.opacity = 0;
  p.mesh.material.color.setHex(Math.random() < 0.25 ? 0xffffff : 0x88ddff);
  p.mesh.visible = true;
  p.vx = ejVx; p.vy = ejVy; p.vz = ejVz;
  p.life = 1.0;
  p.decay = 0.018 + Math.random() * 0.014;
  p.peakOpacity = 0.45 + Math.random() * 0.20;
  p.growRate = 0.10 + Math.random() * 0.06;
  airPuffs.push(p);
}

function updateAirPuffs() {
  for (var i = airPuffs.length - 1; i >= 0; i--) {
    var p = airPuffs[i];
    p.life -= p.decay;
    if (p.life <= 0) {
      p.mesh.visible = false;
      airPuffPool.push(p);
      airPuffs.splice(i, 1);
      continue;
    }
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vx *= 0.92; p.vy *= 0.94;
    var s = (0.18 + (1 - p.life) * p.growRate * 14);
    p.mesh.scale.setScalar(s);
    var lifePhase = p.life;
    p.mesh.material.opacity = lifePhase > 0.7
      ? p.peakOpacity * ((1 - lifePhase) / 0.3)
      : p.peakOpacity * (lifePhase / 0.7);
    p.mesh.rotation.z += 0.015;
  }
}

// ─── Snow Spray (Tundra world) ─────────────────────────────────────────────
var snowParticles = [];
var snowPool = [];

function SnowFlake() {
  var g = new THREE.OctahedronGeometry(1.2, 0);
  g.applyMatrix4(new THREE.Matrix4().makeScale(1, 0.35, 1));
  var m = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0,
    depthWrite: false, blending: THREE.AdditiveBlending
  });
  this.mesh = new THREE.Mesh(g, m);
  this.mesh.visible = false;
  scene.add(this.mesh);
}

function spawnSnowSpray(x, y, z, velX, velY, speed) {
  var count = Math.floor(2 + speed * 18);
  for (var i = 0; i < count; i++) {
    var p = snowPool.length ? snowPool.pop() : new SnowFlake();
    var wDust = WORLDS[currentWorld] ? WORLDS[currentWorld].dustColors : [0xffffff];
    p.mesh.material.color.setHex(wDust[Math.floor(Math.random() * wDust.length)]);
    var sideDir = (Math.random() > 0.5 ? 1 : -1);
    p.mesh.position.set(
      x + (Math.random() - 0.5) * 6,
      y - 18 + (Math.random() - 0.5) * 4,
      z + (Math.random() - 0.5) * 8
    );
    p.mesh.rotation.set(
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 2
    );
    var spd = 0.6 + Math.random() * 1.4;
    p.vx = velX * -0.12 + sideDir * (0.8 + Math.random() * 1.6) * spd;
    p.vy = Math.abs(velY) * 0.08 + (0.3 + Math.random() * 0.8) * spd;
    p.vz = (Math.random() - 0.5) * 1.2 * spd;
    p.vr = (Math.random() - 0.5) * 0.12;
    p.life = 1.0;
    p.decay = 0.022 + Math.random() * 0.028;
    p.baseScale = 0.4 + Math.random() * 0.9;
    p.mesh.scale.setScalar(p.baseScale);
    p.mesh.material.opacity = 0.0;
    p.peakOpacity = 0.55 + Math.random() * 0.35;
    p.mesh.visible = true;
    snowParticles.push(p);
  }
}

function updateSnowSpray() {
  for (var i = snowParticles.length - 1; i >= 0; i--) {
    var p = snowParticles[i];
    p.life -= p.decay;
    if (p.life <= 0) {
      p.mesh.visible = false;
      snowPool.push(p);
      snowParticles.splice(i, 1);
      continue;
    }
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vx *= 0.91; p.vy *= 0.88;
    p.mesh.rotation.x += p.vr;
    p.mesh.rotation.z += p.vr * 0.6;
    var s = p.baseScale * (1 + (1 - p.life) * 1.4);
    p.mesh.scale.setScalar(s);
    p.mesh.material.opacity = p.life > 0.75
      ? p.peakOpacity * ((1 - p.life) / 0.25)
      : p.peakOpacity * (p.life / 0.75);
  }
}

function showToast(msg) {
  var area = document.getElementById('toast-banner-area');
  if (!area) return;
  var el = document.createElement('div');
  el.className = 'toast-banner';
  el.textContent = msg;
  area.appendChild(el);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { el.classList.add('in'); });
  });
  setTimeout(function() {
    el.classList.remove('in');
    el.classList.add('out');
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, 2400);
  var all = area.querySelectorAll('.toast-banner');
  if (all.length > 3) {
    var oldest = all[0];
    oldest.classList.remove('in');
    oldest.classList.add('out');
    setTimeout(function() { if (oldest.parentNode) oldest.parentNode.removeChild(oldest); }, 300);
  }
}

var windPool = [], windActive = [], windLayer;

function initWindStreaks() {
  windLayer = document.getElementById('wind-layer');
  for (var i = 0; i < 24; i++) {
    var el = document.createElement('div');
    el.style.cssText = 'position:absolute;height:1px;border-radius:1px;opacity:0;pointer-events:none;';
    windLayer.appendChild(el);
    windPool.push({ el: el });
  }
}

function spawnWindStreak(intensity, forward) {
  if (!windPool.length) return;
  var p = windPool.pop();
  var w = Math.round(25 + Math.random() * 90 * intensity);
  var y = Math.random() * HEIGHT;
  var startX = forward ? WIDTH + w : -w;
  var endX   = forward ? -w : WIDTH + w;
  var spd    = 180 + intensity * 700;
  var alpha  = 0.10 + intensity * 0.28;
  var col    = forward
    ? 'rgba(160,220,255,' + alpha + ')'
    : 'rgba(255,160,80,'  + alpha + ')';
  var grad   = forward
    ? 'linear-gradient(to left, transparent,' + col + ',transparent)'
    : 'linear-gradient(to right,transparent,' + col + ',transparent)';
  var el = p.el;
  el.style.width   = w + 'px';
  el.style.top     = y + 'px';
  el.style.left    = startX + 'px';
  el.style.background = grad;
  el.style.opacity = '1';
  p.startX   = startX;
  p.endX     = endX;
  p.duration = Math.abs(endX - startX) / spd * 1000;
  p.startTime = Date.now();
  windActive.push(p);
}

function updateWindStreaks(intensity, forward) {
  if (intensity > 0.05 && Math.random() < intensity * 0.55) {
    spawnWindStreak(intensity, forward);
  }
  var now = Date.now();
  for (var i = windActive.length - 1; i >= 0; i--) {
    var p = windActive[i];
    var t = (now - p.startTime) / p.duration;
    if (t >= 1) {
      p.el.style.opacity = '0';
      windPool.push(p);
      windActive.splice(i, 1);
    } else {
      p.el.style.left = Math.round(p.startX + (p.endX - p.startX) * t) + 'px';
    }
  }
}

function norm(v, vmin, vmax, tmin, tmax) {
  var nv = Math.max(Math.min(v, vmax), vmin);
  return tmin + ((nv-vmin)/(vmax-vmin))*(tmax-tmin);
}

document.addEventListener('mousemove', function(e) {

  mouse.y =  1 - (e.clientY / HEIGHT) * 2;
  _bumpInteraction();
  var cursorEl = document.getElementById('cursor');
  if (cursorEl) { cursorEl.style.left = e.clientX+'px'; cursorEl.style.top = e.clientY+'px'; }
});

var touchState = {
  active: false, id: null,
  startX: 0, startY: 0, lastX: 0, lastY: 0,
  hasMoved: false, twoFinger: false, twoStartY: 0
};

document.addEventListener('touchstart', function(e) {
  var tag = e.target.tagName;
  if (tag === 'BUTTON' || tag === 'A' || tag === 'INPUT') return;
  var topHud = document.getElementById('top-hud');
  var botHud = document.getElementById('bottom-hud');
  if (topHud && topHud.contains(e.target)) return;
  if (botHud && botHud.contains(e.target)) return;
  if (STATUS === 'waiting') return;
  _bumpInteraction();

  e.preventDefault();
  if (e.touches.length === 2) {
    touchState.twoFinger = true;
    touchState.twoStartY = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
    return;
  }
  var t = e.touches[0];
  touchState.active = true; touchState.id = t.identifier;
  touchState.startX = t.clientX; touchState.startY = t.clientY;
  touchState.lastX = t.clientX; touchState.lastY = t.clientY;
  touchState.hasMoved = false; touchState.twoFinger = false;
  mouse.x = -1 + (t.clientX / WIDTH) * 2;
  mouse.y =  1 - (t.clientY / HEIGHT) * 2;
}, { passive: false });

document.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 2 && touchState.twoFinger) {
    var midY = (e.touches[0].clientY + e.touches[1].clientY) * 0.5;
    var delta = touchState.twoStartY - midY;
    touchState.twoStartY = midY;
    reverseLerp += delta * 0.004;
    reverseLerp = Math.max(REVERSE_LIMIT, Math.min(1.8, reverseLerp));
    return;
  }
  if (!touchState.active) return;
  var t = null;
  for (var i = 0; i < e.touches.length; i++) {
    if (e.touches[i].identifier === touchState.id) { t = e.touches[i]; break; }
  }
  if (!t) return;
  var dx = t.clientX - touchState.startX, dy = t.clientY - touchState.startY;
  if (Math.sqrt(dx*dx + dy*dy) > 6) touchState.hasMoved = true;
  touchState.lastX = t.clientX; touchState.lastY = t.clientY;
  mouse.x = -1 + (t.clientX / WIDTH) * 2;
  mouse.y =  1 - (t.clientY / HEIGHT) * 2;
}, { passive: false });

document.addEventListener('touchend', function(e) {
  var tag = e.target.tagName;
  if (tag === 'BUTTON' || tag === 'A' || tag === 'INPUT') return;
  var topHud2 = document.getElementById('top-hud');
  var botHud2 = document.getElementById('bottom-hud');
  if (topHud2 && topHud2.contains(e.target)) return;
  if (botHud2 && botHud2.contains(e.target)) return;
  if (STATUS === 'waiting') return;
  e.preventDefault();
  touchState.twoFinger = false;

  if (longPressFired) {
    longPressFired = false;
    touchState.active = false;
    touchState.id = null;
    return;
  }

  if (!touchState.active) return;
  if (!touchState.hasMoved && STATUS === 'playing') {
    gsap.to(humanoid, {
      flipX: humanoid.flipX + (Math.random() - 0.5) * Math.PI * 3.5,
      flipZ: humanoid.flipZ + (Math.random() - 0.5) * Math.PI * 3.5,
      duration: 0.65, ease: "power2.inOut"
    });
    for (var si = 0; si < humanoid.joints.length; si++) {
      humanoid.joints[si].pivot.userData.velX += (Math.random() - 0.5) * 4;
      humanoid.joints[si].pivot.userData.velZ += (Math.random() - 0.5) * 4;
    }
  }
  touchState.active = false; touchState.id = null;
}, { passive: false });

var reverseLerp = 0.0;
var MAGNETIC_FORWARD = 1.0, MAGNETIC_STRENGTH = 0.018, REVERSE_LIMIT = -4.0;

window.addEventListener('wheel', function(e) {
  reverseLerp += e.deltaY * 0.0016;
  reverseLerp = Math.max(REVERSE_LIMIT, Math.min(1.8, reverseLerp));
}, { passive: true });

window.addEventListener('pointerdown', function(e) {
  if (STATUS !== 'playing') return;
  if (e.pointerType === 'touch') return;

  if (e.button === 0) {
    var rFlipX = (Math.random() * 2 - 1) * Math.PI * (2 + Math.random() * 2);
    var rFlipZ = (Math.random() * 2 - 1) * Math.PI * (Math.random() * 1.5);
    var rDur   = 0.55 + Math.random() * 0.65;
    gsap.to(humanoid, {
      flipX: humanoid.flipX + rFlipX,
      flipZ: humanoid.flipZ + rFlipZ,
      duration: rDur, ease: 'power2.inOut'
    });
    for (var si = 0; si < humanoid.joints.length; si++) {
      humanoid.joints[si].pivot.userData.velX += (Math.random() - 0.5) * 8;
      humanoid.joints[si].pivot.userData.velZ += (Math.random() - 0.5) * 8;
    }
  } else if (e.button === 2) {
    gsap.to(humanoid, { flipX: 0, flipZ: 0, duration: 0.5, ease: "power3.out" });
    humanoid.baseRotX = -0.55; humanoid.baseRotZ = 0;
  }
});
window.addEventListener('contextmenu', function(e) { e.preventDefault(); });

window.addEventListener('keydown', function(e) {

// ─── Shooting Star ─────────────────────────────────────────────────────────
function launchShootingStar() {
  if (starActive) return;
  starActive = true;
  var goLeft = Math.random() < 0.5;
  var startX = goLeft ? WIDTH * 0.9 : WIDTH * 0.1;
  var startY = Math.random() * HEIGHT * 0.4;
  starAngle = goLeft ? (200 + Math.random()*40) : (330 + Math.random()*40);
  starEl.style.transform = 'translate(' + startX + 'px,' + startY + 'px) rotate(' + starAngle + 'deg)';
  starEl.style.opacity = '0';
  gsap.timeline()
    .to(starEl, { opacity: 1, duration: 0.1 })
    .to(starEl, {
      opacity: 0, duration: 0.6, ease: "power1.in",
      onUpdate: function() {
        var progress = this.progress();
        var dist = progress * (WIDTH * 0.7);
        var rad = (starAngle - 90) * Math.PI / 180;
        var nx = parseFloat(startX) + Math.cos(rad) * dist;
        var ny = parseFloat(startY) + Math.sin(rad) * dist;
        starEl.style.transform = 'translate(' + nx + 'px,' + ny + 'px) rotate(' + starAngle + 'deg)';
      },
      onComplete: function() { starActive = false; }
    });
}


// ─── Main Loop ─────────────────────────────────────────────────────────────
var sceneSpeed = 1.0; 
function loop() {
  requestAnimationFrame(loop);
  frame++;

  reverseLerp += (0 - reverseLerp) * MAGNETIC_STRENGTH;
  targetRotSpeed = MAGNETIC_FORWARD + reverseLerp;
  currentRotSpeed += (targetRotSpeed - currentRotSpeed) * 0.05;
  sceneSpeed = currentRotSpeed;

  sky.mesh.rotation.z += 0.002 * currentRotSpeed;

  if (STATUS === 'playing') {
    if (!sky.mesh.visible) sky.mesh.visible = true;
    if (pauseActive) {
      humanoid.flipX += (0 - humanoid.flipX) * 0.004;
      humanoid.flipZ += (0 - humanoid.flipZ) * 0.004;
      var tx = norm(mouse.x, -1, 1, -100, 100), ty = norm(mouse.y, -1, 1, 25, 175);
      var headOffY_P = 8.5 * Math.cos(humanoid.baseRotX);
      var bfDxP = tx - humanoid.mesh.position.x, bfDyP = ty - (humanoid.mesh.position.y + headOffY_P);
      var bfDistP = Math.max(1, Math.sqrt(bfDxP*bfDxP + bfDyP*bfDyP));
      butterfly.vx += (bfDxP / bfDistP) * Math.min(bfDistP * 0.08, 4) * 0.12;
      butterfly.vy += (bfDyP / bfDistP) * Math.min(bfDistP * 0.08, 4) * 0.12;
      butterfly.vx *= 0.85; butterfly.vy *= 0.85;
      humanoid.mesh.position.x += butterfly.vx;
      humanoid.mesh.position.y += butterfly.vy;
      humanoid.butterflyDx = bfDxP; humanoid.butterflyDy = bfDyP; humanoid.butterflyDist = bfDistP;
      humanoid.update(butterfly.vx*0.003, butterfly.vy*0.003, bfDxP, bfDyP);
      
      if (companionPoodle) companionPoodle.update(humanoid.mesh.position.x, humanoid.mesh.position.y);
      if (airPuffs.length) updateAirPuffs();
      
      renderer.render(scene, camera);
      sky.mesh.visible = false;
      fgRenderer.render(scene, camera);
      sky.mesh.visible = true;
      return;
    }
    if (frameFrozen) {
      humanoid.flipX += (0 - humanoid.flipX) * 0.004;
      humanoid.flipZ += (0 - humanoid.flipZ) * 0.004;
      var ftx = norm(mouse.x, -1, 1, -100, 100), fty = norm(mouse.y, -1, 1, 25, 175);
      var headOffY_F = 8.5 * Math.cos(humanoid.baseRotX);
      var bfDxF = ftx - humanoid.mesh.position.x, bfDyF = fty - (humanoid.mesh.position.y + headOffY_F);
      var bfDistF = Math.max(1, Math.sqrt(bfDxF*bfDxF + bfDyF*bfDyF));
      butterfly.vx += (bfDxF / bfDistF) * Math.min(bfDistF * 0.08, 4) * 0.10;
      butterfly.vy += (bfDyF / bfDistF) * Math.min(bfDistF * 0.08, 4) * 0.10;
      butterfly.vx *= 0.88; butterfly.vy *= 0.88;
      humanoid.mesh.position.x += butterfly.vx;
      humanoid.mesh.position.y += butterfly.vy;
      humanoid.butterflyDx = bfDxF; humanoid.butterflyDy = bfDyF; humanoid.butterflyDist = bfDistF;
      humanoid.update(butterfly.vx*0.002, butterfly.vy*0.002, bfDxF, bfDyF);
      
      if (companionPoodle) companionPoodle.update(humanoid.mesh.position.x, humanoid.mesh.position.y);
      if (smokeParticles.length) updateSmoke();
      if (airPuffs.length) updateAirPuffs();
      if (snowParticles.length) updateSnowSpray();
      
      renderer.render(scene, camera);
      return;
    }

    if (!pauseActive && (Date.now() - _lastInteractionTime) > AFK_MS) {
      _lastInteractionTime = Date.now(); 
      openMenu();
    }

    var bfTx = norm(mouse.x, -1, 1, -100, 100);
    var bfTy = norm(mouse.y, -1, 1, 25, 175);
    var headOffsetY = 8.5 * Math.cos(humanoid.baseRotX);
    var headOffsetX = 8.5 * Math.sin(humanoid.baseRotX) * -Math.sin(humanoid.mesh.rotation.y);
    var anchorX = humanoid.mesh.position.x + headOffsetX;
    var anchorY = humanoid.mesh.position.y + headOffsetY;

    var bfDx = bfTx - anchorX;
    var bfDy = bfTy - anchorY;
    var bfDist = Math.sqrt(bfDx * bfDx + bfDy * bfDy);

    spawnAirPuffs(butterfly.vx, butterfly.vy, bfDx, bfDy);

    if (frame >= nextStarFrame && !starActive) {
      launchShootingStar();
      nextStarFrame = frame + 1200 + Math.floor(Math.random() * 1800);
    }

    var speed2d = Math.sqrt(butterfly.vx * butterfly.vx + butterfly.vy * butterfly.vy);
    var armStrength = 0.018; 
    var momentumResistance = Math.min(1.0, speed2d / 18); 
    var effectiveArm = armStrength * (1.0 - momentumResistance * 0.72);

    if (bfDist > 0.5) {
      butterfly.vx += (bfDx / bfDist) * Math.min(bfDist * 0.12, 6.0) * effectiveArm * 9;
      butterfly.vy += (bfDy / bfDist) * Math.min(bfDist * 0.12, 6.0) * effectiveArm * 9;
    }

    var drag = 0.88 - Math.min(0.12, speed2d * 0.004);
    butterfly.vx *= drag;
    butterfly.vy *= drag;

    var MAX_SPEED = 9.5;
    if (speed2d > MAX_SPEED) {
      butterfly.vx *= MAX_SPEED / speed2d;
      butterfly.vy *= MAX_SPEED / speed2d;
    }

    var _airSpd = Math.sqrt(butterfly.vx * butterfly.vx + butterfly.vy * butterfly.vy);
    if (_airSpd > 1.5) {
      var _airNudge = _airSpd * 0.00018;
      humanoid.flipX += butterfly.vy * _airNudge;
      humanoid.flipZ -= butterfly.vx * _airNudge;
    }

    humanoid.mesh.position.x += butterfly.vx;
    humanoid.mesh.position.y += butterfly.vy;

    if (humanoid.mesh.position.x < -110) { butterfly.vx += (-110 - humanoid.mesh.position.x) * 0.08; }
    if (humanoid.mesh.position.x >  110) { butterfly.vx += ( 110 - humanoid.mesh.position.x) * 0.08; }
    if (humanoid.mesh.position.y <  20)  { butterfly.vy += (  20 - humanoid.mesh.position.y) * 0.10; }
    if (humanoid.mesh.position.y >  178) { butterfly.vy += ( 178 - humanoid.mesh.position.y) * 0.10; }

    humanoid.update(butterfly.vx * 0.003, butterfly.vy * 0.003, bfDx, bfDy);
    humanoid.butterflyDx = bfDx;
    humanoid.butterflyDy = bfDy;
    humanoid.butterflyDist = bfDist;
    
    if (frame >= nextFlipFrame) {
      var flipNx = Math.max(-1, Math.min(1, bfDx / 100));
      var flipNy = Math.max(-1, Math.min(1, bfDy / 100));
      var flipDeltaX, flipDeltaZ, flipDur, fjx, fjz;

      if (Math.abs(flipNy) >= Math.abs(flipNx) * 1.4 || Math.abs(flipNx) < 0.35) {
        flipDeltaX = Math.PI * 2 * (flipNy >= 0 ? 1 : -1);
        flipDeltaZ = flipNx * 0.18;           
        flipDur    = 0.60 + Math.random() * 0.25;
        fjx = flipDeltaX > 0 ? 3.2 : -3.2;
        fjz = flipNx * 0.8;
      } else {
        flipDeltaX = Math.PI * 2 * (flipNy >= 0 ? 1 : -1);
        flipDeltaZ = Math.PI * (flipNx >= 0 ? 1 : -1); 
        flipDur    = 0.80 + Math.random() * 0.2;
        fjx = flipDeltaX > 0 ? 2.8 : -2.8;
        fjz = flipDeltaZ > 0 ? 2.0 : -2.0;
      }

      gsap.to(humanoid, {
        flipX: humanoid.flipX + flipDeltaX,
        flipZ: humanoid.flipZ + flipDeltaZ,
        duration: flipDur, ease: 'power2.inOut'
      });
      for (var fji = 0; fji < humanoid.joints.length; fji++) {
        humanoid.joints[fji].pivot.userData.velX += fjx * (0.7 + Math.random() * 0.4);
        humanoid.joints[fji].pivot.userData.velZ += fjz * (0.7 + Math.random() * 0.4);
      }

      var flipGap = 260 + Math.floor(Math.random() * 420) - Math.floor(bfDist * 1.2);
      nextFlipFrame = frame + Math.max(140, flipGap);
    }

    if (companionPoodle) companionPoodle.update(humanoid.mesh.position.x, humanoid.mesh.position.y);

    if (smokeParticles.length) updateSmoke();
    if (airPuffs.length) updateAirPuffs();
    if (snowParticles.length) updateSnowSpray();

    var snowSpeed = Math.sqrt(butterfly.vx * butterfly.vx + butterfly.vy * butterfly.vy);
    if (snowSpeed > 0.4 && frame % 2 === 0) {
      spawnSnowSpray(
        humanoid.mesh.position.x,
        humanoid.mesh.position.y,
        humanoid.mesh.position.z,
        butterfly.vx, butterfly.vy, snowSpeed / 9.5
      );
    }
    
    var windIntensity = Math.min(1, Math.max(0, (Math.abs(sceneSpeed) - 0.6) / 1.8));
    if (windIntensity > 0) updateWindStreaks(windIntensity, sceneSpeed > 0);

  } else {
    // waiting 
    humanoid.mesh.position.x = 0;
    humanoid.mesh.position.y = 152 + Math.sin(Date.now()*0.001)*5;
    humanoid.update(0, 0, 0, 0);
    if (companionPoodle) companionPoodle.update(humanoid.mesh.position.x, humanoid.mesh.position.y);
    renderer.render(scene, camera);
    document.getElementById('world-fg').style.display = 'block';
    sky.mesh.visible = false; 
    fgRenderer.render(scene, camera);
    sky.mesh.visible = true; 
    return;
  }

  renderer.render(scene, camera);
}

(function() {

var _welcomeStarted = false;
function welcomeStart(e) {
  if (_welcomeStarted) return;
  if (STATUS !== 'waiting') return;
  if (e && e.target) {
    var tag = e.target.tagName;
    if (tag === 'BUTTON' || tag === 'A' || tag === 'INPUT') return;
    var overlay = document.getElementById('pause-overlay');
    if (overlay && overlay.contains(e.target)) return;
  }
  _welcomeStarted = true;
  var ws = document.getElementById('screen-welcome');
  if (ws) {
    ws.style.transition = 'opacity 0.35s ease';
    ws.style.opacity = '0';
  }
  setTimeout(function() {
    _welcomeStarted = false; 
    startGame();
  }, 320);
}

var _welcomeMouseOriginX = null, _welcomeMouseOriginY = null;
document.addEventListener('mousemove', function(e) {
  if (STATUS !== 'waiting') return;
  if (_welcomeStarted) return;
  if (_welcomeMouseOriginX === null) { _welcomeMouseOriginX = e.clientX; _welcomeMouseOriginY = e.clientY; return; }
  var dx = e.clientX - _welcomeMouseOriginX, dy = e.clientY - _welcomeMouseOriginY;
  if (Math.sqrt(dx*dx + dy*dy) > 8) welcomeStart(e);
}, { passive: true });

document.addEventListener('mousedown', function(e) { welcomeStart(e); });
document.addEventListener('touchstart', function(e) { welcomeStart(e); }, { passive: true });
document.addEventListener('keydown',    function(e) {
  if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
    welcomeStart(e);
  }
});

function goHome() {

  var dirBtn = document.getElementById('btn-hud-dir');
  if (dirBtn) { dirBtn.textContent = 'forward \u2192'; dirBtn.classList.remove('active'); }

document.getElementById('hud-wordmark').addEventListener('click', function(e) {

  if (STATUS === 'playing') { openMenu(); return; }
  location.reload();
});
document.getElementById('hud-wordmark').addEventListener('touchend', function(e) {

// ─── Bottom HUD buttons ───────────────────────────────────────────────────────
var directionState = 1;

function setDirection(dir) {
  if (STATUS !== 'playing') return;
  directionState = dir;
  var dirBtn = document.getElementById('btn-hud-dir');
  if (dir === -1) {
    reverseLerp = REVERSE_LIMIT * 0.75;
    MAGNETIC_FORWARD = -0.6;
    if (dirBtn) { dirBtn.textContent = 'back \u2190'; dirBtn.classList.add('active'); }
    showToast('reversing');
  } else {
    reverseLerp = 0;
    MAGNETIC_FORWARD = 1.0;
    if (dirBtn) { dirBtn.textContent = 'forward \u2192'; dirBtn.classList.remove('active'); }
    showToast('forward');
  }
}

function wireBtn(id, fn) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('click', fn);
  el.addEventListener('touchend', function(e) { e.stopPropagation(); e.preventDefault(); fn(); }, { passive: false });
}

wireBtn('btn-hud-dir', function() { setDirection(directionState === 1 ? -1 : 1); });

// ─── Long-press on mobile → reset character orientation ──────────────────────
var longPressTimer = null;
var longPressFired = false;
var LONG_PRESS_MS  = 600;

document.addEventListener('touchstart', function(e) {
  if (STATUS !== 'playing') return;
  if (pauseActive) return;
  if (e.touches.length !== 1) { clearTimeout(longPressTimer); longPressFired = false; return; }
  var topHud = document.getElementById('top-hud');
  var botHud = document.getElementById('bottom-hud');
  if (topHud && topHud.contains(e.target)) return;
  if (botHud && botHud.contains(e.target)) return;
  longPressFired = false;
  clearTimeout(longPressTimer);
  var _lpTouch = e.touches[0];
  longPressTimer = setTimeout(function() {
    longPressFired = true;
    touchState.active = false;
    touchState.id = null;
    touchState.hasMoved = false;

    if (_lpTouch) {
      mouse.x = -1 + (_lpTouch.clientX / WIDTH)  * 2;
      mouse.y =  1 - (_lpTouch.clientY / HEIGHT) * 2;
    }
    butterfly.vx = 0; butterfly.vy = 0;

    if (typeof gsap !== 'undefined') {
      gsap.killTweensOf(humanoid, 'flipX');
      gsap.killTweensOf(humanoid, 'flipZ');
    }
    humanoid.flipX = 0; humanoid.flipZ = 0;
    humanoid.baseRotX = -0.55; humanoid.baseRotZ = 0;

    for (var _lpi = 0; _lpi < humanoid.joints.length; _lpi++) {
      humanoid.joints[_lpi].pivot.userData.velX = 0;
      humanoid.joints[_lpi].pivot.userData.velZ = 0;
    }
    showToast('orientation reset');
  }, LONG_PRESS_MS);
}, { passive: false });

document.addEventListener('touchend',  function() { clearTimeout(longPressTimer); }, { passive: true });
document.addEventListener('touchmove', function() { clearTimeout(longPressTimer); longPressFired = false; }, { passive: true });

var closeBtn = document.getElementById('btn-menu-close');
if (closeBtn) {
  closeBtn.addEventListener('click', function(e) { e.stopPropagation(); closeMenu(); });

}, { passive: false });

function rotateQuote() {

// ════════════════════════════════════════════════════════════════════
// INK EFFECT
// ════════════════════════════════════════════════════════════════════

(function() {
  var _ic = document.getElementById('ink-overlay');
  var _ictx = _ic.getContext('2d');

  function inkResize() {
    _ic.width  = window.innerWidth;
    _ic.height = window.innerHeight;
  }
  inkResize();
  window.addEventListener('resize', inkResize);

  var INK_WORLDS = {
    cosmos:   { edge: '20,10,60',      splat: '100,195,220',  eOp: 0.38, sOp: 0.30, grain: 0.060 },
    tundra:   { edge: '160,215,255',   splat: '210,240,255',  eOp: 0.38, sOp: 0.30, grain: 0.060 },
  };

  var inkSplats = [];
  var MAX_SPLATS = 40;
  var inkFrame = 0;
  var lastHumanoidX = 0, lastHumanoidY = 0;

  function spawnInkSplat(wx, wy, palette) {
    if (inkSplats.length >= MAX_SPLATS) inkSplats.shift();
    inkSplats.push({
      x: norm(wx, -100, 100, 0, window.innerWidth),
      y: norm(wy, 25, 175, window.innerHeight * 0.92, window.innerHeight * 0.08),
      r: 8 + Math.random() * 28,
      alpha: 0.12 + Math.random() * 0.18,
      life: 1.0,
      decay: 0.003 + Math.random() * 0.004,
      drips: Math.floor(Math.random() * 3),
      dripLen: 10 + Math.random() * 28,
      dripAngle: Math.PI * 0.3 + Math.random() * Math.PI * 1.4,
      palette: palette,
    });
  }

  function drawInkTick() {
    inkFrame++;
    var W = window.innerWidth, H = window.innerHeight;
    if (_ic.width !== W || _ic.height !== H) inkResize();

    _ictx.clearRect(0, 0, W, H);

    var worldKey = (typeof currentWorld !== 'undefined') ? currentWorld : 'cosmos';
    var pal = INK_WORLDS[worldKey] || INK_WORLDS.cosmos;

    var vg = _ictx.createRadialGradient(W/2, H/2, H * 0.28, W/2, H/2, Math.max(W, H) * 0.78);
    vg.addColorStop(0,   'rgba(' + pal.edge + ',0)');
    vg.addColorStop(0.6, 'rgba(' + pal.edge + ',' + (pal.eOp * 0.4).toFixed(3) + ')');
    vg.addColorStop(1,   'rgba(' + pal.edge + ',' + pal.eOp.toFixed(3) + ')');
    _ictx.fillStyle = vg;
    _ictx.fillRect(0, 0, W, H);

    if (inkFrame % 2 === 0) {
      var grainCount = Math.floor(W * H * pal.grain * 0.00008);
      _ictx.fillStyle = 'rgba(' + pal.splat + ',0.18)';
      for (var gi = 0; gi < grainCount; gi++) {
        var gx = Math.random() * W, gy = Math.random() * H;
        _ictx.fillRect(gx | 0, gy | 0, 1, 1);
      }
    }

    if (typeof humanoid !== 'undefined' && humanoid && humanoid.mesh && STATUS === 'playing') {
      var hx = humanoid.mesh.position.x, hy = humanoid.mesh.position.y;
      var spd2 = Math.sqrt(butterfly.vx * butterfly.vx + butterfly.vy * butterfly.vy);
      var moved = Math.sqrt((hx - lastHumanoidX) * (hx - lastHumanoidX) + (hy - lastHumanoidY) * (hy - lastHumanoidY));
      if (moved > 1.2 && inkFrame % 5 === 0) {
        spawnInkSplat(hx, hy, pal);
      }
      if (spd2 > 5 && inkFrame % 20 === 0) {
        spawnInkSplat(hx + (Math.random()-0.5)*12, hy + (Math.random()-0.5)*12, pal);
      }
      lastHumanoidX = hx; lastHumanoidY = hy;
    }

    for (var si = inkSplats.length - 1; si >= 0; si--) {
      var s = inkSplats[si];
      s.life -= s.decay;
      if (s.life <= 0) { inkSplats.splice(si, 1); continue; }

      var a = s.alpha * s.life * pal.sOp / 0.22;

      var sg = _ictx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
      sg.addColorStop(0,   'rgba(' + s.palette.splat + ',' + (a * 0.9).toFixed(3) + ')');
      sg.addColorStop(0.5, 'rgba(' + s.palette.splat + ',' + (a * 0.4).toFixed(3) + ')');
      sg.addColorStop(1,   'rgba(' + s.palette.splat + ',0)');
      _ictx.fillStyle = sg;
      _ictx.beginPath();
      _ictx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      _ictx.fill();

      for (var di2 = 0; di2 < s.drips; di2++) {
        var dang = s.dripAngle + di2 * 0.5 - 0.25;
        var dlen = s.dripLen * (0.6 + di2 * 0.3) * s.life;
        var dw   = (2 + di2) * s.life;
        var dx1 = s.x + Math.cos(dang) * s.r * 0.6;
        var dy1 = s.y + Math.sin(dang) * s.r * 0.6;
        var dx2 = dx1 + Math.cos(dang) * dlen;
        var dy2 = dy1 + Math.sin(dang) * dlen;
        var lg = _ictx.createLinearGradient(dx1, dy1, dx2, dy2);
        lg.addColorStop(0, 'rgba(' + s.palette.splat + ',' + (a * 0.7).toFixed(3) + ')');
        lg.addColorStop(1, 'rgba(' + s.palette.splat + ',0)');
        _ictx.strokeStyle = lg;
        _ictx.lineWidth   = dw;
        _ictx.lineCap     = 'round';
        _ictx.beginPath();
        _ictx.moveTo(dx1, dy1);
        _ictx.lineTo(dx2, dy2);
        _ictx.stroke();
      }
    }

    requestAnimationFrame(drawInkTick);
  }

  window.addEventListener('load', function() {
    setTimeout(drawInkTick, 800);
  });
})();
